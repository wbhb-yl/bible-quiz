<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>성경 퀴즈</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary:#4A6FA5; --primary-dark:#3A5A8A; --secondary:#F4A261;
  --correct:#2E8B57; --wrong:#C0392B; --bg:#F0F4FF; --text:#1A1A2E;
  --muted:#6B7280; --border:#E2E8F0; --shadow:0 4px 20px rgba(74,111,165,0.15);
}
body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
.screen { display:none; width:100%; max-width:480px; min-height:100vh; flex-direction:column; }
.screen.active { display:flex; }

/* ── HOME ── */
#home { background:linear-gradient(160deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%); align-items:center; padding:28px 24px 36px; gap:0; overflow-y:auto; }
.home-header { text-align:center; margin-bottom:24px; }
.home-cross { font-size:44px; margin-bottom:8px; filter:drop-shadow(0 0 18px rgba(244,162,97,0.8)); }
.home-title { font-size:28px; font-weight:800; color:#fff; }
.home-sub { font-size:12px; color:rgba(255,255,255,0.45); margin-top:5px; letter-spacing:1px; }
.conn-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-top:8px; }
.conn-badge.online { background:rgba(46,139,87,0.25); color:#4ADE80; border:1px solid rgba(46,139,87,0.35); }
.conn-badge.offline { background:rgba(192,57,43,0.2); color:#F87171; border:1px solid rgba(192,57,43,0.3); }
.conn-dot { width:7px; height:7px; border-radius:50%; }
.conn-badge.online .conn-dot { background:#4ADE80; box-shadow:0 0 6px #4ADE80; }
.conn-badge.offline .conn-dot { background:#F87171; }

.slabel { font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:7px; }
.name-wrap { width:100%; margin-bottom:16px; }
.name-input { width:100%; padding:11px 14px; border-radius:11px; border:1.5px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.07); color:#fff; font-size:15px; font-family:inherit; outline:none; transition:border-color 0.2s; }
.name-input::placeholder { color:rgba(255,255,255,0.28); }
.name-input:focus { border-color:var(--secondary); }

.section-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:11px; }
.sec-card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:13px; padding:14px 10px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; }
.sec-card:active { transform:scale(0.97); }
.sec-card.sel { background:rgba(74,111,165,0.32); border-color:var(--secondary); box-shadow:0 0 14px rgba(244,162,97,0.22); }
.sec-card .s-icon { font-size:22px; margin-bottom:5px; }
.sec-card .s-name { font-size:13px; font-weight:700; color:#fff; }
.sec-card .s-cnt { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }
.sec-card .s-chk { position:absolute; top:6px; right:6px; width:15px; height:15px; background:var(--secondary); border-radius:50%; display:none; align-items:center; justify-content:center; font-size:8px; color:#fff; }
.sec-card.sel .s-chk { display:flex; }
.all-btn { width:100%; padding:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:9px; color:rgba(255,255,255,0.55); font-size:12px; cursor:pointer; margin-bottom:14px; font-family:inherit; }

.settings-box { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09); border-radius:13px; padding:13px; margin-bottom:14px; }
.settings-toggle { width:100%; display:flex; align-items:center; justify-content:space-between; background:transparent; border:none; cursor:pointer; padding:0; font-family:inherit; }
.settings-toggle .slabel { margin-bottom:0; pointer-events:none; }
.settings-toggle .s-arrow { font-size:12px; color:rgba(255,255,255,0.35); transition:transform 0.25s ease; }
.settings-toggle.open .s-arrow { transform:rotate(180deg); }
.settings-content { overflow:hidden; max-height:0; transition:max-height 0.3s ease, margin-top 0.3s ease; margin-top:0; }
.settings-content.open { max-height:400px; margin-top:10px; }
.srow { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.srow:last-child { border-bottom:none; }
.srow-label { font-size:12px; color:rgba(255,255,255,0.7); }
.srow-ctrl { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
.cbtn { padding:4px 9px; border-radius:14px; border:1px solid rgba(255,255,255,0.16); background:transparent; color:rgba(255,255,255,0.5); font-size:11px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.cbtn.active { background:var(--secondary); border-color:var(--secondary); color:#fff; font-weight:700; }

.resume-btn { width:100%; padding:12px; background:rgba(46,139,87,0.22); border:1px solid rgba(46,139,87,0.45); border-radius:11px; color:#4ADE80; font-size:13px; font-weight:700; cursor:pointer; margin-bottom:9px; font-family:inherit; display:none; }
.lb-btn { width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:11px; color:rgba(255,255,255,0.7); font-size:13px; font-weight:600; cursor:pointer; margin-bottom:9px; font-family:inherit; }
.start-btn { width:100%; padding:15px; background:linear-gradient(135deg,var(--secondary),#E07B3A); border:none; border-radius:13px; color:#fff; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 7px 24px rgba(244,162,97,0.35); font-family:inherit; }
.start-btn:active { transform:scale(0.97); }
.start-btn:disabled { opacity:0.32; cursor:not-allowed; transform:none; }

/* ── QUIZ ── */
#quiz { background:var(--bg); }
.quiz-topbar { background:#fff; padding:11px 14px; display:flex; align-items:center; gap:9px; box-shadow:0 2px 8px rgba(0,0,0,0.06); position:sticky; top:0; z-index:10; }
.q-back { width:32px; height:32px; background:var(--bg); border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.q-pw { flex:1; }
.q-pl { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px; }
.q-pb { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.q-pf { height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:3px; transition:width 0.4s ease; }
.timer-strip { height:4px; background:var(--border); border-radius:2px; margin-top:3px; overflow:hidden; }
.timer-fill { height:100%; background:var(--secondary); border-radius:2px; transition:width 1s linear; }
.q-score { background:var(--primary); color:#fff; font-size:11px; font-weight:700; padding:4px 8px; border-radius:14px; flex-shrink:0; }
.quiz-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:12px; }
.q-meta { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.mbadge { padding:3px 8px; border-radius:14px; font-size:11px; font-weight:600; }
.mb-section { background:#EEF2FF; color:var(--primary); }
.mb-diff-하 { background:#D1FAE5; color:#065F46; }
.mb-diff-중 { background:#FEF3C7; color:#92400E; }
.mb-diff-상 { background:#FEE2E2; color:#991B1B; }
.mb-num { font-size:11px; color:var(--muted); margin-left:auto; }
.combo-badge { padding:3px 9px; border-radius:14px; font-size:11px; font-weight:800; background:linear-gradient(135deg,#F4A261,#E07B3A); color:#fff; display:none; animation:pop 0.3s ease; }
.combo-badge.show { display:inline-block; }
@keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
.q-card { background:#fff; border-radius:17px; padding:20px 16px; box-shadow:var(--shadow); }
.q-text { font-size:16px; font-weight:700; line-height:1.55; color:var(--text); }
.choices { display:flex; flex-direction:column; gap:8px; }
.choice-btn { display:flex; align-items:center; gap:11px; background:#fff; border:2px solid var(--border); border-radius:12px; padding:12px 13px; cursor:pointer; font-size:14px; color:var(--text); text-align:left; transition:all 0.2s; box-shadow:0 2px 5px rgba(0,0,0,0.04); width:100%; font-family:inherit; }
.choice-btn:active:not([disabled]) { transform:scale(0.98); }
.cbadge { width:32px; height:32px; border-radius:9px; font-weight:900; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; box-shadow:0 3px 8px rgba(0,0,0,0.18); transition:all 0.2s; }
.cbadge.cb-1 { background:linear-gradient(135deg,#4A6FA5,#2E4F8A); }
.cbadge.cb-2 { background:linear-gradient(135deg,#E05252,#B52B2B); }
.cbadge.cb-3 { background:linear-gradient(135deg,#E0A130,#B87E12); }
.cbadge.cb-4 { background:linear-gradient(135deg,#2E9E6B,#1A7A4F); }
.choice-btn:hover:not([disabled]) .cbadge { transform:scale(1.08); }
.ctext { flex:1; line-height:1.4; }
.choice-btn.correct { border-color:var(--correct); background:#F0FFF4; }
.choice-btn.correct .cbadge { background:linear-gradient(135deg,#2E8B57,#1A6B3F) !important; box-shadow:0 3px 10px rgba(46,139,87,0.4); }
.choice-btn.wrong { border-color:var(--wrong); background:#FFF5F5; }
.choice-btn.wrong .cbadge { background:linear-gradient(135deg,#C0392B,#962d22) !important; box-shadow:0 3px 10px rgba(192,57,43,0.4); }
.choice-btn[disabled] { cursor:default; }
.expl-card { background:linear-gradient(135deg,#EEF2FF,#F5F3FF); border:1px solid #C7D2FE; border-radius:13px; padding:13px 15px; display:none; }
.expl-card.show { display:block; animation:slideUp 0.3s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.expl-hdr { font-size:11px; font-weight:700; color:var(--primary); margin-bottom:4px; }
.expl-text { font-size:13px; color:#374151; line-height:1.6; }
.expl-verse { font-size:11px; color:var(--primary); margin-top:5px; font-weight:600; }
.next-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border:none; border-radius:12px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; display:none; box-shadow:0 5px 16px rgba(74,111,165,0.3); font-family:inherit; }
.next-btn.show { display:block; animation:slideUp 0.3s ease; }

/* ── RESULT ── */
#result { background:linear-gradient(160deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%); align-items:center; justify-content:center; padding:32px 24px; gap:18px; overflow-y:auto; }
.result-icon { font-size:56px; text-align:center; animation:bounceIn 0.6s ease; }
@keyframes bounceIn { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
.result-title { font-size:22px; font-weight:800; color:#fff; text-align:center; }
.score-ring { position:relative; width:140px; height:140px; }
.score-ring svg { width:140px; height:140px; transform:rotate(-90deg); }
.strack { fill:none; stroke:rgba(255,255,255,0.1); stroke-width:10; }
.sfill { fill:none; stroke:var(--secondary); stroke-width:10; stroke-linecap:round; stroke-dasharray:408; stroke-dashoffset:408; transition:stroke-dashoffset 1.2s ease; }
.score-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-pct { font-size:28px; font-weight:800; color:#fff; line-height:1; }
.score-lbl { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }
.result-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; width:100%; }
.stat-box { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.09); border-radius:11px; padding:11px 6px; text-align:center; }
.stat-num { font-size:19px; font-weight:800; color:#fff; }
.stat-lbl { font-size:10px; color:rgba(255,255,255,0.4); margin-top:2px; }
.result-msg { text-align:center; font-size:13px; color:rgba(255,255,255,0.6); line-height:1.6; }
.result-btns { width:100%; display:flex; flex-direction:column; gap:8px; }
.rbtn { width:100%; padding:13px; border-radius:12px; border:none; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.rbtn:active { transform:scale(0.97); }
.rbtn-primary { background:linear-gradient(135deg,var(--secondary),#E07B3A); color:#fff; box-shadow:0 5px 16px rgba(244,162,97,0.32); }
.rbtn-ghost { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14); color:rgba(255,255,255,0.78); }

/* ── REVIEW ── */
#review { background:var(--bg); }
.review-topbar { background:#fff; padding:13px 16px; display:flex; align-items:center; gap:11px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.review-back { width:32px; height:32px; background:var(--bg); border:none; border-radius:8px; cursor:pointer; font-size:14px; }
.review-title { font-size:15px; font-weight:800; color:var(--text); }
.review-body { padding:14px; flex:1; overflow-y:auto; }
.review-item { background:#fff; border-radius:13px; padding:15px; margin-bottom:11px; box-shadow:var(--shadow); }
.review-q-num { font-size:11px; color:var(--muted); margin-bottom:5px; }
.review-q-text { font-size:14px; font-weight:700; color:var(--text); line-height:1.5; margin-bottom:11px; }
.review-choices { display:flex; flex-direction:column; gap:6px; }
.review-choice { display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:9px; background:var(--bg); border:1.5px solid transparent; font-size:13px; color:var(--text); }
.review-choice.correct { border-color:var(--correct); background:#F0FFF4; color:#065F46; font-weight:700; }
.review-choice.my-wrong { border-color:var(--wrong); background:#FFF5F5; color:#991B1B; }
.review-expl { margin-top:9px; padding:9px 11px; background:#EEF2FF; border-radius:9px; font-size:12px; color:#374151; line-height:1.5; }
.review-verse { font-size:11px; color:var(--primary); margin-top:3px; font-weight:600; }

/* ── LEADERBOARD ── */
#leaderboard { background:linear-gradient(160deg,#1A1A2E 0%,#16213E 60%,#0F3460 100%); }
.lb-topbar { padding:14px 16px 11px; display:flex; align-items:center; gap:9px; border-bottom:1px solid rgba(255,255,255,0.07); }
.lb-back { width:32px; height:32px; background:rgba(255,255,255,0.07); border:none; border-radius:8px; cursor:pointer; color:#fff; font-size:14px; flex-shrink:0; }
.lb-title-wrap { flex:1; }
.lb-title { font-size:16px; font-weight:800; color:#fff; }
.lb-conn { font-size:10px; margin-top:1px; }
.lb-conn.on { color:#4ADE80; } .lb-conn.off { color:#F87171; }
.lb-clear { padding:4px 9px; background:rgba(192,57,43,0.17); border:1px solid rgba(192,57,43,0.32); border-radius:7px; color:#F87171; font-size:11px; cursor:pointer; font-family:inherit; }
.lb-body { padding:13px; flex:1; overflow-y:auto; }
.lb-toggle-row { display:flex; gap:5px; margin-bottom:9px; }
.lb-tog { flex:1; padding:7px; border-radius:9px; border:1px solid rgba(255,255,255,0.13); background:transparent; color:rgba(255,255,255,0.45); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; }
.lb-tog.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.lb-filter-row { display:flex; gap:5px; margin-bottom:13px; overflow-x:auto; padding-bottom:3px; scrollbar-width:none; }
.lb-filter-row::-webkit-scrollbar { display:none; }
.lf-btn { padding:4px 11px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:rgba(255,255,255,0.42); font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap; font-family:inherit; }
.lf-btn.active { background:var(--secondary); border-color:var(--secondary); color:#fff; }
.lb-live-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; color:#4ADE80; margin-bottom:10px; }
.lb-live-dot { width:6px; height:6px; border-radius:50%; background:#4ADE80; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.lb-row { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:12px 13px; margin-bottom:8px; display:flex; align-items:center; gap:11px; animation:slideUp 0.25s ease; }
.lb-rank { font-size:16px; font-weight:900; width:24px; text-align:center; flex-shrink:0; }
.lb-rank-1{color:#FFD700} .lb-rank-2{color:#C0C0C0} .lb-rank-3{color:#CD7F32}
.lb-rank-o { color:rgba(255,255,255,0.25); font-size:12px; }
.lb-info { flex:1; min-width:0; }
.lb-name { font-size:14px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-meta { font-size:10px; color:rgba(255,255,255,0.35); margin-top:2px; }
.lb-score-col { text-align:right; flex-shrink:0; }
.lb-pct { font-size:18px; font-weight:800; color:var(--secondary); }
.lb-frac { font-size:10px; color:rgba(255,255,255,0.35); margin-top:1px; }
.lb-me { font-size:9px; background:var(--primary); color:#fff; padding:1px 5px; border-radius:7px; margin-left:4px; vertical-align:middle; }
.lb-new { font-size:9px; background:#C0392B; color:#fff; padding:1px 5px; border-radius:7px; margin-left:4px; vertical-align:middle; animation:pop 0.4s ease; }
.lb-empty { text-align:center; color:rgba(255,255,255,0.28); font-size:13px; padding:44px 0; }
.lb-empty-icon { font-size:40px; margin-bottom:9px; }
.lb-loading { text-align:center; color:rgba(255,255,255,0.4); font-size:13px; padding:40px 0; }

/* ── TOAST ── */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); background:rgba(20,20,20,0.93); color:#fff; padding:9px 20px; border-radius:18px; font-size:13px; font-weight:600; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; max-width:320px; text-align:center; white-space:pre-line; line-height:1.6; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
.shake { animation:shake 0.35s ease; }

/* ── EMOJI POPUP ── */
.emoji-popup { position:fixed; pointer-events:none; z-index:9999; font-size:42px; text-align:center; line-height:1; animation:emojiFloat 1.1s ease forwards; }
@keyframes emojiFloat {
  0%   { opacity:0; transform:translateY(0) scale(0.4); }
  20%  { opacity:1; transform:translateY(-20px) scale(1.25); }
  60%  { opacity:1; transform:translateY(-70px) scale(1); }
  100% { opacity:0; transform:translateY(-130px) scale(0.8); }
}
.emoji-popup .ep-label { display:block; font-size:13px; font-weight:900; color:#fff; text-shadow:0 1px 6px rgba(0,0,0,0.55); margin-top:2px; white-space:nowrap; }
/* 정답 버튼 펄스 */
@keyframes correctPulse { 0%{box-shadow:0 0 0 0 rgba(46,139,87,0.6)} 70%{box-shadow:0 0 0 14px rgba(46,139,87,0)} 100%{box-shadow:0 0 0 0 rgba(46,139,87,0)} }
.choice-btn.correct { animation:correctPulse 0.55s ease; }
</style>
</head>
<body>

<!-- ── HOME SCREEN ── -->
<div class="screen" id="home">
  <div class="home-header">
    <div class="home-cross">✝️</div>
    <div class="home-title">성경 퀴즈</div>
    <div class="home-sub">BIBLE QUIZ · 350 QUESTIONS</div>
    <div class="conn-badge offline" id="connBadge">
      <div class="conn-dot"></div><span id="connText">오프라인</span>
    </div>
  </div>

  <div class="name-wrap">
    <div class="slabel">👤 참여자 이름</div>
    <input class="name-input" id="nameInput" type="text" maxlength="12" placeholder="이름을 입력하세요" oninput="onNameInput()">
  </div>

  <div style="width:100%">
    <div class="slabel" style="margin-bottom:7px">📖 성경 범위</div>
    <div class="section-grid">
      <div class="sec-card" data-section="신명기" onclick="toggleSection(this)"><div class="s-chk">✓</div><div class="s-icon">📜</div><div class="s-name">신명기</div><div class="s-cnt">100문제</div></div>
      <div class="sec-card" data-section="여호수아" onclick="toggleSection(this)"><div class="s-chk">✓</div><div class="s-icon">⚔️</div><div class="s-name">여호수아</div><div class="s-cnt">100문제</div></div>
