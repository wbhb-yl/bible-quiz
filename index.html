let fbApp = null, fbDb = null, lbListener = null, fbMode = false;

function initFirebase(cfg) {
  try {
    var existing = firebase.apps.filter(function(a){ return a.name === 'bible-quiz'; });
    fbApp = existing.length > 0 ? existing[0] : firebase.initializeApp(cfg, 'bible-quiz');
    fbDb = firebase.database(fbApp);
    fbMode = true;
    fbDb.ref('.info/connected').on('value', function(snap) {
      updateConnBadge(snap.val() === true);
    });
    return true;
  } catch(e) { fbMode = false; return false; }
}
function updateConnBadge(online) {
  var b = document.getElementById('connBadge');
  var t = document.getElementById('connText');
  var ls = document.getElementById('lbConnStatus');
  var live = document.getElementById('liveBadge');
  if (online) {
    if (b) { b.className = 'conn-badge online'; t.textContent = '공유 리더보드 연결됨'; }
    if (ls) { ls.className = 'lb-conn on'; ls.textContent = '● 실시간 연결됨'; }
    if (live) live.style.display = 'flex';
  } else {
    if (b) { b.className = 'conn-badge offline'; t.textContent = fbMode ? '오프라인 (재연결 중)' : '로컬 저장 모드'; }
    if (ls) { ls.className = 'lb-conn off'; ls.textContent = '● 오프라인'; }
    if (live) live.style.display = 'none';
  }
}

// ── STATE ──
let settings = { count:30, order:'random', diff:'all', explain:'yes', timer:0 };
let selectedSections = new Set(['신명기','여호수아','사사기','넌센스']);
let quizQuestions=[], currentIdx=0, score=0, answered=false;
let wrongQuestions=[], comboCount=0, maxCombo=0;
let currentUserName='', timerInterval=null, timerSec=0;
let lbMode='all', lbFilter='all', lbCount='all', lbAllData=[];

// ── TOAST ──
function showToast(msg, dur) {
  dur = dur||2200; var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},dur);
}

// ── HOME ──
function onNameInput() { updateStartBtn(); checkResume(); }
function toggleSection(card) {
  var s=card.dataset.section;
  if(selectedSections.has(s)){selectedSections.delete(s);card.classList.remove('sel');}
  else{selectedSections.add(s);card.classList.add('sel');}
  updateStartBtn();
}
function selectAll() {
  var all=selectedSections.size===4;
  selectedSections=all?new Set():new Set(['신명기','여호수아','사사기','넌센스']);
  document.querySelectorAll('.sec-card').forEach(function(c){all?c.classList.remove('sel'):c.classList.add('sel');});
  updateStartBtn();
}
function updateStartBtn() {
  var n=document.getElementById('nameInput').value.trim();
  document.getElementById('startBtn').disabled=selectedSections.size===0||n.length===0;
}
function toggleSettings(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}
function setSetting(btn) {
  var k=btn.dataset.key, v=btn.dataset.val;
  if(k==='count' && v==='0') {
    var pool=QUIZ_DATA.filter(function(q){return selectedSections.has(q.section);});
    if(settings.diff!=='all') pool=pool.filter(function(q){return q.difficulty===settings.diff;});
    var sections=[...selectedSections].join(', ') || '없음';
    var diffLabel=settings.diff==='all'?'전체':settings.diff;
    showToast('총 '+pool.length+'문제\n(범위: '+sections+' / 난이도: '+diffLabel+')', 3000);
  }
  settings[k]=(k==='count'||k==='timer')?parseInt(v):v;
  document.querySelectorAll('[data-key="'+k+'"]').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

// ── PROGRESS ──
function saveProgress() {
  localStorage.setItem(PROG_KEY,JSON.stringify({name:currentUserName,questions:quizQuestions,idx:currentIdx,score:score,wrong:wrongQuestions,combo:comboCount,maxCombo:maxCombo,settings:settings,answered:answered}));
}
function clearProgress() { localStorage.removeItem(PROG_KEY); }
function checkResume() {
  var raw=localStorage.getItem(PROG_KEY), btn=document.getElementById('resumeBtn');
  if(!raw){btn.style.display='none';return;}
  try {
    var s=JSON.parse(raw), name=document.getElementById('nameInput').value.trim();
    if(name&&s.name!==name){btn.style.display='none';return;}
    btn.style.display='block';
    document.getElementById('resumeInfo').textContent=s.idx+'/'+s.questions.length+'문제';
  } catch(e){btn.style.display='none';}
}
function resumeQuiz() {
  var raw=localStorage.getItem(PROG_KEY); if(!raw)return;
  var s=JSON.parse(raw);
  currentUserName=s.name; quizQuestions=s.questions; currentIdx=s.idx;
  score=s.score; wrongQuestions=s.wrong||[]; comboCount=s.combo||0; maxCombo=s.maxCombo||0;
  settings=s.settings||settings; answered=s.answered||false;
  document.getElementById('nameInput').value=currentUserName;
  showScreen('quiz'); renderQuestion();
}

// ── QUIZ ──
function startQuiz() {
  currentUserName=document.getElementById('nameInput').value.trim();
  if(!currentUserName){showToast('이름을 입력해주세요!');return;}
  var pool=QUIZ_DATA.filter(function(q){return selectedSections.has(q.section);});
  if(settings.diff!=='all') pool=pool.filter(function(q){return q.difficulty===settings.diff;});
  if(pool.length===0){showToast('해당 조건의 문제가 없습니다.');return;}
  if(settings.order==='random') pool=pool.sort(function(){return Math.random()-0.5;});
  var cnt=settings.count>0?settings.count:pool.length;
  quizQuestions=pool.slice(0,cnt);
  stopTimer();
  currentIdx=0;score=0;answered=false;wrongQuestions=[];comboCount=0;maxCombo=0;
  clearProgress(); showScreen('quiz'); renderQuestion();
}
function retryQuiz(){startQuiz();}

function renderQuestion() {
  stopTimer();
  var q=quizQuestions[currentIdx], total=quizQuestions.length;
  document.getElementById('progText').textContent=(currentIdx+1)+' / '+total;
  document.getElementById('progFill').style.width=((currentIdx/total)*100)+'%';
  document.getElementById('qScore').textContent=score+'점';
  document.getElementById('mSection').textContent=q.section;
  var md=document.getElementById('mDiff'); md.textContent=q.difficulty||''; md.className='mbadge mb-diff-'+(q.difficulty||'하');
  document.getElementById('mNum').textContent='#'+q.id;
  document.getElementById('qText').textContent=q.question;
  updateComboBadge();
  var list=document.getElementById('choicesList'), nums=['1','2','3','4'];
  list.innerHTML='';
  q.choices.forEach(function(c,i){
    var btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML='<span class="cbadge cb-'+(i+1)+'">'+nums[i]+'</span><span class="ctext">'+c+'</span>';
    btn.onclick=function(){selectAnswer(i,btn);};
    list.appendChild(btn);
  });
  document.getElementById('explCard').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
  answered=false;
  if(settings.timer>0){
    timerSec=settings.timer;
    document.getElementById('timerLabel').style.display='inline';
    document.getElementById('timerStrip').style.display='block';
    document.getElementById('timerNum').textContent=timerSec;
    document.getElementById('timerFill').style.transition='none';
    document.getElementById('timerFill').style.width='100%';
    setTimeout(startTimer,50);
  } else {
    document.getElementById('timerLabel').style.display='none';
    document.getElementById('timerStrip').style.display='none';
  }
  saveProgress();
}
function startTimer() {
  var total=settings.timer;
  document.getElementById('timerFill').style.transition='width '+total+'s linear';
  document.getElementById('timerFill').style.width='0%';
  timerInterval=setInterval(function(){
    timerSec--; document.getElementById('timerNum').textContent=timerSec;
    if(timerSec<=0){stopTimer();if(!answered)timeOut();}
  },1000);
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
function timeOut(){
  answered=true;
  var q=quizQuestions[currentIdx];
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true;});
  document.querySelectorAll('.choice-btn')[q.answer].classList.add('correct');
  wrongQuestions.push({q:q,myAns:-1}); comboCount=0; updateComboBadge();
  showEmojiPopup('⏱','시간 초과!', document.querySelectorAll('.choice-btn')[q.answer]);
  showToast('⏱ 시간 초과!'); showExpl(q); showNextBtn();
}
function showEmojiPopup(emoji, label, anchorEl) {
  var rect = anchorEl ? anchorEl.getBoundingClientRect() : {left: window.innerWidth/2-24, top: window.innerHeight/2-24, width:48};
  var el = document.createElement('div');
  el.className = 'emoji-popup';
  el.innerHTML = emoji + (label ? '<span class="ep-label">'+label+'</span>' : '');
  el.style.left = (rect.left + rect.width/2 - 24) + 'px';
  el.style.top  = (rect.top + window.scrollY - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1200);
}

function selectAnswer(idx,btn) {
  if(answered)return; answered=true; stopTimer();
  var q=quizQuestions[currentIdx], btns=document.querySelectorAll('.choice-btn');
  btns.forEach(function(b){b.disabled=true;});
  if(idx===q.answer){
    btn.classList.add('correct'); comboCount++; if(comboCount>maxCombo)maxCombo=comboCount;
    var bonus=comboCount>=3?2:1; score+=bonus;
    document.getElementById('qScore').textContent=score+'점';
    // 이모지 팝업 — 콤보/상황별 반응
    var remaining = settings.timer>0 ? timerSec : -1;
    if(comboCount>=10)     showEmojiPopup('👑','최고예요!', btn);
    else if(comboCount>=5) showEmojiPopup('🔥',comboCount+'연속!', btn);
    else if(comboCount>=3) showEmojiPopup('⚡',comboCount+'콤보!', btn);
    else if(remaining>0 && remaining>=settings.timer*0.7) showEmojiPopup('💨','빠른 정답!', btn);
    else                   showEmojiPopup('⭐','+'+bonus+'점', btn);
    if(comboCount>=3)showToast('🔥 '+comboCount+'연속 콤보! +'+bonus+'점');
  } else {
    btn.classList.add('wrong'); btn.classList.add('shake');
    btns[q.answer].classList.add('correct');
    wrongQuestions.push({q:q,myAns:idx}); comboCount=0;
    showEmojiPopup('💔','아쉬워요', btn);
  }
  updateComboBadge(); showExpl(q); showNextBtn();
}
function updateComboBadge(){
  var b=document.getElementById('comboBadge');
  if(comboCount>=3){b.textContent='🔥 '+comboCount+'콤보';b.classList.add('show');}
  else{b.classList.remove('show');}
}
function showExpl(q){
  if(settings.explain==='yes'&&q.explanation){
    document.getElementById('explText').textContent=q.explanation;
    document.getElementById('explVerse').textContent=q.verse?'📖 '+q.verse:'';
    document.getElementById('explCard').classList.add('show');
  }
}
function showNextBtn(){
  var nb=document.getElementById('nextBtn'),isLast=currentIdx===quizQuestions.length-1;
  nb.textContent=isLast?'결과 보기 🏆':'다음 문제 →'; nb.classList.add('show');
}
function nextQuestion(){
  currentIdx++;
  if(currentIdx>=quizQuestions.length){clearProgress();showResult();}
  else{renderQuestion();window.scrollTo(0,0);}
}
function confirmBack(){
  if(confirm('퀴즈를 중단할까요? 진행 상황은 저장됩니다.')){saveProgress();goHome();}
}

// ── RESULT ──
function showResult(){
  stopTimer();
  if(!quizQuestions||quizQuestions.length===0){showToast('문제 데이터가 없습니다.');goHome();return;}
  var total=quizQuestions.length, correct=total-wrongQuestions.length, pct=Math.round((correct/total)*100);
  document.getElementById('stTotal').textContent=total;
  document.getElementById('stCorrect').textContent=correct;
  document.getElementById('stWrong').textContent=wrongQuestions.length;
  document.getElementById('stCombo').textContent=maxCombo;
  document.getElementById('scorePct').textContent=pct+'%';
  var circ=2*Math.PI*65;
  setTimeout(function(){document.getElementById('sfill').style.strokeDashoffset=circ*(1-pct/100);},300);
  var icon,title,msg;
  if(pct>=90){icon='🏆';title='완벽합니다!';msg='성경 말씀을 정말 잘 알고 계시네요! 하나님의 말씀이 마음에 가득하십니다.';}
  else if(pct>=70){icon='⭐';title='훌륭해요!';msg='대부분의 말씀을 잘 알고 계세요. 조금만 더 공부하면 완벽할 것 같아요!';}
  else if(pct>=50){icon='📖';title='잘 하셨어요!';msg='절반 이상 맞추셨어요! 말씀을 더 깊이 묵상해 보세요.';}
  else{icon='🌱';title='도전해 보세요!';msg='성경 말씀을 더 읽고 공부해 봐요. 다시 도전하면 더 잘할 수 있어요!';}
  document.getElementById('resultIcon').textContent=icon;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultMsg').textContent=msg;
  if(wrongQuestions.length>0){document.getElementById('reviewBtn').style.display='block';document.getElementById('wrongCnt').textContent=wrongQuestions.length;}
  else{document.getElementById('reviewBtn').style.display='none';}
  var sections=[...new Set(quizQuestions.map(function(q){return q.section;}))].join(', ');
  saveRecord({name:currentUserName,score:score,total:total,correct:correct,pct:pct,sections:sections,maxCombo:maxCombo,date:new Date().toISOString()});
  showScreen('result');
}

// ── LEADERBOARD DATA ──
function saveRecord(r) {
  if(fbMode && fbDb) {
    fbDb.ref('leaderboard').push(r).catch(function(e){ console.warn('FB write error',e); saveLocalRecord(r); });
  } else { saveLocalRecord(r); }
}
function saveLocalRecord(r) {
  var d=[]; try{d=JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch(e){}
  d.push(r); localStorage.setItem(LB_KEY,JSON.stringify(d));
}
function clearLb(){
  if(!confirm('리더보드를 초기화할까요?'))return;
  if(fbMode&&fbDb){
    fbDb.ref('leaderboard').remove().then(function(){showToast('초기화되었습니다.');}).catch(function(){showToast('초기화 실패.');});
  } else { localStorage.removeItem(LB_KEY); renderLbList([]); showToast('초기화되었습니다.'); }
}

// ── LEADERBOARD SCREEN ──
function showLeaderboard(){
  lbMode='all';lbFilter='all';lbCount='all';
  document.querySelectorAll('.lb-tog').forEach(function(b){b.classList.toggle('active',b.dataset.mode==='all');});
  document.querySelectorAll('#lbSectionFilter .lf-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter==='all');});
  document.querySelectorAll('#lbCountFilter .lf-btn').forEach(function(b){b.classList.toggle('active',b.dataset.count==='all');});
  showScreen('leaderboard');
  if(fbMode&&fbDb){
    document.getElementById('lbList').innerHTML='<div class="lb-loading">실시간 데이터 불러오는 중...</div>';
    if(lbListener){fbDb.ref('leaderboard').off('value',lbListener);lbListener=null;}
    lbListener=fbDb.ref('leaderboard').on('value',function(snap){
      var raw=snap.val(), arr=[];
      if(raw) Object.values(raw).forEach(function(v){arr.push(v);});
      lbAllData=arr; renderLbList(arr);
    });
  } else {
    var arr=[]; try{arr=JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch(e){}
    lbAllData=arr; renderLbList(arr);
  }
}
function setLbMode(btn){
  lbMode=btn.dataset.mode;
  document.querySelectorAll('.lb-tog').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); renderLbList(lbAllData);
}
function setLbFilter(btn){
  lbFilter=btn.dataset.filter;
  document.querySelectorAll('#lbSectionFilter .lf-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); renderLbList(lbAllData);
}
function setLbCount(btn){
  lbCount=btn.dataset.count;
  document.querySelectorAll('#lbCountFilter .lf-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); renderLbList(lbAllData);
}
function renderLbList(rawData){
  var list=document.getElementById('lbList');
  var data=rawData.slice();
  if(lbFilter!=='all') data=data.filter(function(r){return r.sections&&r.sections.includes(lbFilter);});
  if(lbCount!=='all') data=data.filter(function(r){return r.total===parseInt(lbCount);});
  var today=new Date().toDateString();
  if(lbMode==='today') data=data.filter(function(r){return new Date(r.date).toDateString()===today;});
  if(lbMode==='best'){
    var best={};
    data.forEach(function(r){if(!best[r.name]||r.pct>best[r.name].pct||(r.pct===best[r.name].pct&&r.score>best[r.name].score))best[r.name]=r;});
    data=Object.values(best);
  }
  data.sort(function(a,b){return b.pct-a.pct||b.score-a.score;});
  if(data.length===0){list.innerHTML='<div class="lb-empty"><div class="lb-empty-icon">📋</div>아직 기록이 없어요!</div>';return;}
  var medals=['🥇','🥈','🥉'];
  var now=Date.now();
  list.innerHTML=data.map(function(r,i){
    var rank=i<3?'<span class="lb-rank lb-rank-'+(i+1)+'">'+medals[i]+'</span>':'<span class="lb-rank lb-rank-o">'+(i+1)+'</span>';
    var me=(r.name===currentUserName)?'<span class="lb-me">나</span>':'';
    var isNew=(now-new Date(r.date).getTime())<60000?'<span class="lb-new">NEW</span>':'';
    var d=new Date(r.date);
    var ds=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    var comboStr=r.maxCombo?'콤보 '+r.maxCombo+' · ':'';
    return '<div class="lb-row">'+rank+'<div class="lb-info"><div class="lb-name">'+r.name+me+isNew+'</div><div class="lb-meta">'+comboStr+r.sections+' · '+ds+'</div></div><div class="lb-score-col"><div class="lb-pct">'+r.pct+'%</div><div class="lb-frac">'+r.score+'pt · '+r.correct+'/'+r.total+'</div></div></div>';
  }).join('');
}

// ── REVIEW ──
function showReview(){
  var body=document.getElementById('reviewBody'), nums=['1','2','3','4'];
  body.innerHTML=wrongQuestions.map(function(item,i){
    var q=item.q,myAns=item.myAns;
    var choices=q.choices.map(function(c,ci){
      var cls=ci===q.answer?'correct':ci===myAns?'my-wrong':'';
      return '<div class="review-choice '+cls+'"><span class="cbadge cb-'+(ci+1)+'" style="width:24px;height:24px;font-size:12px;border-radius:7px;">'+nums[ci]+'</span><span>'+c+'</span></div>';
    }).join('');
    var expl=q.explanation?'<div class="review-expl">'+q.explanation+(q.verse?'<div class="review-verse">📖 '+q.verse+'</div>':'')+'</div>':'';
    return '<div class="review-item"><div class="review-q-num">'+(i+1)+'번 오답 · #'+q.id+' · '+q.section+'</div><div class="review-q-text">'+q.question+'</div><div class="review-choices">'+choices+'</div>'+expl+'</div>';
  }).join('');
  showScreen('review');
}

// ── SHARE ──
function shareResult(){
  if(!quizQuestions||quizQuestions.length===0){showToast('공유할 결과가 없습니다.');return;}
  var total=quizQuestions.length, correct=total-wrongQuestions.length, pct=Math.round((correct/total)*100);
  var text='✝️ 성경 퀴즈 결과\n'+currentUserName+' · '+pct+'% ('+correct+'/'+total+'문제)\n최대 콤보: '+maxCombo+'연속\n#성경퀴즈 #BibleQuiz';
  if(navigator.share){navigator.share({title:'성경 퀴즈 결과',text:text}).catch(function(){});}
  else{navigator.clipboard.writeText(text).then(function(){showToast('📋 클립보드에 복사되었습니다!');}).catch(function(){showToast('복사에 실패했습니다.');});}
}

// ── UTILS ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active'); window.scrollTo(0,0);
}
function goHome(){
  stopTimer();
  if(lbListener&&fbDb){fbDb.ref('leaderboard').off('value',lbListener);lbListener=null;}
  showScreen('home'); checkResume();
}

// ── INIT ──
(function(){
  document.querySelectorAll('.sec-card').forEach(function(c){c.classList.add('sel');});
  initFirebase(FIREBASE_CONFIG);
  showScreen('home');
  checkResume();
})();
</script>
