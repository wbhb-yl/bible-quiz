const QUIZ_DATA = [{"id": 1, "section": "신명기", "question": "신명기 전체의 배경이 되는 요단 저쪽 설교 장소는?", "choices": ["시내 광야", "모압 평지", "에돔", "가나안"], "answer": 1, "explanation": "가나안 입성을 앞둔 모압 평지에서 선포되었습니다. 광야 1세대가 아닌 가나안에 들어갈 2세대에게 언약을 갱신하는 역사적 장소입니다.", "difficulty": "하", "verse": "신 1:1"}, {"id": 2, "section": "신명기", "question": "모세가 이 설교를 전한 날은 출애굽 제몇 년째인가요?", "choices": ["1년", "10년", "30년", "40년"], "answer": 3, "explanation": "출애굽 제40년 11월 1일입니다. 모세의 생애 마지막 달에 선포된 유언과도 같은 설교임을 알 수 있습니다.", "difficulty": "하", "verse": "신 1:3"}, {"id": 3, "section": "신명기", "question": "리더 선출 시 모세가 강조한 3가지 덕목은?", "choices": ["지혜, 지식, 인정", "권력, 돈, 외모", "나이, 가문, 지식", "용기, 힘, 재산"], "answer": 0, "explanation": "**지혜(영적 분별력), 지식(말씀의 이해), 인정받는 것(공동체의 신뢰)**입니다. 하나님 나라는 세상적 조건이 아닌 영적 실력과 인격으로 다스려짐을 뜻합니다.", "difficulty": "중", "verse": "신 1:13"}, {"id": 4, "section": "신명기", "question": "하나님이 광야에서 이스라엘을 인도하신 감동적인 비유는?", "choices": ["독수리 날개", "사람이 아들을 안음", "목자와 양", "구름 기둥"], "answer": 1, "explanation": "사람이 자기 아들을 안는 것 같이 인도하셨다고 표현합니다. 이는 이스라엘의 연약함을 하나님께서 아버지의 심정으로 끝까지 품어주셨음을 의미합니다.", "difficulty": "중", "verse": "신 1:31"}, {"id": 5, "section": "신명기", "question": "가데스 바네아 사건 때 \"여호와를 온전히 따랐다\"고 칭찬받은 자는?", "choices": ["모세", "여호수아", "갈렙", "아론"], "answer": 2, "explanation": "여분네의 아들 갈렙입니다. 그는 정탐 후 불신앙에 빠진 백성들 사이에서 오직 하나님의 약속만을 온전히 신뢰하며 따랐던 믿음의 사람입니다.", "difficulty": "중", "verse": "신 1:36"}, {"id": 6, "section": "신명기", "question": "에서의 자손에게 기업으로 주신 산의 이름은?", "choices": ["세일 산", "시내 산", "에발 산", "느보 산"], "answer": 0, "explanation": "세일 산입니다. 하나님은 이스라엘뿐 아니라 에서에게도 기업을 주셨으므로, 그들의 경계를 존중하라고 명령하셨습니다. 하나님의 주권은 온 열방에 미칩니다.", "difficulty": "중", "verse": "신 2:5"}, {"id": 7, "section": "신명기", "question": "가데스 바네아에서 세렛 시내를 건너기까지 걸린 기간은?", "choices": ["7년", "12년", "38년", "40년"], "answer": 2, "explanation": "38년입니다. 출애굽 전체 40년 중, 불신앙으로 인해 광야에서 방황하며 1세대가 다 죽기까지 걸린 징계의 시간을 상징합니다.", "difficulty": "상", "verse": "신 2:14"}, {"id": 8, "section": "신명기", "question": "거인 족속 바산 왕 옥의 위용을 보여주는 침대의 재질은?", "choices": ["금", "은", "철", "구리"], "answer": 2, "explanation": "철 침대입니다. 길이는 9규빗(약 4m), 너비는 4규빗(약 1.8m)에 달했습니다. 이스라엘이 이긴 대적이 인간적으로 얼마나 강력했는지를 대조적으로 보여줍니다.", "difficulty": "상", "verse": "신 3:11"}, {"id": 9, "section": "신명기", "question": "모세가 가나안 땅을 사모하며 부른 명칭은 무엇입니까?", "choices": ["젖과 꿀의 땅", "아름다운 산", "금의 성읍", "소망의 땅"], "answer": 1, "explanation": "아름다운 산과 레바논입니다. 모세는 약속의 땅을 단순히 지형적인 땅이 아니라 하나님의 영광이 거할 거룩하고 아름다운 처소로 바라보았습니다.", "difficulty": "상", "verse": "신 3:25"}, {"id": 10, "section": "신명기", "question": "하나님의 말씀에 대해 우리가 취해야 할 절대 태도는?", "choices": ["가감하지 말라", "조금 고쳐라", "왕만 지켜라", "외우기만 하라"], "answer": 0, "explanation": "가감하지 말라입니다. 말씀에 인간의 생각을 더하거나(加) 자기 편의대로 빼는(減) 것을 엄격히 금하셨습니다. 말씀의 절대 권위를 상징합니다.", "difficulty": "하", "verse": "신 4:2"}, {"id": 11, "section": "신명기", "question": "하나님은 어떤 불이라고 성경은 기록하나요?", "choices": ["타오르는 불", "소멸하는 불", "따뜻한 불", "영원한 불"], "answer": 1, "explanation": "소멸하는 불입니다. 이는 하나님의 거룩함을 침해하는 죄와 우상 숭배를 결코 용납하지 않으시고 태워버리시는 공의로운 성품을 뜻합니다.", "difficulty": "중", "verse": "신 4:24"}, {"id": 12, "section": "신명기", "question": "요단 동쪽(이쪽)에 설치한 도피성의 개수는?", "choices": ["1개", "2개", "3개", "6개"], "answer": 2, "explanation": "3개입니다. 베셀, 길앗 라못, 골란입니다. 부지중에 살인한 자의 생명을 보호하려는 하나님의 자비가 구체적인 행정으로 나타난 제도입니다.", "difficulty": "중", "verse": "신 4:41"}, {"id": 13, "section": "신명기", "question": "십계명 중 제1계명은 무엇입니까?", "choices": ["다른 신을 두지 말라", "우상 금지", "살인 금지", "부모 공경"], "answer": 0, "explanation": "나 외에는 다른 신들을 네게 두지 말지니라. 모든 신앙의 기초이며, 오직 여호와만이 삶의 주인임을 고백하는 최우선 명령입니다.", "difficulty": "하", "verse": "신 5:6"}, {"id": 14, "section": "신명기", "question": "신명기에서 안식일을 지키라고 명하신 특별한 근거는?", "choices": ["창조의 기념", "종 되었던 집에서 구원", "휴식을 위해", "제사를 위해"], "answer": 1, "explanation": "출애굽기(20장)가 창조를 강조한다면, 신명기는 구원을 강조합니다. 애굽의 종살이에서 건져주신 은혜를 기억하며 평등한 안식을 누리라는 의미입니다.", "difficulty": "중", "verse": "신 5:12"}, {"id": 15, "section": "신명기", "question": "약속이 있는 첫 계명인 부모 공경은 몇 번째 계명인가요?", "choices": ["1계명", "3계명", "5계명", "10계명"], "answer": 2, "explanation": "제5계명입니다. 인간관계의 첫 번째 계명으로, 눈에 보이는 권위인 부모를 공경함으로 하나님을 경외하는 법을 배우게 하셨습니다.", "difficulty": "하", "verse": "신 5:16"}, {"id": 16, "section": "신명기", "question": "십계명의 마지막 제10계명은 무엇에 대한 금지인가요?", "choices": ["도둑질", "거짓 증언", "탐내지 말라", "살인"], "answer": 2, "explanation": "탐내지 말라입니다. 행동 이전에 마음의 욕심이 죄의 뿌리임을 지적하신 계명으로, 자족하는 삶을 가르칩니다.", "difficulty": "하", "verse": "신 5:21"}, {"id": 17, "section": "신명기", "question": "\"이스라엘아 들으라\"로 시작하는 신앙 고백의 명칭은?", "choices": ["테필린", "메주자", "쉐마", "코르반"], "answer": 2, "explanation": "**쉐마(Shema)**입니다. 유대인들이 매일 아침저녁으로 고백하는 신앙의 정수이며, 하나님은 오직 한 분이심을 선포하는 교육의 기초입니다.", "difficulty": "하", "verse": "신 6:4"}, {"id": 18, "section": "신명기", "question": "하나님을 사랑하되 무엇을 다하라고 했나요?", "choices": ["마음, 뜻, 힘", "돈, 명예, 권력", "지식, 기술, 지혜", "시간, 노력, 정성"], "answer": 0, "explanation": "마음, 뜻(목숨), 힘입니다. 이는 감정과 의지, 생명과 소유를 포함한 전 인격적인 사랑을 의미합니다.", "difficulty": "하", "verse": "신 6:5"}, {"id": 19, "section": "신명기", "question": "말씀을 손목에 매고 어디에 붙여 표로 삼으라고 했나요?", "choices": ["가슴", "발목", "미간", "어깨"], "answer": 2, "explanation": "미간입니다. 항상 말씀을 눈앞에 두고 생각의 기준으로 삼으며, 손목(행동)을 통해 말씀대로 살라는 교육적 지침입니다.", "difficulty": "중", "verse": "신 6:8"}, {"id": 20, "section": "신명기", "question": "가나안 족속을 진멸(헤렘)해야 하는 이유는 무엇인가요?", "choices": ["땅이 좁아서", "무서워서", "우상 숭배 전염 방지", "미워해서"], "answer": 2, "explanation": "우상 숭배의 죄가 이스라엘에 전염되지 않게 하기 위함입니다. '헤렘'은 온전히 하나님께 바쳐진다는 뜻으로 거룩함의 유지를 뜻합니다.", "difficulty": "중", "verse": "신 7:2"}, {"id": 21, "section": "신명기", "question": "하나님이 이스라엘을 선택하신 결정적인 이유는?", "choices": ["수효가 많아서", "수효가 적음에도 사랑하셔서", "강해서", "지혜로워서"], "answer": 1, "explanation": "이스라엘이 가장 적은 민족임에도 불구하고 하나님이 일방적으로 사랑하시고 약속을 지키기로 하셨기 때문입니다. 이것이 '은혜'의 본질입니다.", "difficulty": "중", "verse": "신 7:7"}, {"id": 22, "section": "신명기", "question": "광야에서 만나를 먹이신 가장 큰 영적 교훈은?", "choices": ["배부름", "요리 전수", "말씀으로 사는 줄 알게 함", "만나가 귀함"], "answer": 2, "explanation": "사람은 육신의 떡으로만 사는 것이 아니라, 여호와의 입에서 나오는 모든 말씀으로 살아야 하는 영적 존재임을 가르치신 것입니다.", "difficulty": "하", "verse": "신 8:3"}, {"id": 23, "section": "신명기", "question": "광야 40년 동안 하나님이 베푸신 세밀한 기적은?", "choices": ["옷이 안 낡음, 발이 안 부르틈", "키가 커짐", "매일 고기만 먹음", "잠이 안 옴"], "answer": 0, "explanation": "의복이 해어지지 않고 발이 부르트지 않게 하셨습니다. 거대한 기적뿐만 아니라 백성의 사소한 필요까지 돌보시는 하나님의 세밀한 돌보심입니다.", "difficulty": "중", "verse": "신 8:4"}, {"id": 24, "section": "신명기", "question": "모세가 금송아지 사건 때 두 돌판을 던져 깨뜨린 의미는?", "choices": ["무거워서", "언약 파괴의 상징", "실수", "화나서"], "answer": 1, "explanation": "돌판이 깨진 것은 이스라엘의 배교로 인해 하나님과의 언약 관계가 파기되었음을 시각적으로 선포한 것입니다.", "difficulty": "하", "verse": "신 9:17"}, {"id": 25, "section": "신명기", "question": "하나님이 요구하시는 신앙의 본질적 모습이 아닌 것은?", "choices": ["경외함", "사랑함", "화려한 제사", "도를 행함"], "answer": 2, "explanation": "하나님은 외형적인 화려한 제사나 종교 의식보다 하나님을 경외하고 사랑하며 순종하는 '중심'을 원하십니다.", "difficulty": "중", "verse": "신 10:12"}, {"id": 26, "section": "신명기", "question": "가나안 땅은 애굽과 달리 무엇을 흡수하는 땅입니까?", "choices": ["비", "햇빛", "모래", "이슬"], "answer": 0, "explanation": "비입니다. 나일강 물을 끌어쓰는 애굽과 달리, 하늘에서 내리는 비(은혜)에 전적으로 의존해야 살 수 있는 '믿음의 땅'임을 의미합니다.", "difficulty": "상", "verse": "신 11:11"}, {"id": 27, "section": "신명기", "question": "순종할 때 주시는 '이른 비와 늦은 비'는 각각 언제 오나요?", "choices": ["파종기와 수확기", "봄과 가을", "아침과 저녁", "여름과 겨울"], "answer": 0, "explanation": "**파종기(이른 비, 10-11월)**와 **수확기(늦은 비, 3-4월)**입니다. 농작물 성장의 결정적 시기에 주시는 시의적절한 은혜를 뜻합니다.", "difficulty": "중", "verse": "신 11:14"}, {"id": 28, "section": "신명기", "question": "예배의 장소는 누가 정한 곳이어야 합니까?", "choices": ["각자 편한 곳", "왕이 정한 곳", "하나님이 택하실 그곳", "산꼭대기"], "answer": 2, "explanation": "여호와께서 자기 이름을 두시려고 택하신 곳입니다. 이는 예배가 내 기분이나 소견대로가 아니라 하나님의 질서대로 드려져야 함을 강조합니다.", "difficulty": "중", "verse": "신 12:5"}, {"id": 29, "section": "신명기", "question": "제물을 먹을 때 피를 먹지 말아야 하는 근본 이유는?", "choices": ["건강에 나쁨", "피는 생명이므로", "맛이 없음", "냄새나서"], "answer": 1, "explanation": "피는 그 생명인즉 생명의 주권이 창조주 하나님께 있음을 고백하는 행위입니다. 함부로 생명을 취하지 말라는 존중의 법입니다.", "difficulty": "하", "verse": "신 12:23"}, {"id": 30, "section": "신명기", "question": "기적을 행하며 다른 신을 섬기자고 하는 자는 어떻게 하나요?", "choices": ["따른다", "죽여라", "상 준다", "토론한다"], "answer": 1, "explanation": "아무리 신비한 이적이 일어날지라도 말씀의 기준을 벗어나 우상을 섬기게 한다면 그는 거짓 선지자이므로 단호히 제거해야 합니다.", "difficulty": "상", "verse": "신 13:5"}, {"id": 31, "section": "신명기", "question": "하나님은 이스라엘을 무엇이라 부르며 몸을 베지 말라 했나요?", "choices": ["성민(거룩한 백성)", "이방인", "죄인", "군사"], "answer": 0, "explanation": "**성민(Holy People)**입니다. 죽은 자를 위해 몸을 해치는 이방 풍습을 따르지 말고, 하나님의 구별된 소유임을 잊지 말라는 뜻입니다.", "difficulty": "하", "verse": "신 14:1"}, {"id": 32, "section": "신명기", "question": "부정한 짐승 중 '돼지'가 먹지 못할 동물인 이유는?", "choices": ["새김질을 안 해서", "굽이 안 갈라져서", "더러워서", "잡식이라서"], "answer": 0, "explanation": "돼지는 굽은 갈라졌으나 새김질을 하지 않기 때문입니다. 성경은 쪽발(구별)과 새김질(묵상) 두 기준을 모두 충족해야 정한 것으로 봅니다.", "difficulty": "중", "verse": "신 14:6"}, {"id": 33, "section": "신명기", "question": "십일조 제물 대신 돈으로 바꿔 가서 사 먹을 수 있는 곳은?", "choices": ["시장", "자기 집", "하나님이 택하신 곳", "이웃집"], "answer": 2, "explanation": "거리가 너무 멀면 제물을 돈으로 바꿔 하나님이 택하신 곳에 가서 원하는 것을 사 공동체와 즐거워할 수 있게 배려하셨습니다.", "difficulty": "중", "verse": "신 14:26"}, {"id": 34, "section": "신명기", "question": "매 7년 끝에 돌아오는 빚을 면제해주는 해의 명칭은?", "choices": ["희년", "면제년", "안식일", "유월절"], "answer": 1, "explanation": "면제년입니다. 가난한 자가 영구적으로 노예가 되거나 도태되지 않게 하여 공동체의 샬롬(평화)을 유지하는 자비의 법입니다.", "difficulty": "중", "verse": "신 15:1"}, {"id": 35, "section": "신명기", "question": "3대 절기 때 하나님을 뵐 때 금지 사항은 무엇입니까?", "choices": ["큰 소리 내기", "빈손으로 나오기", "늦게 오기", "울기"], "answer": 1, "explanation": "빈손으로 여호와를 뵙지 말고 하나님이 주신 복을 따라 그 힘대로 예물을 드려야 합니다. 은혜에 대한 마땅한 감사의 태도입니다.", "difficulty": "상", "verse": "신 16:16"}, {"id": 36, "section": "신명기", "question": "재판관이 뇌물을 받으면 어떤 비극이 생깁니까?", "choices": ["부자가 됨", "지혜자의 눈이 어두워짐", "목소리가 커짐", "인기가 많아짐"], "answer": 1, "explanation": "뇌물은 단순히 돈을 받는 행위가 아니라, 지혜로운 자의 눈을 멀게 하고 의로운 말을 굽게 하여 공의를 파괴하기 때문에 엄히 금하셨습니다.", "difficulty": "하", "verse": "신 16:19"}, {"id": 37, "section": "신명기", "question": "왕이 군사력을 의지하여 애굽으로 돌아가지 말아야 할 대상은?", "choices": ["금", "은", "말(병마)", "옷"], "answer": 2, "explanation": "**말(병마)**입니다. 왕이 막강한 기마대를 갖추게 되면 하나님보다 인간의 힘을 의지할 위험이 크기 때문입니다.", "difficulty": "중", "verse": "신 17:16"}, {"id": 38, "section": "신명기", "question": "이스라엘 왕이 평생 옆에 두고 읽어야 할 특별한 책은?", "choices": ["무예지", "보물지도", "율법서 등사본", "이방 서적"], "answer": 2, "explanation": "율법서 등사본입니다. 왕 또한 한 사람의 백성으로서 하나님의 법 아래 순종해야 함을 가르칩니다.", "difficulty": "중", "verse": "신 17:18"}, {"id": 39, "section": "신명기", "question": "장차 오실 선지자(예수님)를 누구와 같은 선지자라 했나요?", "choices": ["아브라함", "모세", "다윗", "엘리야"], "answer": 1, "explanation": "모세와 같은 선지자입니다. 하나님과 대면하며 말씀을 전하고 백성을 구원했던 모세처럼, 인류를 구원할 참 중보자를 예표합니다.", "difficulty": "중", "verse": "신 18:15"}, {"id": 40, "section": "신명기", "question": "도피성으로 가는 길을 어떻게 닦아야 하나요?", "choices": ["좁게", "숨겨 놓음", "닦아 놓아야 함(대로 마련)", "울퉁불퉁하게"], "answer": 2, "explanation": "실수로 살인한 자가 보복자에게 잡히기 전 신속히 피하도록 길을 잘 닦아(준비해) 두어야 했습니다. 생명을 아끼시는 법입니다.", "difficulty": "하", "verse": "신 19:3"}, {"id": 41, "section": "신명기", "question": "조상이 정한 이웃의 무엇을 옮기지 말라고 하셨나요?", "choices": ["지계석(경계표)", "나무", "텐트", "제단"], "answer": 0, "explanation": "**지계석(경계표)**입니다. 하나님이 각 지파와 가족에게 주신 기업의 경계를 존중하라는 재산권 보호이자 공의의 법입니다.", "difficulty": "중", "verse": "신 19:14"}, {"id": 42, "section": "신명기", "question": "눈에는 눈, 이에는 이... 이 법의 근본 취지는?", "choices": ["복수 권장", "공정한 처벌과 과도한 보복 금지", "무조건 용서", "싸움 조장"], "answer": 1, "explanation": "동해보복법입니다. 받은 피해 이상의 과도한 복수를 금지하고, 죄의 무게만큼만 공정하게 처벌하여 정의를 세우는 법입니다.", "difficulty": "하", "verse": "신 19:21"}, {"id": 43, "section": "신명기", "question": "전쟁터에서 제사장이 백성에게 외친 가장 중요한 말은?", "choices": ["강하고 담대하라 하나님이 싸우신다", "무기를 점검하라", "도망가라", "왕을 믿으라"], "answer": 0, "explanation": "전쟁은 숫자가 아니라 하나님께 속한 것임을 선언하는 것입니다. 하나님이 함께하시니 두려워 말라는 영적 격려입니다.", "difficulty": "상", "verse": "신 20:2"}, {"id": 44, "section": "신명기", "question": "전쟁 중에도 열매 맺는 나무는 찍지 말라고 하신 이유는?", "choices": ["나무가 사람이 아니므로", "나무 심기 힘들어서", "땔감 부족", "냄새나서"], "answer": 0, "explanation": "\"수목이 사람이냐 네가 에워싸게?\" 하나님은 인간의 목적을 위해 무분별하게 자연과 생존권을 파괴하는 것을 금하셨습니다.", "difficulty": "상", "verse": "신 20:19"}, {"id": 45, "section": "신명기", "question": "미워하는 아내의 아들이라도 장자라면 기업을 몇 배 주나요?", "choices": ["1배", "2배", "3배", "다 준다"], "answer": 1, "explanation": "**두 몫(2배)**입니다. 아버지의 주관적인 감정에 의해 정당한 장자의 권리가 박탈되지 않도록 하신 공평한 법입니다.", "difficulty": "중", "verse": "신 21:17"}, {"id": 46, "section": "신명기", "question": "나무에 달린 시체를 밤새 두지 말라는 이유는 땅이 무엇을?", "choices": ["더러워질까 봐", "저주받을까 봐", "좁아질까 봐", "비옥해질까 봐"], "answer": 1, "explanation": "나무에 달린 자는 하나님께 저주를 받은 자이므로, 그 시체를 방치하여 하나님이 주신 땅을 더럽히지 말라는 거룩함의 유지입니다.", "difficulty": "하", "verse": "신 21:23"}, {"id": 47, "section": "신명기", "question": "길 잃은 이웃의 가축을 보고 '못 본 체' 하지 말라는 뜻은?", "choices": ["반드시 주인에게 돌려줌", "그냥 지나감", "경찰 신고", "자기가 가짐"], "answer": 0, "explanation": "이웃의 곤란함을 방관하지 말고 적극적인 사랑과 배려를 실천하라는 구체적인 이웃 사랑의 규례입니다.", "difficulty": "하", "verse": "신 22:1"}, {"id": 48, "section": "신명기", "question": "남녀 의복 구별 규례를 어기는 자는 하나님께 어떤 자인가요?", "choices": ["가증한 자", "멋진 자", "유행하는 자", "예쁜 자"], "answer": 0, "explanation": "가증한 자입니다. 이는 단순히 옷차림의 문제가 아니라 하나님이 세우신 남녀 성별의 창조 질서를 존중하라는 의미입니다.", "difficulty": "중", "verse": "신 22:5"}, {"id": 49, "section": "신명기", "question": "암몬과 모압 사람이 여호와의 총회에 못 들어오는 이유는?", "choices": ["영접하지 않고 저주하려 해서", "못생겨서", "부자라서", "지혜로워서"], "answer": 0, "explanation": "이스라엘의 고난 중에 떡과 물로 영접하지 않았고, 도리어 발람을 사서 저주하려 했기 때문입니다. 형제애가 없는 행동에 대한 심판입니다.", "difficulty": "상", "verse": "신 23:3"}, {"id": 50, "section": "신명기", "question": "하나님께 서원한 것을 갚기를 더디 하지 말라는 이유는?", "choices": ["하나님이 돈이 필요함", "죄가 되기 때문", "잊어버림", "벌금이 무서움"], "answer": 1, "explanation": "하나님과의 약속을 가벼이 여기는 것은 불신앙의 죄입니다. 서원은 자발적인 것이나 일단 뱉은 말은 신실하게 지켜야 합니다.", "difficulty": "중", "verse": "신 23:21"}, {"id": 51, "section": "신명기", "question": "갓 장가든 남자를 1년간 군대 면제해준 감동적인 이유는?", "choices": ["아내를 즐겁게 하려고", "쉬게 하려고", "아기 낳으려고", "공부하려고"], "answer": 0, "explanation": "\"그가 맞이한 아내를 즐겁게 할지니라.\" 국가의 의무보다 한 가정의 행복을 우선시하신 하나님의 세심한 인권 보호입니다.", "difficulty": "하", "verse": "신 24:5"}, {"id": 52, "section": "신명기", "question": "전당 잡지 말아야 할 '맷돌'이 상징하는 것은?", "choices": ["생명", "재산", "명예", "우정"], "answer": 0, "explanation": "맷돌은 생계를 유지하는 도구입니다. 이를 빼앗는 것은 사람의 생명을 볼모로 잡는 것과 같기에 하나님이 엄히 금하셨습니다.", "difficulty": "상", "verse": "신 24:6"}, {"id": 53, "section": "신명기", "question": "추수 때 잊어버린 곡식 단을 가지러 가지 말라는 이유는?", "choices": ["귀찮아서", "객과 고아와 과부를 위해", "새를 위해", "법이 엄해서"], "answer": 1, "explanation": "가난한 이웃이 구걸하지 않고도 스스로 양식을 얻게 하려는 하나님의 긍휼 경영이자 복지 제도입니다.", "difficulty": "하", "verse": "신 24:19"}, {"id": 54, "section": "신명기", "question": "매를 때릴 때 40대라는 한계를 둔 근본적 이유는?", "choices": ["팔 아파서", "형제를 경히 여길까 봐", "시간 부족", "숫자 착각"], "answer": 1, "explanation": "죄인이라도 하나님의 형상입니다. 과도한 체벌로 **인간의 존엄성이 훼손되는 것(경히 여김)**을 막으려는 인권법입니다.", "difficulty": "중", "verse": "신 25:3"}, {"id": 55, "section": "신명기", "question": "곡식 떠는 소에게 망을 씌우지 말라는 명령의 교훈은?", "choices": ["소가 화내서", "수고한 자의 먹을 권리 존중", "소 힘내라고", "망이 비싸서"], "answer": 1, "explanation": "짐승조차 배려하시는 하나님이십니다. 바울은 이를 인용해 사역자가 정당한 대우를 받는 것이 마땅함을 가르쳤습니다.", "difficulty": "중", "verse": "신 25:4"}, {"id": 56, "section": "신명기", "question": "광야 길에서 이스라엘의 약한 자들을 공격한 비열한 족속은?", "choices": ["아말렉", "모압", "에돔", "헷"], "answer": 0, "explanation": "아말렉입니다. 그들은 하나님을 두려워하지 않고 지친 약자들을 공격했습니다. 하나님은 이 악행을 잊지 않겠다고 하셨습니다.", "difficulty": "중", "verse": "신 25:17"}, {"id": 57, "section": "신명기", "question": "셋째 해 십일조를 드릴 때 특히 돌봐야 할 대상이 아닌 자는?", "choices": ["레위인", "객", "고아와 과부", "제사장"], "answer": 3, "explanation": "이 구제 십일조는 성소 유지가 아니라 **사회적 약자들(레위인, 객, 고아, 과부)**의 생존을 위해 사용되었습니다.", "difficulty": "상", "verse": "신 26:12"}, {"id": 58, "section": "신명기", "question": "요단 도하 후 석회를 바른 큰 돌들에 율법을 기록할 산은?", "choices": ["시내 산", "갈멜 산", "에발 산", "그리심 산"], "answer": 2, "explanation": "에발 산입니다. 저주의 산에 율법을 기록하고 제단을 쌓게 하신 것은, 율법 아래 죄인 된 우리에게 제사의 은혜가 필요함을 보여줍니다.", "difficulty": "상", "verse": "신 27:4"}, {"id": 59, "section": "신명기", "question": "그리심 산에서 축복을 선포할 대표적인 지파는?", "choices": ["르우벤", "유다", "스불론", "갓"], "answer": 1, "explanation": "시므온, 레위, 유다, 잇사갈, 요셉, 베냐민이 그리심 산에 서서 하나님의 복을 선포했습니다.", "difficulty": "상", "verse": "신 27:12"}, {"id": 60, "section": "신명기", "question": "하나님의 말씀을 삼가 듣고 순종하면 모든 민족 위에 어떻게?", "choices": ["숨기심", "뛰어나게 하심", "낮추심", "버리심"], "answer": 1, "explanation": "하나님의 약속에 순종할 때 주어지는 열방의 지도력입니다. 거룩한 민족에게 주시는 영적 영향력을 뜻합니다.", "difficulty": "하", "verse": "신 28:1"}, {"id": 61, "section": "신명기", "question": "\"네 광주리와 ( )이 복을 받을 것이며\"", "choices": ["신발", "옷", "떡 반죽 그릇", "침대"], "answer": 2, "explanation": "떡 반죽 그릇입니다. 하나님의 복은 거창한 성공뿐만 아니라, 매일 먹고사는 일상의 지극히 작은 과정에까지 임한다는 축복입니다.", "difficulty": "하", "verse": "신 28:5"}, {"id": 62, "section": "신명기", "question": "순종할 때 주시는 복으로, 머리가 되고 무엇이 되지 않나요?", "choices": ["다리", "어깨", "꼬리", "허리"], "answer": 2, "explanation": "꼬리입니다. 남에게 예속되지 않고 선한 영향력을 끼치며 주도권을 가진 복된 삶을 산다는 비유입니다.", "difficulty": "하", "verse": "신 28:13"}, {"id": 63, "section": "신명기", "question": "불순종할 때 네 머리 위 하늘은 무엇이 되나요?", "choices": ["구름", "놋", "철", "재"], "answer": 1, "explanation": "놋입니다. 비가 한 방울도 내리지 않는 절망적인 기근 상태를 의미하며, 자연도 말씀에 반응함을 보여줍니다.", "difficulty": "상", "verse": "신 28:23"}, {"id": 64, "section": "신명기", "question": "40년 광야 길에서 발의 무엇이 해어지지 않았나요?", "choices": ["신", "옷", "발", "손"], "answer": 0, "explanation": "**신(신발)**입니다. 8:4에 이어 다시 강조되는 이 기적은 하나님의 성실하고 빈틈없는 공급을 입증합니다.", "difficulty": "중", "verse": "신 29:5"}, {"id": 65, "section": "신명기", "question": "하나님의 명령은 너무 어렵거나 '어디'에 있는 것도 아닙니까?", "choices": ["바다 속", "먼 곳", "하늘 위", "땅 속"], "answer": 1, "explanation": "\"네게 먼 것도 아니라.\" 말씀은 도달할 수 없는 높은 이상이 아니라 누구나 듣고 순종할 수 있는 가까운 실제임을 뜻합니다.", "difficulty": "중", "verse": "신 30:11"}, {"id": 66, "section": "신명기", "question": "말씀이 네게 매우 가까워 네 ( )와 마음에 있다고 하셨나요?", "choices": ["입", "손", "눈", "귀"], "answer": 0, "explanation": "입입니다. 말씀을 입술로 고백하고 마음으로 믿으면 충분히 행할 수 있습니다. 로마서 10장에서 인용된 구원의 원리입니다.", "difficulty": "중", "verse": "신 30:14"}, {"id": 67, "section": "신명기", "question": "내가 오늘 하늘과 땅을 불러 너희에게 무엇을 삼노라?", "choices": ["친구", "증거", "재판", "화해"], "answer": 1, "explanation": "증거입니다. 우주적인 증인을 불러 언약의 엄중함을 선포하시는 장면으로, 선택에 대한 책임을 강조합니다.", "difficulty": "상", "verse": "신 30:19"}, {"id": 68, "section": "신명기", "question": "모세가 여호수아에게 반복해서 한 격려의 말은?", "choices": ["조심하라", "강하고 담대하라", "많이 먹어라", "빨리 가라"], "answer": 1, "explanation": "새로운 시대를 열 지도자에게 가장 필요한 것은 하나님을 신뢰하는 영적 용기인 '강하고 담대함'입니다.", "difficulty": "하", "verse": "신 31:7"}, {"id": 69, "section": "신명기", "question": "7년마다 돌아오는 면제년의 무슨 절기에 율법을 낭독하나?", "choices": ["유월절", "칠칠절", "초막절", "수전절"], "answer": 2, "explanation": "초막절입니다. 수확의 기쁨과 광야의 은혜를 기억하는 절기에 온 백성이 모여 말씀을 청종하게 하셨습니다.", "difficulty": "상", "verse": "신 31:10"}, {"id": 70, "section": "신명기", "question": "모세의 노래 서두에서 하나님을 비유한 칭호는?", "choices": ["바람", "반석", "구름", "바다"], "answer": 1, "explanation": "**반석(The Rock)**입니다. 요동치는 역사 속에서도 결코 흔들리지 않는 하나님의 신실함과 견고한 보호를 상징합니다.", "difficulty": "하", "verse": "신 32:4"}, {"id": 71, "section": "신명기", "question": "하나님이 새끼를 훈련시키듯 보호하시는 새의 모습은?", "choices": ["암탉", "비둘기", "독수리", "까마귀"], "answer": 2, "explanation": "독수리입니다. 새끼를 강하게 훈련시키면서도 날개로 받아 올리는 모습은 하나님의 강하면서도 자상한 교육 방식입니다.", "difficulty": "중", "verse": "신 32:11"}, {"id": 72, "section": "신명기", "question": "하나님이 모세에게 죽음을 준비하라고 하신 때는?", "choices": ["그날 당일에", "일주일 전", "한 달 전", "1년 전"], "answer": 0, "explanation": "**\"바로 그날에\"**입니다. 모세는 사역의 마지막 순간까지 자신의 죽음조차 순종의 사역으로 온전히 드렸습니다.", "difficulty": "상", "verse": "신 32:48"}, {"id": 73, "section": "신명기", "question": "모세가 죽기 전 이스라엘 자손을 위하여 한 마지막 일은?", "choices": ["잔치", "노래 교육", "축복", "지도 작성"], "answer": 2, "explanation": "축복입니다. 하나님의 사람으로서 열두 지파의 미래를 비전으로 선포하며 아름답게 사역을 마무리했습니다.", "difficulty": "하", "verse": "신 33:1"}, {"id": 74, "section": "신명기", "question": "\"이스라엘이여 너는 ( ) 사람이로다\"", "choices": ["거룩한", "행복한", "강한", "선택받은"], "answer": 1, "explanation": "행복한 사람입니다. 행복은 환경이 아니라 하나님의 구원과 보호를 받고 있다는 사실 그 자체에 있음을 선포합니다.", "difficulty": "하", "verse": "신 33:29"}, {"id": 75, "section": "신명기", "question": "모세가 가나안 땅을 바라본 산의 이름은 무엇입니까?", "choices": ["시내 산", "느보 산", "갈멜 산", "시온 산"], "answer": 1, "explanation": "**느보 산(비스가 산)**입니다. 하나님은 모세에게 비전을 보여주심으로 그의 수고를 위로하시고 사명을 인계하게 하셨습니다.", "difficulty": "하", "verse": "신 34:1"}, {"id": 76, "section": "신명기", "question": "모세는 하나님이 어떻게 아시던 자라고 기록되었나요?", "choices": ["꿈에", "환상 중에", "대면하여", "몰래"], "answer": 2, "explanation": "**대면하여(Face to face)**입니다. 하나님과 가장 친밀하게 직접 교제를 나누었던 특별한 선지자임을 인정하는 찬사입니다.", "difficulty": "하", "verse": "신 34:10"}, {"id": 77, "section": "신명기", "question": "집 어느 곳과 바깥문에 말씀을 기록해야 하나요?", "choices": ["창문", "벽", "문설주", "기둥"], "answer": 2, "explanation": "문설주입니다. 가정의 안팎이 하나님의 통치와 말씀으로 가득 채워져야 함을 강조하는 교육 지침입니다.", "difficulty": "중", "verse": "신 6:9"}, {"id": 78, "section": "신명기", "question": "만나를 먹여 낮추시고 시험하신 목적은 결국 네게?", "choices": ["벌 주려", "복 주려", "고생시키려", "잊게 하려"], "answer": 1, "explanation": "복 주려 하심입니다. 훈련의 끝은 항상 하나님의 풍성한 복이 예비되어 있다는 소망을 줍니다.", "difficulty": "중", "verse": "신 8:16"}, {"id": 79, "section": "신명기", "question": "하나님이 다시 깎아 오라고 하신 돌판의 개수는?", "choices": ["1개", "2개", "10개", "12개"], "answer": 1, "explanation": "2개입니다. 언약이 파괴되었으나 다시 돌판을 주심으로 관계를 회복시키시는 하나님의 용서와 은혜입니다.", "difficulty": "하", "verse": "신 10:1"}, {"id": 80, "section": "신명기", "question": "\"너희의 발바닥으로 밟는 곳은 다 너희의 ( )이 되리니\"", "choices": ["놀이터", "소유(기업)", "무덤", "시장"], "answer": 1, "explanation": "**소유(기업)**입니다. 하나님의 약속은 가만히 있을 때가 아니라 믿음으로 전진하여 밟을 때 현실이 된다는 원리입니다.", "difficulty": "하", "verse": "신 11:24"}, {"id": 81, "section": "신명기", "question": "기적을 행할지라도 다른 신을 섬기자면 그 정체는?", "choices": ["참 선지자", "거짓 선지자", "왕", "제사장"], "answer": 1, "explanation": "거짓 선지자입니다. 기적보다 중요한 기준은 '하나님의 말씀'임을 잊지 말라는 경고입니다.", "difficulty": "상", "verse": "신 13:1"}, {"id": 82, "section": "신명기", "question": "땅에는 언제든지 누가 그치지 아니하겠으므로 손을 펴라 했나?", "choices": ["비", "가난한 자", "전쟁", "노래"], "answer": 1, "explanation": "가난한 자입니다. 하나님은 나눔의 통로로 가난한 자들을 우리 곁에 두셨음을 기억해야 합니다.", "difficulty": "중", "verse": "신 15:11"}, {"id": 83, "section": "신명기", "question": "축제 때 함께 즐거워해야 할 대상이 아닌 자는?", "choices": ["레위인", "객", "고아와 과부", "원수"], "answer": 3, "explanation": "하나님의 기쁨은 소외된 이웃과 함께 나눌 때 온전해진다는 공동체 정신입니다.", "difficulty": "중", "verse": "신 16:11"}, {"id": 84, "section": "신명기", "question": "왕을 세울 때 반드시 누구 중에서 세워야 합니까?", "choices": ["애굽 사람", "네 형제", "똑똑한 자", "부자"], "answer": 1, "explanation": "네 형제입니다. 언약의 정체성을 공유하는 자가 통치해야 신앙의 순수성이 유지되기 때문입니다.", "difficulty": "중", "verse": "신 17:15"}, {"id": 85, "section": "신명기", "question": "하나님이 가증히 여기시는 행동이 아닌 것은?", "choices": ["복술", "길흉을 말함", "말씀 묵상", "박수"], "answer": 2, "explanation": "점술이나 마술 등 인간의 길흉을 우상에게 묻는 행위는 철저히 금지되었습니다.", "difficulty": "하", "verse": "신 18:10"}, {"id": 86, "section": "신명기", "question": "패역한 아들을 성읍 사람들이 죽여 악을 제하라는 법의 의도는?", "choices": ["아들 미워함", "공동체 거룩 보존", "인구 조절", "법 강화"], "answer": 1, "explanation": "가계의 질서가 무너지는 것을 공동체 전체의 거룩이 무너지는 것으로 보아 엄격히 다스린 것입니다.", "difficulty": "상", "verse": "신 21:18"}, {"id": 87, "section": "신명기", "question": "새 집을 지을 때 지붕에 무엇을 만들어야 하나요?", "choices": ["굴뚝", "창문", "난간", "안테나"], "answer": 2, "explanation": "난간입니다. 이웃의 안전을 배려하지 않은 부주의를 죄로 보시는 하나님의 세심한 생명 존중법입니다.", "difficulty": "중", "verse": "신 22:8"}, {"id": 88, "section": "신명기", "question": "형제에게 돈을 빌려줄 때 받지 말아야 할 것은?", "choices": ["이자", "감사 인사", "원금", "선물"], "answer": 0, "explanation": "이자입니다. 형제의 가난을 이용해 이익을 취하지 말라는 '사랑의 경제학'입니다.", "difficulty": "중", "verse": "신 23:19"}, {"id": 89, "section": "신명기", "question": "이혼 증서를 써주어야 하는 규례는 누구를 보호함인가요?", "choices": ["남자", "여자(아내)", "아이들", "왕"], "answer": 1, "explanation": "**여자(아내)**입니다. 함부로 버려지는 것을 막고 신분을 보장해주려는 최소한의 안전장치였습니다.", "difficulty": "상", "verse": "신 24:1"}, {"id": 90, "section": "신명기", "question": "주머니에 두 종류의 무엇을 넣지 말라고 하셨나요?", "choices": ["돈", "저울추", "돌", "보석"], "answer": 1, "explanation": "저울추입니다. 상거래의 정직이 곧 신앙의 정직임을 강조하는 하나님의 공정 거래법입니다.", "difficulty": "중", "verse": "신 25:13"}, {"id": 91, "section": "신명기", "question": "토지 모든 소산의 맏물을 드리는 고백의 핵심은?", "choices": ["내가 농사 잘 지음", "하나님이 이 땅을 주셨다", "씨앗이 좋음", "비가 많이 옴"], "answer": 1, "explanation": "**\"여호와께서 주신 땅\"**임을 인정하는 주권 고백입니다. 모든 소유의 출처가 하나님임을 잊지 말라는 것입니다.", "difficulty": "하", "verse": "신 26:2"}, {"id": 92, "section": "신명기", "question": "이웃의 ( )를 옮기는 자는 저주를 받을 것이라.", "choices": ["지계석", "돌맹이", "나무", "물통"], "answer": 0, "explanation": "지계석입니다. 남의 재산과 삶의 터전을 침범하는 행위는 하나님 나라에서 큰 죄입니다.", "difficulty": "하", "verse": "신 27:17"}, {"id": 93, "section": "신명기", "question": "하나님의 말씀을 ( )하면 이 모든 복이 네게 임하며...", "choices": ["청종", "무시", "암송", "기록"], "answer": 0, "explanation": "**청종(듣고 순종)**입니다. 귀로 듣는 것에서 멈추지 않고 삶으로 옮기는 것이 복의 비결입니다.", "difficulty": "하", "verse": "신 28:2"}, {"id": 94, "section": "신명기", "question": "너는 많은 민족에게 빌려줄지라도 너는 무엇하지 않나?", "choices": ["빌리지 않음", "팔지 않음", "사지 않음", "가르치지 않음"], "answer": 0, "explanation": "빌리지 아니할 것입니다. 하나님이 주시는 경제적 주권과 풍요의 영광을 약속합니다.", "difficulty": "중", "verse": "신 28:12"}, {"id": 95, "section": "신명기", "question": "마음이 완악하여 심판을 무시하는 자가 스스로 하는 말은?", "choices": ["평안이 있으리라", "나는 망함", "하나님 무서움", "도와주세요"], "answer": 0, "explanation": "**\"내게는 평안이 있으리라\"**입니다. 죄 속에서도 심판을 비웃는 영적 오만함을 경고합니다.", "difficulty": "상", "verse": "신 29:19"}, {"id": 96, "section": "신명기", "question": "모세가 율법 책을 마친 후 언약궤 곁에 두게 한 이유는?", "choices": ["무거워서", "너희에게 증거가 되게 하려고", "잊으려고", "숨기려고"], "answer": 1, "explanation": "증거가 되게 하려 함입니다. 타락했을 때 말씀을 통해 다시 하나님께 돌아오게 하는 기준이 됩니다.", "difficulty": "중", "verse": "신 31:24"}, {"id": 97, "section": "신명기", "question": "\"옛날을 기억하라 ( ) 세대를 생각하라\"", "choices": ["다가올", "역대의", "지금", "지난"], "answer": 1, "explanation": "역대(과거 모든) 세대입니다. 역사를 통해 하나님이 베푸신 은혜를 배우는 것이 신앙의 힘입니다.", "difficulty": "중", "verse": "신 32:7"}, {"id": 98, "section": "신명기", "question": "영원하신 하나님이 네 처소가 되시니 그의 영원하신 ( )이...", "choices": ["손", "발", "팔", "눈"], "answer": 2, "explanation": "팔입니다. 아래서 든든히 받쳐주시고 붙들어주시는 하나님의 전능한 보호를 형상화했습니다.", "difficulty": "중", "verse": "신 33:27"}, {"id": 99, "section": "신명기", "question": "모세의 마지막을 장식한 단어는 \"큰 권능과 ( )\"입니다.", "choices": ["지혜", "위엄", "재산", "군사"], "answer": 1, "explanation": "위엄입니다. 하나님의 대리자로서 모세가 보인 영광스럽고 거룩한 위엄을 기립니다.", "difficulty": "하", "verse": "신 34:12"}, {"id": 100, "section": "신명기", "question": "신명기 전체를 관통하는 가장 핵심적인 호소는?", "choices": ["전쟁하라", "기억하고 순종하라", "제사 지내라", "부자 되라"], "answer": 1, "explanation": "기억하고 순종하라입니다. 과거의 은혜를 기억하고 미래의 가나안에서 말씀대로 살라는 것이 전부입니다.", "difficulty": "하", "verse": "-"}, {"id": 101, "section": "여호수아", "question": "여호수아를 소개할 때 사용된 칭호는 무엇입니까?", "choices": ["이스라엘의 왕", "모세의 수종자", "하나님의 아들", "큰 용사"], "answer": 1, "explanation": "여호수아는 모세를 40년 동안 가까이서 섬기며 훈련받은 **'모세의 수종자(Minister)'**였습니다. 준비된 자를 사용하시는 하나님의 섭리를 보여줍니다.", "difficulty": "하", "verse": "여 1:1"}, {"id": 102, "section": "여호수아", "question": "하나님은 여호수아에게 어디를 건너 약속의 땅으로 가라고 하셨나요?", "choices": ["홍해", "유브라데 강", "요단 강", "나일 강"], "answer": 2, "explanation": "요단 강은 가나안 땅으로 들어가는 마지막 관문입니다. 모세가 홍해를 건너 광야로 인도했다면, 여호수아는 요단을 건너 정복의 시대를 엽니다.", "difficulty": "하", "verse": "여 1:2"}, {"id": 103, "section": "여호수아", "question": "하나님이 여호수아에게 주신 가장 강력한 임재의 약속은?", "choices": ["네가 가장 부유하리라", "내가 너를 떠나지 아니하리라", "군대를 만 명 주리라", "장수하리라"], "answer": 1, "explanation": "새로운 지도자로서 느끼는 두려움을 이기는 비결은 **'하나님의 함께하심'**입니다. \"내가 너를 떠나지 아니하며 버리지 아니하리라\"는 여호수아 전체의 핵심 주제입니다.", "difficulty": "중", "verse": "여 1:5"}, {"id": 104, "section": "여호수아", "question": "형통하기 위해 율법책을 입에서 떠나지 말게 하고 무엇을 해야 합니까?", "choices": ["주야로 묵상", "외우기만 함", "숨겨둠", "남에게 줌"], "answer": 0, "explanation": "히브리어 **'묵상(하가)'**은 사자가 먹이를 놓고 으르렁거리듯 말씀을 입으로 계속 읊조리는 것입니다. 전략보다 순종이 승리의 비결임을 강조합니다.", "difficulty": "하", "verse": "여 1:8"}, {"id": 105, "section": "여호수아", "question": "요단을 건너기 위해 백성들에게 며칠 안에 준비하라고 했나요?", "choices": ["하루", "사흘(3일)", "일주일", "한 달"], "answer": 1, "explanation": "**3일(사흘)**입니다. 이는 새로운 땅을 향한 긴박한 준비와 하나님의 일하심을 기다리는 인내의 시간을 의미합니다.", "difficulty": "중", "verse": "여 1:11"}, {"id": 106, "section": "여호수아", "question": "여호수아가 싯딤에서 여리고로 보낸 정탐꾼은 몇 명입니까?", "choices": ["2명", "7명", "12명", "300명"], "answer": 0, "explanation": "모세가 12명을 보냈던 것과 달리, 여호수아는 은밀하고 신속하게 2명만 보냈습니다. 이는 여호수아의 신중하고 결단력 있는 리더십을 보여줍니다.", "difficulty": "하", "verse": "여 2:1"}, {"id": 107, "section": "여호수아", "question": "정탐꾼들이 여리고에서 머물렀던 집의 주인은 누구입니까?", "choices": ["라합", "룻", "들릴라", "미갈"], "answer": 0, "explanation": "기생 라합입니다. 그녀는 이방 여인이었으나 하나님의 소문을 듣고 믿음을 가졌으며, 훗날 예수 그리스도의 족보에 오르는 영광을 얻습니다.", "difficulty": "하", "verse": "여 2:1"}, {"id": 108, "section": "여호수아", "question": "라합이 고백한 하나님은 \"상천하지에\" 어떤 분이십니까?", "choices": ["무서운 분", "하나님이시다", "왕이시다", "심판자다"], "answer": 1, "explanation": "\"상천하지(上天下地)에 하나님\" 즉, 하늘과 땅 모든 곳의 유일한 통치자이심을 고백한 이방 여인의 놀라운 믿음의 선포입니다.", "difficulty": "중", "verse": "여 2:11"}, {"id": 109, "section": "여호수아", "question": "정탐꾼들이 라합에게 준 구원의 징표는 무엇입니까?", "choices": ["하얀 깃발", "파란 보자기", "붉은 줄", "금반지"], "answer": 2, "explanation": "창문에 매단 붉은 줄은 여리고가 무너질 때 라합의 가족을 지켜주는 표시가 되었습니다. 이는 예수 그리스도의 보혈을 상징하는 중요한 예표입니다.", "difficulty": "하", "verse": "여 2:18"}, {"id": 110, "section": "여호수아", "question": "요단을 건널 때 백성들보다 앞서 간 것은 무엇인가요?", "choices": ["여호수아", "정탐꾼", "언약궤 멘 제사장", "군대"], "answer": 2, "explanation": "언약궤를 멘 제사장들이 앞장섰습니다. 이는 보이지 않는 하나님이 친히 이스라엘의 길을 인도하시고 전쟁을 주도하신다는 신앙적 선포입니다.", "difficulty": "하", "verse": "여 3:3"}, {"id": 111, "section": "여호수아", "question": "언약궤와 백성 사이의 거리는 약 얼마였나요?", "choices": ["100규빗", "500규빗", "2,000규빗", "5,000규빗"], "answer": 2, "explanation": "**2,000규빗(약 900m)**입니다. 하나님의 거룩함을 침해하지 않도록 거리를 두게 하였으며, 모든 백성이 멀리서도 언약궤를 보며 따라오게 하려는 목적입니다.", "difficulty": "상", "verse": "여 3:4"}, {"id": 112, "section": "여호수아", "question": "요단 강물이 멈추어 선 결정적인 순간은 언제입니까?", "choices": ["제사장의 발이 물에 잠길 때", "여호수아가 소리 칠 때", "밤이 되었을 때", "해가 뜰 때"], "answer": 0, "explanation": "홍해는 갈라진 후 건넜지만, 요단은 제사장들의 발이 물가에 잠기자마자 멈췄습니다. 믿음의 발을 내디뎌야 기적이 시작됨을 가르쳐주는 장면입니다.", "difficulty": "중", "verse": "여 3:15"}, {"id": 113, "section": "여호수아", "question": "요단 강 도하를 기념하여 길갈에 세운 돌은 몇 개입니까?", "choices": ["7개", "10개", "12개", "40개"], "answer": 2, "explanation": "이스라엘 12지파를 상징합니다. 훗날 자녀들이 그 의미를 물을 때 하나님의 기적적인 도우심을 세세하게 전수하기 위한 시청각 교재입니다.", "difficulty": "하", "verse": "여 4:3"}, {"id": 114, "section": "여호수아", "question": "길갈에서 가나안 정복 전쟁 전 행한 예식은 무엇입니까?", "choices": ["세례", "할례", "관례", "축제"], "answer": 1, "explanation": "할례입니다. 적진 앞에서 군사적 약점을 노출할 수 있는 위험한 행동이었으나, 전쟁 전 하나님의 언약 백성으로서 '거룩함'을 회복하는 것이 우선임을 뜻합니다.", "difficulty": "중", "verse": "여 5:2"}, {"id": 115, "section": "여호수아", "question": "할례를 행한 장소의 이름으로 \"애굽의 수치를 굴려버렸다\"는 뜻은?", "choices": ["길갈", "벧엘", "세겜", "실로"], "answer": 0, "explanation": "**길갈(Gilgal)**은 히브리어로 '굴러갔다(Rolling)'는 뜻입니다. 종살이의 수치와 광야의 실패를 굴려버리고 새로운 시작을 선언하신 장소입니다.", "difficulty": "하", "verse": "여 5:9"}, {"id": 116, "section": "여호수아", "question": "가나안 땅의 소산을 먹은 다음 날부터 어떤 기적이 그쳤나요?", "choices": ["구름기둥", "불기둥", "만나", "메추라기"], "answer": 2, "explanation": "만나입니다. 40년간의 비상 식량이 그친 것은 이제 약속의 땅에서 직접 땀 흘려 얻은 소산을 먹는 '정착의 시대'가 도래했음을 의미합니다.", "difficulty": "중", "verse": "여 5:12"}, {"id": 117, "section": "여호수아", "question": "여호수아가 만난 여호와의 군대 대장이 한 명령은?", "choices": ["칼을 뽑으라", "신을 벗으라", "엎드려라", "노래하라"], "answer": 1, "explanation": "\"네 발에서 신을 벗으라.\" 모세가 시내산에서 들었던 것과 같습니다. 이 전쟁의 주관자는 하나님이시며, 여호수아는 그분의 대리자일 뿐임을 인정하는 행동입니다.", "difficulty": "상", "verse": "여 5:15"}, {"id": 118, "section": "여호수아", "question": "여리고 성을 6일 동안 매일 몇 번씩 돌았습니까?", "choices": ["한 번씩", "세 번씩", "일곱 번씩", "돌지 않음"], "answer": 0, "explanation": "6일 동안 매일 성을 한 바퀴씩 돌았습니다. 소리 내지 않고 침묵하며 걷는 훈련을 통해 하나님의 때를 기다리는 믿음의 인내를 배우게 하셨습니다.", "difficulty": "하", "verse": "여 6:3"}, {"id": 119, "section": "여호수아", "question": "일곱째 날에는 여리고 성을 총 몇 번 돌았습니까?", "choices": ["1번", "7번", "12번", "14번"], "answer": 1, "explanation": "마지막 일곱째 날에는 일곱 번을 돌았습니다. '7'은 하나님의 완전수를 상징하며, 완전한 순종 끝에 완전한 승리가 임함을 시각적으로 보여줍니다.", "difficulty": "하", "verse": "여 6:4"}, {"id": 120, "section": "여호수아", "question": "여리고 성벽이 무너진 직접적인 신호는 무엇입니까?", "choices": ["지진", "대포", "백성들의 큰 함성", "성벽을 때림"], "answer": 2, "explanation": "양각 나팔 소리와 함께 모든 백성이 크게 외칠 때(함성) 무너졌습니다. 무기가 아니라 하나님을 향한 믿음의 외침이 철옹성을 무너뜨렸습니다.", "difficulty": "하", "verse": "여 6:5"}, {"id": 121, "section": "여호수아", "question": "여리고 정복 시 '헤렘(진멸)' 원칙에서 제외된 사람은?", "choices": ["왕", "군인", "라합과 그 집에 있는 자", "어린아이"], "answer": 2, "explanation": "라합과 그녀의 가족입니다. 정탐꾼들과 맺은 약속을 하나님은 신실하게 지키셨으며, 이는 믿음을 가진 이방인에게 열린 구원의 문을 상징합니다.", "difficulty": "중", "verse": "여 6:17"}, {"id": 122, "section": "여호수아", "question": "여리고 성을 다시 건축하는 자는 누구를 잃는 저주를 받나요?", "choices": ["자기 생명", "재산", "맏아들과 막내아들", "아내"], "answer": 2, "explanation": "여호수아는 성 재건 시 **\"기초를 쌓을 때 맏아들을, 문을 세울 때 막내아들을 잃으리라\"**고 경고했습니다. 하나님의 심판 장소를 인위적으로 복구하지 말라는 뜻입니다.", "difficulty": "상", "verse": "여 6:26"}, {"id": 123, "section": "여호수아", "question": "하나님께 바친 물건을 훔쳐 이스라엘을 범죄하게 한 자는?", "choices": ["아간", "고라", "다단", "아비람"], "answer": 0, "explanation": "유다 지파 아간입니다. 그는 모든 전리품을 하나님께 바쳐야 한다는 명령을 어기고 탐심에 빠져 외투와 은금을 숨겼습니다.", "difficulty": "하", "verse": "여 7:1"}, {"id": 124, "section": "여호수아", "question": "아이 성 전투에서 이스라엘이 패배한 후 백성들의 마음은?", "choices": ["강해졌다", "분노했다", "물같이 녹았다", "즐거워했다"], "answer": 2, "explanation": "물같이 녹았습니다. 여리고의 큰 승리 뒤에 찾아온 작은 아이 성에서의 패배는 공동체 내의 죄가 얼마나 큰 영적 무력감을 주는지 경고합니다.", "difficulty": "중", "verse": "여 7:5"}, {"id": 125, "section": "여호수아", "question": "아간이 훔친 물건 중 아름다운 외투는 어느 지방 것입니까?", "choices": ["애굽", "시날", "갈멜", "헬몬"], "answer": 1, "explanation": "**시날(바벨론 지역)**의 외투입니다. 이는 세상의 화려한 문화와 사치에 대한 인간의 헛된 탐욕을 상징하는 품목입니다.", "difficulty": "상", "verse": "여 7:21"}, {"id": 126, "section": "여호수아", "question": "아간과 그 소유가 심판받아 죽은 골짜기의 이름은?", "choices": ["기드론 골짜기", "아골 골짜기", "힌놈의 골짜기", "에셀 골짜기"], "answer": 1, "explanation": "아골(Achor) 골짜기입니다. 히브리어로 '괴로움'이라는 뜻입니다. 이스라엘에게 괴로움을 준 죄를 척결하고 거룩을 회복한 장소입니다.", "difficulty": "하", "verse": "여 7:26"}, {"id": 127, "section": "여호수아", "question": "아이 성을 다시 정복할 때 여호수아가 사용한 전술은?", "choices": ["정면 돌파", "매복 전술", "수로 침투", "고사 작전"], "answer": 1, "explanation": "매복 전술입니다. 유인조가 적을 밖으로 끌어내고 매복조가 성을 점령하는 치밀한 전략으로, 실패를 딛고 하나님의 지혜로 승리했습니다.", "difficulty": "중", "verse": "여 8:3"}, {"id": 128, "section": "여호수아", "question": "아이 성 정복 후 여호수아가 제단을 쌓은 산은 어디입니까?", "choices": ["그리심 산", "시내 산", "에발 산", "느보 산"], "answer": 2, "explanation": "에발 산입니다. 저주의 산인 에발 산에 제단을 쌓은 것은, 죄인 된 인간이 오직 제사(예수님의 대속)를 통해서만 하나님께 나아감을 상징합니다.", "difficulty": "상", "verse": "여 8:30"}, {"id": 129, "section": "여호수아", "question": "기브온 주민들이 이스라엘을 속이기 위해 준비한 것은?", "choices": ["곰팡이 난 떡과 낡은 옷", "금과 은", "화려한 군대", "맛있는 요리"], "answer": 0, "explanation": "멀리서 온 여행자처럼 꾸며 멸망을 피하려 했습니다. 이들은 속임수를 썼지만 결과적으로 하나님의 백성 공동체 안에 거하게 됩니다.", "difficulty": "하", "verse": "여 9:5"}, {"id": 130, "section": "여호수아", "question": "이스라엘 지도자들이 기브온 주민들에게 속은 결정적 이유는?", "choices": ["너무 불쌍해서", "하나님께 묻지 않아서", "지도가 없어서", "돈을 받아서"], "answer": 1, "explanation": "**\"어떻게 할지를 여호와께 묻지 아니하고\"**입니다. 경험과 외모를 의지하고 기도를 생략한 것이 영적 분별력을 흐리게 한 원인이었습니다.", "difficulty": "중", "verse": "여 9:14"}, {"id": 131, "section": "여호수아", "question": "화친을 맺은 기브온 주민들은 이스라엘 회중을 위해 무엇을 하나요?", "choices": ["제사장", "나무 패며 물 긷는 자", "성벽 파수꾼", "지휘관"], "answer": 1, "explanation": "비록 속임수로 맺은 계약이지만 하나님 앞에서의 맹세이므로 지켰고, 그들은 성막을 수종드는 자들이 되어 이스라엘의 보호를 받았습니다.", "difficulty": "중", "verse": "여 9:27"}, {"id": 132, "section": "여호수아", "question": "아모리 왕들과의 전쟁 중 칼에 죽은 자보다 우박에 죽은 자가?", "choices": ["적었다", "많았다", "비슷했다", "없었다"], "answer": 1, "explanation": "우박에 죽은 자가 더 많았습니다. 전쟁의 주권이 인간의 무기가 아닌 자연 만물을 다스리시는 하나님께 있음을 확실히 보여준 사건입니다.", "difficulty": "중", "verse": "여 10:11"}, {"id": 133, "section": "여호수아", "question": "여호수아의 기도로 태양은 기브온 위에, 달은 어디에 멈췄나요?", "choices": ["아얄론 골짜기", "기드론 골짜기", "힌놈 골짜기", "에셀 골짜기"], "answer": 0, "explanation": "아얄론 골짜기입니다. 대적을 완전히 진멸할 시간을 확보하기 위해 해와 달의 운행을 멈추신 하나님의 전무후무한 기적입니다.", "difficulty": "상", "verse": "여 10:12"}, {"id": 134, "section": "여호수아", "question": "가나안 북방 정복 전쟁에서 대항한 연합군의 중심 성읍은?", "choices": ["하솔", "여리고", "예루살렘", "가사"], "answer": 0, "explanation": "하솔입니다. 하솔 왕 야빈이 주축이 되어 북방의 모든 왕을 소집해 이스라엘과 대적했으나 결국 패배했습니다.", "difficulty": "상", "verse": "여 11:1"}, {"id": 135, "section": "여호수아", "question": "하나님은 대적들의 말(Horse)을 어떻게 처리하라고 하셨나요?", "choices": ["다 키워라", "뒷발의 힘줄을 끊으라", "팔아라", "애굽으로 보내라"], "answer": 1, "explanation": "뒷발의 힘줄을 끊고 병거를 불사르라고 하셨습니다. 이는 이스라엘이 병마의 힘을 의지하지 않고 오직 하나님만 의지하게 하기 위함입니다.", "difficulty": "상", "verse": "여 11:6"}, {"id": 136, "section": "여호수아", "question": "전쟁을 그친 후 땅에 무엇이 찾아왔습니까?", "choices": ["전염병", "큰 가뭄", "안식(평화)", "가난"], "answer": 2, "explanation": "마침내 그 땅에 전쟁이 그치고 안식이 찾아왔습니다. 이는 하나님의 약속이 실제로 성취되었음을 보여주는 평화의 선언입니다.", "difficulty": "하", "verse": "여 11:23"}, {"id": 137, "section": "여호수아", "question": "여호수아가 정복한 가나안 왕은 총 몇 명입니까?", "choices": ["12명", "24명", "31명", "40명"], "answer": 2, "explanation": "**서른 한 명(31명)**입니다. 가나안 전역을 구석구석 정복했음을 입증하는 구체적인 역사적 승리의 기록입니다.", "difficulty": "상", "verse": "여 12:24"}, {"id": 138, "section": "여호수아", "question": "여호수아가 나이 많아 늙었을 때, 남은 땅은 어떠했나요?", "choices": ["하나도 없었다", "매우 많았다", "조금 남았다", "다 포기했다"], "answer": 1, "explanation": "\"얻을 땅이 매우 많이 남아 있도다.\" 한 세대의 사역이 끝날 무렵에도 여전히 사명이 남아 있음을 보여주며 다음 세대의 사명을 고취시킵니다.", "difficulty": "중", "verse": "여 13:1"}, {"id": 139, "section": "여호수아", "question": "레위 지파에게는 기업(땅)을 주지 않았습니다. 그 이유는?", "choices": ["가난해서", "여호와 하나님이 그들의 기업이므로", "벌을 받아서", "늦게 도착해서"], "answer": 1, "explanation": "\"이스라엘의 하나님 여호와께서 그들의 기업이 되심이라.\" 레위인은 하나님 한 분만으로 만족하는 삶의 영적 모델이 되었습니다.", "difficulty": "하", "verse": "여 13:33"}, {"id": 140, "section": "여호수아", "question": "갈렙은 40세에 정탐하고 현재 몇 세에 기업을 요청했나요?", "choices": ["60세", "80세", "85세", "100세"], "answer": 2, "explanation": "85세입니다. 45년이라는 긴 세월 동안 하나님의 약속을 한순간도 잊지 않고 신앙의 열정을 지킨 노병의 위대한 믿음입니다.", "difficulty": "중", "verse": "여 14:10"}, {"id": 141, "section": "여호수아", "question": "갈렙이 \"이 산지를 내게 주소서\"라며 요청한 땅의 이름은?", "choices": ["여리고", "헤브론", "예루살렘", "세겜"], "answer": 1, "explanation": "헤브론입니다. 그곳은 거인 아낙 자손이 살고 성읍이 매우 견고했으나, 갈렙은 하나님이 함께하시면 능히 이길 수 있다는 믿음으로 험지를 택했습니다.", "difficulty": "하", "verse": "여 14:12"}, {"id": 142, "section": "여호수아", "question": "갈렙이 기럇 세벨을 점령하는 자에게 약속한 보상은?", "choices": ["금 한 달란트", "딸 악사를 아내로", "왕의 자리", "은 보화"], "answer": 1, "explanation": "딸 악사를 아내로 주겠다고 했습니다. 믿음의 용맹을 가진 사위를 얻어 가문의 신앙 유산을 계승하려는 의지가 담겨 있습니다.", "difficulty": "상", "verse": "여 15:16"}, {"id": 143, "section": "여호수아", "question": "유다 자파가 예루살렘에서 끝내 쫓아내지 못한 주민은?", "choices": ["아모리 족속", "여부스 족속", "헷 족속", "브리스 족속"], "answer": 1, "explanation": "여부스 족속입니다. 이들은 훗날 다윗 왕 때가 되어서야 완전히 정복됩니다. 정복 전쟁이 완수되지 못한 아쉬운 기록입니다.", "difficulty": "중", "verse": "여 15:63"}, {"id": 144, "section": "여호수아", "question": "요셉 자손들이 땅이 좁다고 불평하자 여호수아가 내린 지시는?", "choices": ["더 주겠다", "스스로 개척하라", "가만히 있으라", "애굽으로 가라"], "answer": 1, "explanation": "**\"산지에 올라가서 스스로 개척하라\"**입니다. 불평하기보다 하나님이 주신 힘으로 새로운 가능성을 일궈내라는 지도자의 강력한 권면입니다.", "difficulty": "중", "verse": "여 17:15"}, {"id": 145, "section": "여호수아", "question": "이스라엘 회중이 모여 회막(성막)을 세운 장소는 어디입니까?", "choices": ["길갈", "실로", "벧엘", "세겜"], "answer": 1, "explanation": "실로입니다. 이곳은 언약궤가 안치되어 사사 시대 초기부터 중기까지 이스라엘의 영적 중심지 역할을 하게 됩니다.", "difficulty": "하", "verse": "여 18:1"}, {"id": 146, "section": "여호수아", "question": "아직 땅을 받지 못한 일곱 지파를 위해 사용한 방법은?", "choices": ["선착순", "투표", "제비 뽑기", "달리기"], "answer": 2, "explanation": "제비 뽑기입니다. 이는 인간의 욕심이 개입되지 않고 하나님의 주권적인 뜻에 따라 공정하게 기업을 나누는 성경적 방식입니다.", "difficulty": "하", "verse": "여 18:6"}, {"id": 147, "section": "여호수아", "question": "일곱째로 제비를 뽑아 가장 마지막으로 땅을 받은 지파는?", "choices": ["단 지파", "베냐민 지파", "아셀 지파", "납달리 지파"], "answer": 0, "explanation": "단 지파입니다. 단 지파는 분배받은 땅이 좁아 훗날 북쪽 라이스로 이동하여 정복하게 됩니다.", "difficulty": "상", "verse": "여 19:40"}, {"id": 148, "section": "여호수아", "question": "여호수아가 자기 기업으로 받은 성읍의 이름은 무엇입니까?", "choices": ["딤낫 세라", "베들레헴", "예루살렘", "가사"], "answer": 0, "explanation": "딤낫 세라입니다. 위대한 지도자 여호수아는 모든 백성이 땅을 다 분배받은 후에야 가장 마지막으로 자기 몫을 챙기는 겸손을 보였습니다.", "difficulty": "상", "verse": "여 19:50"}, {"id": 149, "section": "여호수아", "question": "부지중에 실수로 살인한 자가 보복을 피해 숨는 성읍은?", "choices": ["피난처", "요새", "도피성", "성전"], "answer": 2, "explanation": "**도피성(Cities of Refuge)**입니다. 하나님의 공의와 긍휼이 조화를 이루는 제도로, 과실 치사자를 보호하시는 하나님의 사랑을 상징합니다.", "difficulty": "하", "verse": "여 20:2"}, {"id": 150, "section": "여호수아", "question": "도피성에 피한 자는 언제까지 거기 머물러야 합니까?", "choices": ["1년", "7년", "당시 대제사장이 죽기까지", "왕이 바뀔 때까지"], "answer": 2, "explanation": "그 당시 대제사장이 죽기까지입니다. 대제사장의 죽음이 죄에 대한 대속적 성격을 띠어 살인자가 완전히 자유를 얻게 됨을 뜻합니다.", "difficulty": "상", "verse": "여 20:6"}, {"id": 151, "section": "여호수아", "question": "율법을 지켜 좌로나 우로나 ( ) 말라 그리하면 형통하리니.", "choices": ["치우치지", "흔들리지", "보지", "듣지"], "answer": 0, "explanation": "치우치지 말라는 것입니다. 하나님의 말씀이라는 중심을 잃지 않을 때 삶의 모든 여정에서 승리할 수 있다는 원리입니다.", "difficulty": "하", "verse": "여 1:7"}, {"id": 152, "section": "여호수아", "question": "라합이 정탐꾼들에게 말한 가나안 사람들의 상태는?", "choices": ["용감하다", "간담이 녹았다", "즐겁다", "화났다"], "answer": 1, "explanation": "간담이 녹았습니다. 이스라엘의 소문을 듣고 공포에 질린 상태입니다. 이미 영적 전쟁에서 승리했음을 보여주는 대목입니다.", "difficulty": "중", "verse": "여 2:9"}, {"id": 153, "section": "여호수아", "question": "요단 강물이 끊어지고 한 곳에 쌓이는 기적은 무엇 때문인가?", "choices": ["지진", "언약궤 멘 제사장들의 발바닥", "바람", "지팡이"], "answer": 1, "explanation": "제사장들의 발바닥이 요단 물을 밟을 때입니다. 지도자들의 헌신과 믿음의 순종이 공동체의 길을 여는 열쇠가 되었습니다.", "difficulty": "중", "verse": "여 3:13"}, {"id": 154, "section": "여호수아", "question": "여호수아가 길갈 말고 또 열두 돌을 세운 곳은 어디입니까?", "choices": ["여리고 성안", "요단 강 가운데 제사장들이 선 곳", "산꼭대기", "왕궁"], "answer": 1, "explanation": "요단 강 가운데입니다. 물속에 세워진 돌들은 보이지 않아도 하나님이 행하신 역사를 잊지 않겠다는 다짐입니다.", "difficulty": "상", "verse": "여 4:9"}, {"id": 155, "section": "여호수아", "question": "요단강 도하 소식을 들은 가나안 왕들의 마음이 어떠했나요?", "choices": ["녹았고 정신을 잃었다", "기뻤다", "무시했다", "도전적이었다"], "answer": 0, "explanation": "마음이 녹았고 정신을 잃었습니다. 하나님의 초자연적인 능력 앞에 가나안의 견고한 세력들이 완전히 압도당했음을 나타냅니다.", "difficulty": "중", "verse": "여 5:1"}, {"id": 156, "section": "여호수아", "question": "길갈에서 할례를 행한 후 이스라엘이 지킨 절기는?", "choices": ["초막절", "칠칠절", "유월절", "수전절"], "answer": 2, "explanation": "유월절입니다. 가나안 땅에서 지킨 첫 유월절로, 구원의 은혜를 기억하며 정복 전쟁의 영적 동력을 얻었습니다.", "difficulty": "하", "verse": "여 5:10"}, {"id": 157, "section": "여호수아", "question": "여리고를 돌 때 여호수아가 금지한 행동은 무엇입니까?", "choices": ["걷기", "음식 먹기", "외치거나 음성을 들리게 함", "잠자기"], "answer": 2, "explanation": "외치거나 음성을 들리게 하지 말라고 했습니다. 하나님이 일하실 때까지 인간의 소리를 죽이고 침묵하며 기도하는 태도를 요구하셨습니다.", "difficulty": "중", "verse": "여 6:10"}, {"id": 158, "section": "여호수아", "question": "여리고 성 안의 소, 양, 나귀 같은 생명은 어떻게 했나요?", "choices": ["다 키웠다", "진멸했다", "팔았다", "나누어 가졌다"], "answer": 1, "explanation": "칼날로 멸했습니다. 여리고는 가나안의 첫 열매로 온전히 하나님께 바쳐져야(헤렘) 했기에 모든 생명을 진멸했습니다.", "difficulty": "중", "verse": "여 6:21"}, {"id": 159, "section": "여호수아", "question": "여호수아가 아간에게 죄를 자복하라고 할 때 사용한 호칭은?", "choices": ["죄인아", "원수야", "내 아들아", "비겁한 자야"], "answer": 2, "explanation": "내 아들아입니다. 비록 범죄자일지라도 긍휼의 마음으로 죄를 회개하고 하나님께 영광을 돌리기를 원하는 지도자의 마음입니다.", "difficulty": "상", "verse": "여 7:19"}, {"id": 160, "section": "여호수아", "question": "아이 성 함락 시 여호수아가 손에 든 무엇을 성읍으로 향했나?", "choices": ["지팡이", "칼", "단창", "깃발"], "answer": 2, "explanation": "단창입니다. 성을 정복할 때까지 단창 든 손을 거두지 않았는데, 이는 모세가 손을 들어 기도했던 것과 같은 맥락의 승리 기호입니다.", "difficulty": "상", "verse": "여 8:18"}, {"id": 161, "section": "여호수아", "question": "여호수아가 기브온과 화친하며 무엇으로 맹세했습니까?", "choices": ["도장", "돈", "여호와의 이름", "왕의 권위"], "answer": 2, "explanation": "회중 족장들이 여호와로 맹세했습니다. 비록 속아서 맺은 계약일지라도 하나님의 이름으로 맹세한 것은 반드시 지켜야 함을 보여줍니다.", "difficulty": "중", "verse": "여 9:15"}, {"id": 162, "section": "여호수아", "question": "하나님이 도망가는 아모리 군대를 치실 때 하늘에서 무엇을?", "choices": ["불화살", "큰 우박 덩어리", "번개", "안개"], "answer": 1, "explanation": "큰 우박 덩어리입니다. 이스라엘 자손의 칼에 죽은 자보다 우박에 죽은 자가 더 많을 정도로 하나님의 직접적인 개입이 컸습니다.", "difficulty": "하", "verse": "여 10:11"}, {"id": 163, "section": "여호수아", "question": "하솔 왕 야빈의 도성을 정복한 후 여호수아는 어떻게 했나?", "choices": ["왕궁으로 씀", "불살랐음", "방치함", "팔았음"], "answer": 1, "explanation": "하솔을 불살랐습니다. 북방 연합군의 거점을 철저히 파괴하여 가나안의 강력한 우상 숭배 문화를 근절하고자 했습니다.", "difficulty": "상", "verse": "여 11:11"}, {"id": 164, "section": "여호수아", "question": "요단 동쪽 땅을 모세에게 이미 분배받은 지파가 아닌 곳은?", "choices": ["루벤 지파", "갓 지파", "므낫세 반 지파", "유다 지파"], "answer": 3, "explanation": "유다 지파는 요단 서쪽 가나안 본토에서 땅을 받았습니다. 동쪽은 루벤, 갓, 므낫세 반 지파가 차지했습니다.", "difficulty": "하", "verse": "여 13:8"}, {"id": 165, "section": "여호수아", "question": "갈렙은 나를 보내신 여호와께 어떻게 하였다고 고백했나?", "choices": ["대충 했다", "충성했다(온전히 따랐다)", "거역했다", "잊었다"], "answer": 1, "explanation": "**\"내 하나님 여호와께 충성하였으므로\"**입니다. 환경에 흔들리지 않고 일관되게 하나님을 따른 성실함이 갈렙의 위대함입니다.", "difficulty": "하", "verse": "여 14:8"}, {"id": 166, "section": "여호수아", "question": "갈렙의 딸 악사가 시집가면서 구한 샘물은 무엇입니까?", "choices": ["생명수", "윗샘과 아랫샘", "우물", "요단 샘"], "answer": 1, "explanation": "윗샘과 아랫샘입니다. 척박한 땅을 기업으로 받았을 때 실제적인 복의 근원인 물을 지혜롭게 구하여 얻었습니다.", "difficulty": "중", "verse": "여 15:19"}, {"id": 167, "section": "여호수아", "question": "여호수아가 요셉 자손에게 \"네가 철 병거가 있을지라도 그를 ( )\"", "choices": ["쫓아내리라", "피하라", "섬기라", "찬양하라"], "answer": 0, "explanation": "쫓아내리라입니다. 적의 강력한 무기(철 병거)보다 하나님의 약속과 능력을 더 신뢰할 것을 도전하는 말씀입니다.", "difficulty": "상", "verse": "여 17:18"}, {"id": 168, "section": "여호수아", "question": "요단 서편 갈릴리에 구별된 도피성의 이름은?", "choices": ["게데스", "세겜", "헤브론", "베셀"], "answer": 0, "explanation": "게데스입니다. 북쪽 갈릴리 산지에 위치하여 북쪽 지역 백성들을 보호하는 역할을 했습니다.", "difficulty": "상", "verse": "여 20:7"}, {"id": 169, "section": "여호수아", "question": "여호와께서 이스라엘에게 주신 모든 땅을 얻게 하신 근거는?", "choices": ["여호수아가 똑똑해서", "조상들에게 맹세하신 것", "군사가 많아서", "적이 약해서"], "answer": 1, "explanation": "**\"조상들에게 맹세하신 온 땅\"**입니다. 하나님의 신실하심이 수백 년 전의 약속을 마침내 이루셨음을 선포합니다.", "difficulty": "중", "verse": "여 21:43"}, {"id": 170, "section": "여호수아", "question": "요단 동쪽 지파가 제단을 쌓았다는 소식에 이스라엘이 무엇을?", "choices": ["잔치", "싸우러 가기 위해 모임", "무시함", "기도함"], "answer": 1, "explanation": "싸우러 가기 위해 실로에 모였습니다. 하나님 외에 다른 제단을 쌓는 것을 배교로 보았기 때문이며, 이는 거룩에 대한 열정을 보여줍니다.", "difficulty": "상", "verse": "여 22:12"}, {"id": 171, "section": "여호수아", "question": "여호수아가 고별사에서 \"모세의 율법책에 기록된 것을 다 ( )\"", "choices": ["읽으라", "지켜 행하라", "숨기라", "비판하라"], "answer": 1, "explanation": "지켜 행하라입니다. 땅을 얻는 것보다 얻은 땅에서 하나님의 법을 지키며 거룩함을 유지하는 것이 더 큰 과제임을 알린 것입니다.", "difficulty": "하", "verse": "여 23:6"}, {"id": 172, "section": "여호수아", "question": "아브라함의 아버지 데라가 강 저쪽에서 섬겼던 것은?", "choices": ["여호와", "다른 신들", "조상", "돈"], "answer": 1, "explanation": "다른 신들입니다. 이스라엘의 시작이 우상 숭배의 배경에서 하나님의 일방적인 부르심과 은혜로 시작되었음을 상기시킵니다.", "difficulty": "중", "verse": "여 24:2"}, {"id": 173, "section": "여호수아", "question": "여호수아는 \"온전함과 진실함으로 그를 ( )\"라고 했나요?", "choices": ["섬기라", "미워하라", "구경하라", "잊으라"], "answer": 0, "explanation": "**섬기라(Serve)**입니다. 신앙은 겉모양만이 아니라 중심에서 우러나오는 온전함과 진실함이 담겨야 함을 뜻합니다.", "difficulty": "하", "verse": "여 24:14"}, {"id": 174, "section": "여호수아", "question": "여호수아는 백성들에게 섬길 자를 언제 택하라고 도전했나요?", "choices": ["내일", "천천히", "오늘", "나중에"], "answer": 2, "explanation": "**오늘(This day)**입니다. 결단은 뒤로 미루는 것이 아닙니다. 현재 내가 누구를 왕으로 모시고 사느냐가 인생의 방향을 결정합니다.", "difficulty": "하", "verse": "여 24:15"}, {"id": 175, "section": "여호수아", "question": "여호수아가 세겜에서 백성들과 세운 것은 무엇입니까?", "choices": ["성벽", "언약과 율례", "학교", "시장"], "answer": 1, "explanation": "언약과 율례입니다. 하나님의 백성으로서의 정체성을 재확인하고, 말씀대로 살기로 공적으로 약속한 거룩한 갱신 예식입니다.", "difficulty": "중", "verse": "여 24:25"}, {"id": 176, "section": "여호수아", "question": "여호수아가 말씀을 기록한 후 증거로 삼기 위해 세운 것은?", "choices": ["큰 돌", "나무", "샘물", "금덩이"], "answer": 0, "explanation": "큰 돌입니다. 하나님의 말씀을 들은 증인으로서 이 돌을 세워, 백성들이 하나님을 부인하지 못하게 하는 시각적 증거로 삼았습니다.", "difficulty": "중", "verse": "여 24:26"}, {"id": 177, "section": "여호수아", "question": "여호수아에게 하신 위로: \"네가 어디로 가든지 네 하나님 여호와가 ( )\"", "choices": ["지켜보리라", "함께 하느니라", "심판하리라", "기다리리라"], "answer": 1, "explanation": "너와 함께 하느니라입니다. 공간과 상황을 초월하여 늘 곁에서 도우시는 임마누엘 하나님의 가장 따뜻한 약속입니다.", "difficulty": "하", "verse": "여 1:9"}, {"id": 178, "section": "여호수아", "question": "라합이 정탐꾼들에게 간청한 것은 누구의 생명을 구원해달라는 것인가?", "choices": ["자기만", "부모와 형제와 그들에게 속한 자", "여리고 왕", "친구들"], "answer": 1, "explanation": "부모와 형제와 그들에게 속한 모든 자입니다. 한 사람의 믿음이 온 가족을 구원하는 통로가 되었음을 보여줍니다.", "difficulty": "중", "verse": "여 2:13"}, {"id": 179, "section": "여호수아", "question": "언약궤를 멘 제사장들은 이스라엘이 다 건널 때까지 요단 가운데에?", "choices": ["계속 달렸다", "굳게 섰다", "누워 있었다", "춤추었다"], "answer": 1, "explanation": "굳게 섰습니다. 지도자들이 위험을 무릅쓰고 자리를 지킬 때 온 공동체가 안전하게 요단을 건널 수 있었습니다.", "difficulty": "중", "verse": "여 3:17"}, {"id": 180, "section": "여호수아", "question": "요단강 기적을 행하신 목적은 땅의 모든 백성에게 여호와의 손이 ( ) 것을 알게 하려 함이다.", "choices": ["부드러운", "강하신", "작으신", "보이지 않는"], "answer": 1, "explanation": "강하신 것입니다. 온 열방에 하나님의 살아계심과 강력한 주권을 드러내어 하나님을 경외하게 하려는 목적입니다.", "difficulty": "상", "verse": "여 4:24"}, {"id": 181, "section": "여호수아", "question": "라합의 가족을 성 밖으로 이끌어낸 후 어디에 두었나요?", "choices": ["이스라엘의 진영 밖", "지옥", "애굽", "왕궁"], "answer": 0, "explanation": "이스라엘의 진영 밖입니다. 처음에는 부정한 이방인으로 구별되었으나 점차 공동체 안으로 흡수되어 거룩한 백성이 되었습니다.", "difficulty": "상", "verse": "여 6:23"}, {"id": 182, "section": "여호수아", "question": "아간의 범죄에 대해 하나님은 \"이스라엘이 범죄하여 내가 그들에게 명령한 ( )을 어겼다\"고 하셨나?", "choices": ["노래", "언약", "규칙", "제사"], "answer": 1, "explanation": "언약입니다. 개인의 범죄를 공동체 전체가 맺은 하나님과의 약속 파기로 보시는 공동체적 책임 의식을 보여줍니다.", "difficulty": "상", "verse": "여 7:11"}, {"id": 183, "section": "여호수아", "question": "여호수아가 이스라엘 자손의 목전에서 돌에 기록한 것은?", "choices": ["여호수아의 업적", "모세의 율법", "전쟁 일기", "백성 이름"], "answer": 1, "explanation": "모세가 기록한 율법입니다. 가나안 정복의 기초와 목적이 오직 하나님의 말씀에 있음을 만천하에 공포한 것입니다.", "difficulty": "중", "verse": "여 8:32"}, {"id": 184, "section": "여호수아", "question": "태양이 멈춘 날에 대해 성경은 \"여호와께서 ( )의 목소리를 들으신 이 같은 날은 전무후무했다\"고 하나요?", "choices": ["왕", "제사장", "사람", "천사"], "answer": 2, "explanation": "사람입니다. 하나님이 한 인간(여호수아)의 간절한 기도를 들으시고 우주의 운행을 멈추신 특별한 사건임을 강조합니다.", "difficulty": "상", "verse": "여 10:14"}, {"id": 185, "section": "여호수아", "question": "여호수아는 여호와께서 모세에게 명령하신 것을 하나도 ( ) 아니하였다.", "choices": ["버리지", "행하지", "가르치지", "빼놓지"], "answer": 3, "explanation": "행하지 아니한 것이 없었습니다. 여호수아의 위대함은 용맹함보다 하나님의 말씀에 대한 '철저한 순종'에 있었습니다.", "difficulty": "하", "verse": "여 11:15"}, {"id": 186, "section": "여호수아", "question": "헤브론이 갈렙의 기업이 되어 오늘까지 이른 근본 원인은?", "choices": ["힘이 세서", "하나님 여호와를 온전히 좇았음", "일찍 와서", "운이 좋아서"], "answer": 1, "explanation": "하나님 여호와를 온전히 좇았음입니다. 변치 않는 신실함이 영원한 기업을 얻는 비결임을 증명합니다.", "difficulty": "하", "verse": "여 14:14"}, {"id": 187, "section": "여호수아", "question": "도피성은 누구로부터 피할 곳인가요?", "choices": ["빚쟁이", "피의 보복자", "야생 동물", "왕"], "answer": 1, "explanation": "**피의 보복자(Avenger of blood)**입니다. 무분별한 복수의 악순환을 끊고 법적인 보호를 제공하는 자비의 제도입니다.", "difficulty": "하", "verse": "여 20:3"}, {"id": 188, "section": "여호수아", "question": "여호수아가 죽었을 때 나이는 몇 세였습니까?", "choices": ["100세", "110세", "120세", "130세"], "answer": 1, "explanation": "110세입니다. 모세보다는 10년 적게 살았으나, 가나안 정복이라는 위대한 사명을 완수하고 평안히 안식에 들었습니다.", "difficulty": "중", "verse": "여 24:29"}, {"id": 189, "section": "여호수아", "question": "여호수아에게 하신 약속: \"너희 ( )으로 밟는 곳은 모두 내가 너희에게 주었노니\"", "choices": ["손바닥", "발바닥", "머리", "가슴"], "answer": 1, "explanation": "발바닥입니다. 하나님의 약속은 가만히 있을 때가 아니라 믿음으로 직접 밟고 나아갈 때 실제적인 소유가 됩니다.", "difficulty": "하", "verse": "여 1:3"}, {"id": 190, "section": "여호수아", "question": "라합이 정탐꾼들을 어디에 눕게 하고 숨겼나요?", "choices": ["다락", "지하실", "지붕 삼대 사이", "침대 밑"], "answer": 2, "explanation": "지붕에 벌여 놓은 삼대 사이입니다. 라합의 침착하고 지혜로운 대처가 하나님의 종들의 생명을 보존했습니다.", "difficulty": "중", "verse": "여 2:4"}, {"id": 191, "section": "여호수아", "question": "여호와께서 여호수아를 이스라엘 목전에서 크게 하여 ( )와 함께 있었던 것 같이 너와 함께 있는 것을 알게 하리라.", "choices": ["아브라함", "모세", "노아", "다윗"], "answer": 1, "explanation": "모세입니다. 지도력의 권위는 권력이 아니라 '하나님이 함께하심'에서 나온다는 것을 증명하시겠다는 약속입니다.", "difficulty": "하", "verse": "여 3:7"}, {"id": 192, "section": "여호수아", "question": "여호수아가 여리고에 가까이 갔을 때 한 사람이 무엇을 빼어 들고 서 있었나요?", "choices": ["칼", "지팡이", "창", "깃발"], "answer": 0, "explanation": "칼을 빼어 손에 들고 서 있었습니다. 그는 여호와의 군대 대장이었으며, 거룩한 전쟁의 시작을 알리는 임재입니다.", "difficulty": "중", "verse": "여 5:13"}, {"id": 193, "section": "여호수아", "question": "여리고 성 정복 시 바친 물건에 ( ) 말라.", "choices": ["손대지", "보지", "먹지", "팔지"], "answer": 0, "explanation": "손대지 말라입니다. 하나님께 온전히 드려진 것을 취하는 것은 공동체에 저주를 가져오는 중죄(헤렘)임을 경고했습니다.", "difficulty": "중", "verse": "여 6:18"}, {"id": 194, "section": "여호수아", "question": "아간이 훔친 외투 한 벌과 은 이백 세겔, 그리고 오십 세겔 중량의 무엇인가?", "choices": ["금덩이", "구리", "보석", "진주"], "answer": 0, "explanation": "금덩이 한 개입니다. 눈에 보이는 화려함과 재물에 마음을 빼앗긴 탐심의 결과입니다.", "difficulty": "상", "verse": "여 7:21"}, {"id": 195, "section": "여호수아", "question": "가나안 족속들이 이스라엘에 대항하기 위해 어떻게 모였나요?", "choices": ["뿔뿔이 흩어짐", "모여서 일심으로", "항복하기 위해", "구경하러"], "answer": 1, "explanation": "모여서 일심으로 여호수아와 이스라엘에 맞서 싸우려 했습니다. 대적들의 연합은 하나님의 더 큰 승리를 돋보이게 합니다.", "difficulty": "중", "verse": "여 9:2"}, {"id": 196, "section": "여호수아", "question": "여호수아가 지휘관들에게 아모리 왕들의 무엇을 밟으라고 했나요?", "choices": ["손", "발", "목", "가슴"], "answer": 2, "explanation": "목입니다. 대적에 대한 완전한 승리를 상징하며, 하나님이 모든 원수를 발등상 되게 하신다는 약속의 성취입니다.", "difficulty": "상", "verse": "여 10:24"}, {"id": 197, "section": "여호수아", "question": "이스라엘 자손이 미디안 사람들을 도륙할 때 칼로 죽인 점술가의 이름은?", "choices": ["발락", "발람", "고라", "아간"], "answer": 1, "explanation": "부올의 아들 발람입니다. 물질을 탐내 이스라엘을 저주하려 했던 거짓 선지자의 비참한 최후입니다.", "difficulty": "상", "verse": "여 13:22"}, {"id": 198, "section": "여호수아", "question": "여호와께서 그들의 주위에 ( )을 주셨으되...", "choices": ["전쟁", "안식", "재물", "지혜"], "answer": 1, "explanation": "안식입니다. 기나긴 정복 전쟁 끝에 하나님이 약속하신 평안과 쉼이 마침내 임하였음을 선포합니다.", "difficulty": "하", "verse": "여 21:44"}, {"id": 199, "section": "여호수아", "question": "이스라엘이 여호수아가 사는 날 동안과 여호수아 뒤에 생존한 ( )들이 사는 날 동안 여호와를 섬겼더라.", "choices": ["아이", "장로", "군인", "왕"], "answer": 1, "explanation": "장로들입니다. 하나님의 행하신 일을 직접 목격하고 경험한 영적 리더들이 있을 때 신앙이 전수되고 유지됨을 뜻합니다.", "difficulty": "중", "verse": "여 24:31"}, {"id": 200, "section": "여호수아", "question": "여호수아서 전체를 관통하는 가장 핵심적인 키워드는 무엇인가요?", "choices": ["방황", "정복과 안식(순종)", "제사", "노래"], "answer": 1, "explanation": "정복과 안식입니다. 하나님의 약속을 믿고 순종하여 땅을 정복하고, 마침내 그 땅에서 안식을 누리는 것이 주제입니다.", "difficulty": "하", "verse": "-"}, {"id": 201, "section": "사사기", "question": "여호수아가 죽은 후, 이스라엘 자손이 가장 먼저 싸우러 나갈 지파로 선택된 지파는?", "choices": ["베냐민 지파", "유다 지파", "단 지파", "에브라임 지파"], "answer": 1, "explanation": "하나님은 이스라엘의 영적 리더십을 가진 유다 지파를 가장 먼저 앞세우셨습니다. 이는 장차 오실 메시아의 가문을 예표하기도 합니다.", "difficulty": "하", "verse": "사 1:1"}, {"id": 202, "section": "사사기", "question": "유다 자손이 사로잡아 엄지손가락과 엄지발가락을 자른 가나안 왕의 이름은?", "choices": ["아도니 베섹", "에글론", "야빈", "시스라"], "answer": 0, "explanation": "아도니 베섹입니다. 그는 자기가 과거에 70명의 왕에게 행한 악행 그대로 하나님께 보응을 받았다고 스스로 고백했습니다.", "difficulty": "상", "verse": "사 1:6"}, {"id": 203, "section": "사사기", "question": "갈렙이 기럇 세벨을 점령하는 자에게 딸 악사를 주겠다고 하자, 이를 점령한 갈렙의 아우는?", "choices": ["에훗", "삼갈", "옷니엘", "기드온"], "answer": 2, "explanation": "옷니엘입니다. 그는 훗날 사사기 제1호 사사가 되어 이스라엘을 구원하는 위대한 신앙의 계보를 잇게 됩니다.", "difficulty": "중", "verse": "사 1:13"}, {"id": 204, "section": "사사기", "question": "베냐민 자손이 끝내 쫓아내지 못하여 오늘날까지 함께 거주하는 주민은?", "choices": ["아모리 족속", "여부스 족속", "헷 족속", "브리스 족속"], "answer": 1, "explanation": "예루살렘에 거주하던 여부스 족속입니다. 이 완전하지 못한 정복이 훗날 이스라엘의 올무가 됩니다.", "difficulty": "중", "verse": "사 1:21"}, {"id": 205, "section": "사사기", "question": "여호와의 사자가 백성의 불순종을 책망하자 백성들이 소리 높여 울었던 장소는?", "choices": ["길갈", "보림", "세겜", "실로"], "answer": 1, "explanation": "**보림(Bokim)**은 히브리어로 '우는 자들'이라는 뜻입니다. 후회는 했으나 진정한 회개(우상 척결)로 이어지지 못한 슬픈 장소입니다.", "difficulty": "하", "verse": "사 2:5"}, {"id": 206, "section": "사사기", "question": "여호수아 세대가 죽은 후 일어난, 하나님을 알지 못하는 세대를 일컫는 말은?", "choices": ["다음 세대", "다른 세대", "복된 세대", "거룩한 세대"], "answer": 1, "explanation": "다른 세대입니다. 신앙 교육의 부재로 인해 하나님과 그분이 행하신 일을 알지 못하는 영적 단절이 일어났음을 경고하는 표현입니다.", "difficulty": "중", "verse": "사 2:10"}, {"id": 207, "section": "사사기", "question": "이스라엘이 배교하여 압제당할 때, 하나님이 그들을 구원하기 위해 세우신 지도자는?", "choices": ["선지자", "사사", "제사장", "서기관"], "answer": 1, "explanation": "**사사(Judge)**입니다. 히브리어 '쇼페팀'은 재판관이자 군사 지도자를 뜻하며, 왕이 없던 시대에 하나님의 영에 감동되어 민족을 이끌었습니다.", "difficulty": "하", "verse": "사 2:16"}, {"id": 208, "section": "사사기", "question": "메소포타미아 왕의 손에서 이스라엘을 구원한 첫 번째 사사는?", "choices": ["에훗", "삼갈", "옷니엘", "돌라"], "answer": 2, "explanation": "옷니엘입니다. 갈렙의 조카이자 사위로, 성령의 임재를 통해 8년 동안의 압제에서 이스라엘을 건져냈습니다.", "difficulty": "하", "verse": "사 3:9"}, {"id": 209, "section": "사사기", "question": "모압 왕 에글론을 죽인 사사 에훗의 신체적 특징은 무엇입니까?", "choices": ["장님", "왼손잡이", "거인", "나실인"], "answer": 1, "explanation": "왼손잡이입니다. 당시 왼손잡이는 결점으로 여겨졌으나, 에훗은 이를 이용해 오른쪽 허벅지에 칼을 숨기고 들어가 왕을 암살하는 기지로 삼았습니다.", "difficulty": "중", "verse": "사 3:15"}, {"id": 210, "section": "사사기", "question": "소 모는 막대기로 블레셋 사람 600명을 죽여 구원한 사사는?", "choices": ["삼손", "삼갈", "입산", "엘론"], "answer": 1, "explanation": "삼갈입니다. 평범한 농기구인 '소 모는 막대기'조차 하나님의 손에 붙들리면 위대한 구원의 도구가 될 수 있음을 보여줍니다.", "difficulty": "하", "verse": "사 3:31"}, {"id": 211, "section": "사사기", "question": "랍비돗의 아내로, 종려나무 아래에서 재판했던 유일한 여성 사사는?", "choices": ["라합", "야엘", "드보라", "나오미"], "answer": 2, "explanation": "드보라입니다. 여성이 지도자가 되기 힘든 시대에 영적 통찰력과 용기로 이스라엘을 일깨운 위대한 어머니 같은 지도자였습니다.", "difficulty": "하", "verse": "사 4:4"}, {"id": 212, "section": "사사기", "question": "가나안 군대 장관 시스라가 잠든 사이, 관자놀이에 말뚝을 박아 죽인 여인은?", "choices": ["드보라", "야엘", "들릴라", "미갈"], "answer": 1, "explanation": "야엘입니다. 헤벨의 아내인 야엘의 기지는 \"대적을 여인의 손에 파시리라\"는 드보라의 예언을 성취시켰습니다.", "difficulty": "중", "verse": "사 4:21"}, {"id": 213, "section": "사사기", "question": "가나안 왕 야빈과의 전쟁에서 승리한 후 드보라와 함께 노래를 부른 장군은?", "choices": ["바락", "기드온", "여호수아", "갈렙"], "answer": 0, "explanation": "바락입니다. 처음에는 두려워했으나 드보라와 동행하며 믿음의 전쟁을 치러 승리를 거머쥐었습니다.", "difficulty": "중", "verse": "사 5:1"}, {"id": 214, "section": "사사기", "question": "기드온이 미디안 사람들에게 들키지 않으려고 밀을 타작했던 장소는?", "choices": ["타작 마당", "포도주 틀", "산꼭대기", "지붕 위"], "answer": 1, "explanation": "포도주 틀입니다. 본래 넓은 마당에서 해야 할 타작을 좁은 틀 안에서 몰래 한 것은, 당시 미디안의 압제가 얼마나 혹독했는지를 보여줍니다.", "difficulty": "하", "verse": "사 6:11"}, {"id": 215, "section": "사사기", "question": "여호와의 사자가 기드온에게 나타나 부른 호칭은 무엇입니까?", "choices": ["겁쟁이야", "가난한 자야", "큰 용사여", "농부야"], "answer": 2, "explanation": "큰 용사여입니다. 현실의 기드온은 두려움에 떨고 있었지만, 하나님은 그의 '믿음의 잠재력'과 '함께하실 미래'를 보고 부르셨습니다.", "difficulty": "하", "verse": "사 6:12"}, {"id": 216, "section": "사사기", "question": "기드온이 여호와를 뵙고 제단을 쌓은 후 부른 이름(여호와는 평강이시다)은?", "choices": ["여호와 닛시", "여호와 살롬", "여호와 이레", "여호와 라파"], "answer": 1, "explanation": "여호와 살롬입니다. 죽을까 봐 두려워하는 기드온에게 평강의 약속을 주신 하나님을 기리는 이름입니다.", "difficulty": "중", "verse": "사 6:24"}, {"id": 217, "section": "사사기", "question": "바알의 제단을 헐었기에 \"바알과 다투다\"라는 뜻으로 불린 기드온의 별명은?", "choices": ["여룹바알", "나실인", "여호와 닛시", "사사"], "answer": 0, "explanation": "여룹바알입니다. 우상은 스스로를 보호할 힘도 없음을 기드온의 아버지가 역설적으로 표현하며 붙여준 이름입니다.", "difficulty": "하", "verse": "사 6:32"}, {"id": 218, "section": "사사기", "question": "기드온이 하나님의 뜻을 확인하기 위해 시험했던 도구는?", "choices": ["돌판", "양털", "지팡이", "물그릇"], "answer": 1, "explanation": "양털입니다. 양털에만 이슬이 내리고 땅은 마르게 하거나, 반대로 땅만 젖게 하는 이적을 통해 하나님의 확신을 구했습니다.", "difficulty": "하", "verse": "사 6:37"}, {"id": 219, "section": "사사기", "question": "기드온의 군대 32,000명 중 두려워 떠는 자는 몇 명이나 돌아갔나요?", "choices": ["300명", "10,000명", "22,000명", "32,000명"], "answer": 2, "explanation": "22,000명입니다. 하나님은 숫자의 힘보다 하나님을 온전히 신뢰하는 소수의 믿음을 원하셨습니다.", "difficulty": "중", "verse": "사 7:3"}, {"id": 220, "section": "사사기", "question": "기드온의 최종 300명 용사를 선발한 기준은 물을 어떻게 마신 자들입니까?", "choices": ["무릎 꿇고 마심", "손으로 움켜 핥음", "머리를 처박고 마심", "마시지 않음"], "answer": 1, "explanation": "손으로 움켜 핥은 자들입니다. 주변을 경계하며 깨어 있는 태도를 가진 자들을 택하셔서 하나님의 전쟁에 사용하셨습니다.", "difficulty": "하", "verse": "사 7:6"}, {"id": 221, "section": "사사기", "question": "기드온의 300 용사가 미디안 진영을 습격할 때 든 무기가 아닌 것은?", "choices": ["나팔", "빈 항아리", "횃불", "긴 칼"], "answer": 3, "explanation": "긴 칼입니다. 칼이나 창 대신 나팔과 항아리 속의 횃불을 든 것은, 승리가 오직 하나님의 권능에 있음을 상징합니다.", "difficulty": "하", "verse": "사 7:16"}, {"id": 222, "section": "사사기", "question": "300 용사가 항아리를 깨뜨리고 횃불을 들며 외친 구호는?", "choices": ["이스라엘 만세", "여호와와 기드온의 칼이다", "항복하라", "하나님은 사랑이다"], "answer": 1, "explanation": "**\"여호와와 기드온의 칼이다!\"**입니다. 하나님의 주권과 지도자의 권위를 동시에 선포하며 대적을 혼란에 빠뜨렸습니다.", "difficulty": "중", "verse": "사 7:20"}, {"id": 223, "section": "사사기", "question": "기드온이 왕이 되어달라는 백성의 요청에 한 대답은 \"누가 너희를 다스리리라\"였나요?", "choices": ["내 아들이", "여호와께서", "내가", "지혜자가"], "answer": 1, "explanation": "여호와께서입니다. 기드온은 인간 왕을 거부하고 신본주의적인 통치를 강조함으로써 참된 왕이 누구신지 선언했습니다.", "difficulty": "하", "verse": "사 8:23"}, {"id": 224, "section": "사사기", "question": "기드온이 탈취한 금으로 만든 '이것'이 훗날 그의 집에 올무가 되었습니다.", "choices": ["금송아지", "에봇", "왕관", "성막"], "answer": 1, "explanation": "에봇입니다. 좋은 의도로 시작했으나 백성들이 이를 우상처럼 음란하게 섬김으로써 영적 타락의 원인이 되었습니다.", "difficulty": "상", "verse": "사 8:27"}, {"id": 225, "section": "사사기", "question": "기드온의 아들 70명을 한 바위 위에서 죽이고 스스로 왕이 된 악한 자는?", "choices": ["요담", "아비멜렉", "세바", "가알"], "answer": 1, "explanation": "아비멜렉입니다. '내 아버지는 왕이시다'라는 뜻의 이름을 가졌으나, 권력욕에 눈이 멀어 형제들을 학살한 비극적인 인물입니다.", "difficulty": "중", "verse": "사 9:5"}, {"id": 226, "section": "사사기", "question": "가시나무 비유를 통해 아비멜렉의 악행을 비판한 기드온의 막내아들은?", "choices": ["요담", "세바", "가알", "비골"], "answer": 0, "explanation": "요담입니다. 그리심 산 꼭대기에서 나무들의 우화를 들려주며 불의한 권력의 최후를 예언했습니다.", "difficulty": "상", "verse": "사 9:7"}, {"id": 227, "section": "사사기", "question": "아비멜렉이 데베스 망대에서 어떤 여인이 던진 무엇에 맞아 죽었나요?", "choices": ["물매 돌", "맷돌 윗짝", "화살", "창"], "answer": 1, "explanation": "맷돌 윗짝입니다. 왕을 자처하던 교만한 자가 여인이 던진 일상의 도구에 맞아 비참하게 최후를 맞이했습니다.", "difficulty": "중", "verse": "사 9:53"}, {"id": 228, "section": "사사기", "question": "아비멜렉 사후에 일어나 23년 동안 이스라엘을 구원한 사사 돌라는 어느 지파?", "choices": ["유다 지파", "잇사갈 지파", "베냐민 지파", "단 지파"], "answer": 1, "explanation": "잇사갈 지파입니다. 사사기에는 이름만 짧게 언급된 '소사사'들이 나오는데 돌라가 그중 한 명입니다.", "difficulty": "상", "verse": "사 10:1"}, {"id": 229, "section": "사사기", "question": "기생의 아들이었으나 길앗 장로들의 부름을 받아 사사가 된 큰 용사는?", "choices": ["입다", "입산", "엘론", "압돈"], "answer": 0, "explanation": "입다입니다. 출신 때문에 버림받았으나 하나님의 은혜로 큰 용사로 쓰임받아 암몬 자손을 물리쳤습니다.", "difficulty": "하", "verse": "사 11:1"}, {"id": 230, "section": "사사기", "question": "입다가 전쟁 승리 후 돌아올 때 가장 먼저 영접하는 자를 드리겠다고 한 것은?", "choices": ["서원", "기도", "찬양", "예언"], "answer": 0, "explanation": "서원입니다. 신앙적 열정은 있었으나 하나님에 대한 오해와 경솔함이 섞인 서원이었습니다.", "difficulty": "하", "verse": "사 11:30"}, {"id": 231, "section": "사사기", "question": "입다의 서원으로 인해 번제물로 바쳐지게 된 비극적인 주인공은?", "choices": ["그의 아내", "그의 외딸", "그의 종", "이웃집 아이"], "answer": 1, "explanation": "그의 무남독녀 외딸입니다. 승리의 기쁨이 한순간에 통곡으로 바뀐 가슴 아픈 장면입니다.", "difficulty": "중", "verse": "사 11:34"}, {"id": 232, "section": "사사기", "question": "에브라임 사람들을 가려내기 위해 시킨 발음 테스트 단어는?", "choices": ["샬롬", "쉽볼렛", "할렐루야", "마라나타"], "answer": 1, "explanation": "**쉽볼렛(Shibboleth)**입니다. 에브라임 사람들은 이를 '십볼렛'이라고 발음하여 정체가 탄로 났고, 결국 42,000명이 죽임을 당했습니다.", "difficulty": "상", "verse": "사 12:6"}, {"id": 233, "section": "사사기", "question": "삼손의 출생 전, 여호와의 사자가 그는 태어날 때부터 누구라 했나요?", "choices": ["제사장", "선지자", "나실인", "왕"], "answer": 2, "explanation": "**나실인(Nazirite)**입니다. '구별된 자'라는 뜻으로 평생 머리에 삭도를 대지 말고 포도주를 멀리해야 했습니다.", "difficulty": "하", "verse": "사 13:5"}, {"id": 234, "section": "사사기", "question": "삼손이 딤나에서 죽인 사자의 시체 속에서 발견한 것은?", "choices": ["보석", "칼", "벌 떼와 꿀", "비단"], "answer": 2, "explanation": "벌 떼와 꿀입니다. 시체를 가까이하지 말아야 할 나실인 규례를 어기고 꿀을 먹은 삼손의 영적 해이를 보여줍니다.", "difficulty": "중", "verse": "사 14:8"}, {"id": 235, "section": "사사기", "question": "삼손의 수수께끼: \"먹는 자에게서 먹는 것이 나오고 ( )에서 단 것이 나왔느니라\"", "choices": ["작은 자", "약한 자", "강한 자", "죽은 자"], "answer": 2, "explanation": "강한 자입니다. 사자(강한 자)의 몸에서 나온 꿀(단 것)을 비유한 내용입니다.", "difficulty": "중", "verse": "사 14:14"}, {"id": 236, "section": "사사기", "question": "삼손이 블레셋 사람 1,000명을 쳐죽일 때 사용한 특별한 무기는?", "choices": ["긴 칼", "물매", "나귀의 새 턱뼈", "청동 창"], "answer": 2, "explanation": "나귀의 새 턱뼈입니다. 하나님의 신이 권능으로 임할 때 보잘것없는 뼈 하나가 대군을 물리치는 강력한 무기가 되었습니다.", "difficulty": "하", "verse": "사 15:15"}, {"id": 237, "section": "사사기", "question": "목말라 죽어가는 삼손을 위해 하나님이 터뜨려 주신 샘의 이름은?", "choices": ["엔학고레", "브엘세바", "마라", "엘림"], "answer": 0, "explanation": "엔학고레입니다. '부르짖는 자의 샘'이라는 뜻으로, 교만했던 삼손이 자신의 한계를 깨닫고 부르짖을 때 응답하신 은혜입니다.", "difficulty": "중", "verse": "사 15:19"}, {"id": 238, "section": "사사기", "question": "소렉 골짜기에 살며 삼손을 유혹하여 힘의 비밀을 알아낸 여인은?", "choices": ["야엘", "라합", "들릴라", "미갈"], "answer": 2, "explanation": "들릴라입니다. 삼손은 정욕에 이끌려 사명자의 자리를 떠났고, 결국 언약의 비밀을 누설하게 됩니다.", "difficulty": "하", "verse": "사 16:4"}, {"id": 239, "section": "사사기", "question": "삼손이 힘을 잃게 된 직접적인 원인은 무엇입니까?", "choices": ["잠을 자서", "머리카락이 밀려서", "굶어서", "눈을 감아서"], "answer": 1, "explanation": "머리카락이 밀렸기 때문입니다. 머리카락 자체가 마법의 힘이 있는 게 아니라, 하나님과의 '나실인 언약'이 파기되었음을 뜻합니다.", "difficulty": "중", "verse": "사 16:19"}, {"id": 240, "section": "사사기", "question": "블레셋 사람들에게 잡힌 삼손이 당한 첫 번째 수모는?", "choices": ["혀가 잘림", "팔이 잘림", "두 눈이 뽑힘", "옷이 벗겨짐"], "answer": 2, "explanation": "두 눈이 뽑힌 것입니다. 육신의 눈이 멀었을 때 비로소 영적인 눈이 떠지기 시작하는 삼손의 비극적 반전입니다.", "difficulty": "중", "verse": "사 16:21"}, {"id": 241, "section": "사사기", "question": "삼손을 조롱하기 위해 모인 블레셋 사람들이 섬기던 신의 이름은?", "choices": ["바알", "아세라", "다곤", "몰록"], "answer": 2, "explanation": "**다곤(Dagon)**입니다. 블레셋의 주신으로 삼손의 패배를 다곤의 승리로 찬양하며 축제를 벌였습니다.", "difficulty": "상", "verse": "사 16:23"}, {"id": 242, "section": "사사기", "question": "삼손이 죽을 때 다곤 신전 기둥을 밀어 죽인 자는 살았을 때보다?", "choices": ["적었다", "많았다", "비슷했다", "없었다"], "answer": 1, "explanation": "살았을 때 죽인 자보다 더 많았습니다. 삼손은 자신의 생명을 내놓은 최후의 사역을 통해 이스라엘의 대적을 심판했습니다.", "difficulty": "하", "verse": "사 16:30"}, {"id": 243, "section": "사사기", "question": "사사기의 혼란을 한마디로 정의한 말: \"이스라엘에 ( )가 없으므로\"", "choices": ["양식", "성전", "왕", "군대"], "answer": 2, "explanation": "왕입니다. 이스라엘의 진정한 왕이신 하나님을 거부하고 자기 소견대로 산 것이 모든 문제의 뿌리였습니다.", "difficulty": "중", "verse": "사 17:6"}, {"id": 244, "section": "사사기", "question": "어머니의 은을 훔쳤다가 돌려준 후, 그 돈으로 신상을 만든 사람은?", "choices": ["미가", "보아스", "나봇", "입다"], "answer": 0, "explanation": "미가입니다. 사사기 시대의 영적 혼란이 가정 단위까지 침투했음을 보여주는 사례입니다.", "difficulty": "상", "verse": "사 17:4"}, {"id": 245, "section": "사사기", "question": "단 지파가 본래의 기업을 떠나 정복한 평온한 성읍의 이름은?", "choices": ["라이스", "여리고", "예루살렘", "가사"], "answer": 0, "explanation": "라이스입니다. 단 지파는 하나님이 주신 땅을 정복하지 못하고 북쪽의 무방비한 성읍을 잔인하게 빼앗아 '단'이라 이름했습니다.", "difficulty": "상", "verse": "사 18:27"}, {"id": 246, "section": "사사기", "question": "레위 사람의 첩을 욕보여 죽게 한 기브아의 불량배들은 어느 지파?", "choices": ["유다 지파", "베냐민 지파", "단 지파", "므낫세 지파"], "answer": 1, "explanation": "베냐민 지파입니다. 이 끔찍한 범죄는 이스라엘 내부의 참혹한 내전으로 번지게 됩니다.", "difficulty": "중", "verse": "사 19:22"}, {"id": 247, "section": "사사기", "question": "베냐민의 악행을 보고 온 이스라엘 회중이 모인 장소는?", "choices": ["미스바", "길갈", "실로", "예루살렘"], "answer": 0, "explanation": "미스바입니다. \"단에서부터 브엘세바까지\" 모든 백성이 모여 거룩을 위해 분노했습니다.", "difficulty": "하", "verse": "사 20:1"}, {"id": 248, "section": "사사기", "question": "내전 끝에 살아남아 림몬 바위에 숨은 베냐민 군사의 수는?", "choices": ["300명", "600명", "1,000명", "5,000명"], "answer": 1, "explanation": "600명입니다. 한 지파가 완전히 멸절될 위기에 처한 비극적인 결과입니다.", "difficulty": "상", "verse": "사 20:47"}, {"id": 249, "section": "사사기", "question": "베냐민 남은 자들에게 아내를 얻게 해주려고 여인들을 붙잡은 곳은?", "choices": ["예루살렘 성문", "실로의 축제 현장", "요단 강가", "에발 산"], "answer": 1, "explanation": "실로의 딸들이 춤추러 나올 때입니다. 멸절 위기의 형제 지파를 보존하기 위한 고육지책이었습니다.", "difficulty": "상", "verse": "사 21:21"}, {"id": 250, "section": "사사기", "question": "사사기의 마지막 구절: \"사람이 각기 ( )에 옳은 대로 행하였더라\"", "choices": ["하나님의 법", "자기의 소견", "법전", "왕의 명령"], "answer": 1, "explanation": "자기의 소견입니다. 절대 기준이 사라진 시대의 영적 무질서와 배교를 요약하며 사사기를 마칩니다.", "difficulty": "하", "verse": "사 21:25"}, {"id": 251, "section": "사사기", "question": "여부스 족속이 베냐민 자손과 함께 거주한 성읍은 어디입니까?", "choices": ["베들레헴", "예루살렘", "헤브론", "세겜"], "answer": 1, "explanation": "예루살렘입니다. 다윗 시대 전까지 예루살렘은 완전히 정복되지 않은 상태로 남겨져 있었습니다.", "difficulty": "중", "verse": "사 1:21"}, {"id": 252, "section": "사사기", "question": "이스라엘 자손이 여호와를 버리고 섬긴 가나안의 남녀 신은?", "choices": ["제우스와 헤라", "바알과 아스다롯", "태양과 달", "돈과 명예"], "answer": 1, "explanation": "바알과 아스다롯입니다. 풍요와 다산을 약속하는 가나안의 우상 숭배에 빠져 언약을 배반했습니다.", "difficulty": "하", "verse": "사 2:13"}, {"id": 253, "section": "사사기", "question": "사사 에훗이 만든 칼의 길이는 약 얼마였나요?", "choices": ["한 규빗", "두 규빗", "한 뼘", "삼 규빗"], "answer": 0, "explanation": "**한 규빗(약 45~50cm)**입니다. 몸에 숨기기 딱 좋은 길이로 제작하여 거사를 치렀습니다.", "difficulty": "상", "verse": "사 3:16"}, {"id": 254, "section": "사사기", "question": "드보라가 재판을 하던 장소는 어느 나무 아래였습니까?", "choices": ["상수리나무", "종려나무", "가시나무", "무화과나무"], "answer": 1, "explanation": "에브라임 산지 드보라의 종려나무 아래입니다. 그곳에서 백성들의 시비를 가려주는 지혜를 발휘했습니다.", "difficulty": "상", "verse": "사 4:5"}, {"id": 255, "section": "사사기", "question": "기드온이 소명을 받을 때 자신의 집안에 대해 한 말은?", "choices": ["가장 크다", "므낫세 중에 극히 약하다", "왕족이다", "제사장 가문이다"], "answer": 1, "explanation": "므낫세 중에 극히 약하고 나는 가장 작은 자라고 고백했습니다. 하나님은 약한 자를 들어 강한 자를 부끄럽게 하십니다.", "difficulty": "중", "verse": "사 6:15"}, {"id": 256, "section": "사사기", "question": "기드온이 하나님의 사자에게 드린 첫 번째 예물은?", "choices": ["금송아지", "염소 새끼 하나와 가루 한 에바", "양 한 마리", "비둘기"], "answer": 1, "explanation": "염소 새끼와 무교병입니다. 바위 위에서 불이 나와 이 예물을 살라 하나님의 임재를 확증하셨습니다.", "difficulty": "상", "verse": "사 6:19"}, {"id": 257, "section": "사사기", "question": "기드온이 미디안의 두 왕 세바와 살문나를 죽인 후 취한 전리품은?", "choices": ["왕관", "낙타 목에 있던 초승달 장식", "보석", "비단 옷"], "answer": 1, "explanation": "초승달 장식입니다. 이는 당시 그들의 우상 숭배와 관련된 화려한 장식품들이었습니다.", "difficulty": "상", "verse": "사 8:21"}, {"id": 258, "section": "사사기", "question": "사사 야일에게는 아들 30명이 있어 30마리 이것을 탔습니다.", "choices": ["말", "낙타", "어린 나귀", "소"], "answer": 2, "explanation": "어린 나귀입니다. 이는 당시 부와 평화를 상징하는 모습으로, 사사 야일 통치기의 풍요를 나타냅니다.", "difficulty": "상", "verse": "사 10:4"}, {"id": 259, "section": "사사기", "question": "입다가 형제들에게 쫓겨나 거주했던 땅의 이름은?", "choices": ["돕 땅", "가사", "욥바", "수르"], "answer": 0, "explanation": "돕(Tob) 땅입니다. 그곳에서 잡류들과 어울리며 용맹을 떨치다 민족의 위기 때 부름받았습니다.", "difficulty": "상", "verse": "사 11:3"}, {"id": 260, "section": "사사기", "question": "삼손의 아버지 이름은 무엇입니까?", "choices": ["기스", "엘가나", "마노아", "보아스"], "answer": 2, "explanation": "마노아입니다. 단 지파 사람으로, 불임의 고통 중에 천사의 예고를 통해 삼손을 얻게 됩니다.", "difficulty": "하", "verse": "사 13:2"}, {"id": 261, "section": "사사기", "question": "삼손이 딤나에서 사자를 죽일 때 사용한 도구는 무엇입니까?", "choices": ["칼", "창", "아무것도 없음(맨손)", "돌"], "answer": 2, "explanation": "아무것도 없었습니다. 하나님의 영이 강하게 임하여 맨손으로 사자를 염소 새끼 찢듯 찢었습니다.", "difficulty": "하", "verse": "사 14:6"}, {"id": 262, "section": "사사기", "question": "삼손이 목이 말라 죽을 뻔했을 때 샘이 터져 나온 곳의 지명은?", "choices": ["레히", "엔학고레", "마라", "엘림"], "answer": 0, "explanation": "**레히(Lehi)**입니다. 히브리어로 '턱뼈'라는 뜻으로, 턱뼈로 이긴 전쟁터에서 생수를 주셨습니다.", "difficulty": "상", "verse": "사 15:19"}, {"id": 263, "section": "사사기", "question": "블레셋 사람들이 삼손을 사로잡아 옥에서 무엇을 돌리게 했나요?", "choices": ["물레방아", "맷돌", "수레", "연자맷돌"], "answer": 1, "explanation": "맷돌입니다. 이스라엘의 영웅이 짐승처럼 맷돌을 돌리는 신세가 된 것은 죄의 비참함을 보여줍니다.", "difficulty": "중", "verse": "사 16:21"}, {"id": 264, "section": "사사기", "question": "단 지파가 미가의 신상을 훔쳐가서 세운 제사장은 누구의 손자?", "choices": ["아론", "모세", "엘리", "사무엘"], "answer": 1, "explanation": "모세의 손자 요나단입니다. 성경 원문에는 모세를 '므낫세'로 기록하여 조상의 이름을 보호하려 했던 흔적이 있습니다.", "difficulty": "상", "verse": "사 18:30"}, {"id": 265, "section": "사사기", "question": "베냐민 지파의 멸절 위기 앞에 이스라엘 백성들이 울었던 곳은?", "choices": ["미스바", "벧엘", "길갈", "실로"], "answer": 1, "explanation": "벧엘입니다. 형제를 멸한 슬픔으로 하나님 앞에 앉아 밤새도록 큰 소리로 울며 탄식했습니다.", "difficulty": "상", "verse": "사 21:2"}, {"id": 266, "section": "사사기", "question": "사사 에훗이 모압 왕 에글론을 찌른 칼은 어디에 박혔나요?", "choices": ["땅에", "왕의 배(기름에 덮임)", "벽에", "방패에"], "answer": 1, "explanation": "왕의 배입니다. 에글론이 너무 비둔하여 칼자루까지 배 속으로 들어가 기름에 덮였다고 기록합니다.", "difficulty": "중", "verse": "사 3:21"}, {"id": 267, "section": "사사기", "question": "드보라의 노래에서 \"모든 여인보다 복을 받을 자\"로 칭송된 여인은?", "choices": ["라합", "룻", "야엘", "에스더"], "answer": 2, "explanation": "야엘입니다. 한 가정의 평범한 여인이 대적을 물리친 영웅으로 묘사됩니다.", "difficulty": "중", "verse": "사 5:24"}, {"id": 268, "section": "사사기", "question": "기드온이 바알의 제단을 헌 시각은 언제입니까?", "choices": ["아침", "정오", "밤", "저녁"], "answer": 2, "explanation": "밤입니다. 성읍 사람들과 아버지의 집을 두려워하여 몰래 행했으나, 이는 위대한 개혁의 시작이었습니다.", "difficulty": "중", "verse": "사 6:27"}, {"id": 269, "section": "사사기", "question": "미디안 군대가 꿈에서 본, 미디안 진영을 무너뜨린 음식은?", "choices": ["떡 한 덩이", "보리떡 한 덩어리", "고기 한 점", "포도 한 송이"], "answer": 1, "explanation": "보리떡 한 덩어리입니다. 이는 보잘것없는 기드온과 그의 군대를 상징하며 승리의 예표가 되었습니다.", "difficulty": "상", "verse": "사 7:13"}, {"id": 270, "section": "사사기", "question": "아비멜렉이 여인이 던진 맷돌에 맞은 후, 옆의 청년에게 한 부탁은?", "choices": ["나를 살려라", "나를 칼로 죽이라", "도망가라", "부모님께 안부 전해라"], "answer": 1, "explanation": "나를 칼로 죽이라입니다. 여인에게 죽었다는 불명예스러운 소문을 듣지 않기 위한 헛된 자존심이었습니다.", "difficulty": "상", "verse": "사 9:53"}, {"id": 271, "section": "사사기", "question": "입다의 딸이 죽기 전 친구들과 산에 가서 애곡한 이유는?", "choices": ["죽음", "처녀로 죽음", "부모님 생각", "나라 걱정"], "answer": 1, "explanation": "처녀로 죽음입니다. 당시 이스라엘 여인들에게 자녀 없이 죽는 것은 가장 큰 슬픔과 수치로 여겨졌습니다.", "difficulty": "중", "verse": "사 11:37"}, {"id": 272, "section": "사사기", "question": "삼손의 어머니에게 나타나 아들의 출생을 알린 존재는?", "choices": ["왕", "여호와의 사자", "선지자", "제사장"], "answer": 1, "explanation": "여호와의 사자입니다. 삼손의 탄생은 인간의 계획이 아닌 하나님의 주권적인 개입임을 뜻합니다.", "difficulty": "하", "verse": "사 13:3"}, {"id": 273, "section": "사사기", "question": "삼손이 블레셋 사람 30명에게 낸 수수께끼의 판돈은 무엇?", "choices": ["금 30개", "베 옷 30벌과 겉옷 30벌", "양 30마리", "나귀 30마리"], "answer": 1, "explanation": "베 옷 30벌과 겉옷 30벌입니다. 이 내기를 시작으로 삼손과 블레셋 사이의 피비린내 나는 복수극이 시작됩니다.", "difficulty": "상", "verse": "사 14:12"}, {"id": 274, "section": "사사기", "question": "삼손이 밤중에 일어나 메고 산꼭대기로 간 가사의 물건은?", "choices": ["성문짝과 문설주", "금송아지", "군기", "식량 꾸러미"], "answer": 0, "explanation": "성문짝과 문설주, 빗장입니다. 블레셋의 자존심이자 방어벽을 통째로 뽑아 옮긴 괴력의 사건입니다.", "difficulty": "중", "verse": "사 16:3"}, {"id": 275, "section": "사사기", "question": "이스라엘 자손이 실로에 모여 아내 없는 베냐민 사람들에게 한 조언은?", "choices": ["돈을 모아라", "실로의 딸들을 붙들어라", "애굽으로 가라", "기도만 해라"], "answer": 1, "explanation": "실로의 딸들이 춤추러 나올 때 낚아채라는 조언입니다. 맹세를 지키면서도 지파를 보존하려는 고육지책이었습니다.", "difficulty": "상", "verse": "사 21:19"}, {"id": 276, "section": "사사기", "question": "여호와의 사자가 길갈에서부터 이곳으로 올라와 책망했습니다.", "choices": ["보림", "벧엘", "아이", "소돔"], "answer": 0, "explanation": "보림입니다. '길갈'이라는 은혜의 장소에서 '보림'이라는 회한의 장소로의 이동은 이스라엘의 영적 하락을 보여줍니다.", "difficulty": "중", "verse": "사 2:1"}, {"id": 277, "section": "사사기", "question": "사사 에훗이 모압 왕에게 \"내가 은밀한 일을 왕에게 아뢰려 하나이다\"라고 말한 장소는?", "choices": ["침실", "서늘한 다락방", "뜰", "성문 앞"], "answer": 1, "explanation": "서늘한 다락방입니다. 왕이 혼자 있는 은밀한 공간을 노려 거사를 성공시켰습니다.", "difficulty": "상", "verse": "사 3:19"}, {"id": 278, "section": "사사기", "question": "드보라가 바락을 불러 군사 만 명을 거느리고 가라고 한 산은?", "choices": ["시내 산", "다볼 산", "갈멜 산", "에발 산"], "answer": 1, "explanation": "다볼 산입니다. 지형적 이점을 활용하여 철 병거 900대를 가진 시스라의 대군을 격파했습니다.", "difficulty": "중", "verse": "사 4:6"}, {"id": 279, "section": "사사기", "question": "기드온이 두 번째로 양털 시험을 할 때 요청한 내용은?", "choices": ["양털만 젖게 함", "양털만 마르고 사방 땅에는 이슬이 있게 함", "불이 내림", "지진이 일어남"], "answer": 1, "explanation": "양털만 마르고 사방 땅에는 이슬이 있게 함입니다. 첫 번째와 정반대의 기적을 통해 하나님의 확신을 굳혔습니다.", "difficulty": "중", "verse": "사 6:39"}, {"id": 280, "section": "사사기", "question": "기드온이 만든 에봇은 어느 성읍에 두었습니까?", "choices": ["오브라", "실로", "벧엘", "길갈"], "answer": 0, "explanation": "오브라입니다. 기드온의 고향이자 그의 집이 있던 곳입니다.", "difficulty": "상", "verse": "사 8:27"}, {"id": 281, "section": "사사기", "question": "요담의 비유에서 가시나무가 자신을 왕으로 삼으려면 어디에 피하라 했나?", "choices": ["내 뿌리", "내 그늘", "내 줄기", "내 가시"], "answer": 1, "explanation": "내 그늘입니다. 보잘것없는 가시나무(아비멜렉)의 헛된 교만과 허세를 꼬집는 풍자입니다.", "difficulty": "상", "verse": "사 9:15"}, {"id": 282, "section": "사사기", "question": "하나님의 영이 입다에게 임하자 그가 지나간 지역이 아닌 곳은?", "choices": ["길앗", "므낫세", "미스베", "예루살렘"], "answer": 3, "explanation": "예루살렘입니다. 입다의 사역지는 주로 요단 동편 지역이었습니다.", "difficulty": "상", "verse": "사 11:29"}, {"id": 283, "section": "사사기", "question": "마노아가 하나님의 사자에게 음식을 대접하려 하자 사자가 권한 것은?", "choices": ["내가 먹으리라", "번제를 여호와께 드리라", "보관하라", "나눠주라"], "answer": 1, "explanation": "번제를 여호와께 드리라입니다. 영광을 자신이 취하지 않고 오직 하나님께 돌리게 한 것입니다.", "difficulty": "중", "verse": "사 13:16"}, {"id": 284, "section": "사사기", "question": "삼손이 수수께끼 답을 알아낸 블레셋 사람들에게 한 비유는?", "choices": ["내 소로 밭 갈지 아니하였더라면", "내 우물에서 물 긷지 않았다면", "내 칼을 뺏지 않았다면", "내 집을 허물지 않았다면"], "answer": 0, "explanation": "내 암소로 밭 갈지 아니하였더라면입니다. 아내를 협박하여 답을 얻어낸 그들의 비열함을 꾸짖는 말입니다.", "difficulty": "상", "verse": "사 14:18"}, {"id": 285, "section": "사사기", "question": "삼손이 들릴라에게 고백한 진심: \"내 머리에는 ( )를 대지 아니하였으니\"", "choices": ["기름", "손", "삭도", "물"], "answer": 2, "explanation": "**삭도(Razor)**입니다. 나실인 서약의 마지막 보루이자 하나님과의 관계를 상징하는 끈이었습니다.", "difficulty": "하", "verse": "사 16:17"}, {"id": 286, "section": "사사기", "question": "단 자손이 자기를 위하여 세운 것은 무엇입니까?", "choices": ["성막", "새겨진 신상", "돌단", "장막"], "answer": 1, "explanation": "새겨진 신상입니다. 미가의 집에서 훔쳐온 우상을 지파의 신으로 섬기는 영적 타락의 극치를 보여줍니다.", "difficulty": "중", "verse": "사 18:30"}, {"id": 287, "section": "사사기", "question": "베냐민과의 전쟁에서 두 번 패한 후, 온 백성이 올라가 금식하며 제사드린 곳은?", "choices": ["미스바", "벧엘", "길갈", "실로"], "answer": 1, "explanation": "벧엘입니다. 자기 힘을 믿었던 교만을 회개하고 하나님께 엎드렸을 때 비로소 승리의 길을 열어주셨습니다.", "difficulty": "상", "verse": "사 20:26"}, {"id": 288, "section": "사사기", "question": "유다 지파가 산지 주민은 쫓아냈으나 골짜기 주민을 못 쫓아낸 이유는?", "choices": ["군사가 많아서", "철 병거가 있어서", "성벽이 높아서", "지형을 몰라서"], "answer": 1, "explanation": "철 병거가 있었기 때문입니다. 이는 군사적 한계라기보다 하나님을 신뢰하지 못한 믿음의 한계를 뜻합니다.", "difficulty": "중", "verse": "사 1:19"}, {"id": 289, "section": "사사기", "question": "여호와께서 가나안의 모든 전쟁들을 알지 못한 이스라엘을 어떻게 하시려?", "choices": ["죽이시려", "시험하시려", "잊으시려", "버리시려"], "answer": 1, "explanation": "시험하시려 남겨두셨습니다. 고난을 통해 하나님을 찾고 전쟁의 도(믿음의 싸움)를 배우게 하시려는 섭리입니다.", "difficulty": "중", "verse": "사 3:1"}, {"id": 290, "section": "사사기", "question": "드보라의 노래 결론: \"주를 사랑하는 자들은 해가 ( ) 같게 하시옵소서\"", "choices": ["지는 것", "힘 있게 돋는 것", "구름에 가린 것", "멈추는 것"], "answer": 1, "explanation": "해가 힘 있게 돋는 것입니다. 하나님을 사랑하는 자의 생명력과 영광스러운 미래를 축복하는 아름다운 마침표입니다.", "difficulty": "중", "verse": "사 5:31"}, {"id": 291, "section": "사사기", "question": "여호와의 영이 기드온에게 임하시니 기드온이 무엇을 불었나요?", "choices": ["나팔", "피리", "소라", "함성"], "answer": 0, "explanation": "나팔입니다. 하나님의 부르심에 응답하여 군사를 소집하는 신호였습니다.", "difficulty": "하", "verse": "사 6:34"}, {"id": 292, "section": "사사기", "question": "아비멜렉이 죽인 기드온의 아들 중 유일하게 살아남은 막내의 이름은?", "choices": ["요담", "가알", "세바", "아사헬"], "answer": 0, "explanation": "요담입니다. 하나님은 악한 자의 손길에서 남은 자를 두어 공의를 선포하게 하십니다.", "difficulty": "하", "verse": "사 9:5"}, {"id": 293, "section": "사사기", "question": "입다가 길앗 장로들과 함께 미스바에서 한 일은 무엇입니까?", "choices": ["잔치", "자기의 말을 여호와 앞에 다 아뢰니라", "전쟁 연습", "우상 숭배"], "answer": 1, "explanation": "자기의 말을 여호와 앞에 다 아뢰었습니다. 전쟁 전 하나님과의 영적 관계를 먼저 정립하는 지도자의 모습입니다.", "difficulty": "상", "verse": "사 11:11"}, {"id": 294, "section": "사사기", "question": "소라와 에스다올 사이 마하네단에서 삼손을 움직이기 시작한 것은?", "choices": ["배고픔", "여호와의 영", "블레셋의 공격", "분노"], "answer": 1, "explanation": "**여호와의 영(The Spirit of the Lord)**입니다. 삼손의 모든 힘과 사역의 원동력은 오직 성령님께 있었습니다.", "difficulty": "중", "verse": "사 13:25"}, {"id": 295, "section": "사사기", "question": "삼손의 머리카락이 밀린 후 다시 어떻게 되기 시작했나요?", "choices": ["빠지기", "자라기 시작하니라", "하얘지기", "멈춤"], "answer": 1, "explanation": "자라기 시작했습니다. 이는 하나님의 은혜가 완전히 떠나지 않았으며, 회복의 기회가 남아 있음을 암시하는 복선입니다.", "difficulty": "중", "verse": "사 16:22"}, {"id": 296, "section": "사사기", "question": "\"그때에는 이스라엘에 왕이 없었으므로 사람이 각기 ( )에 옳은 대로\"", "choices": ["하나님의 법", "자기 소견", "제사장의 말", "임금의 뜻"], "answer": 1, "explanation": "자기 소견입니다. 기준이 상대화되고 진리가 무너진 시대적 비극을 나타내는 핵심 표현입니다.", "difficulty": "하", "verse": "사 17:6"}, {"id": 297, "section": "사사기", "question": "레위 사람이 첩을 맞이했던 곳은 어느 지방입니까?", "choices": ["유다 베들레헴", "에브라임 산지", "단", "브엘세바"], "answer": 0, "explanation": "유다 베들레헴입니다. 훗날 예수님이 나실 곳이지만, 사사기에서는 타락의 배경지로 등장하여 대조를 이룹니다.", "difficulty": "상", "verse": "사 19:1"}, {"id": 298, "section": "사사기", "question": "이스라엘 자손이 누가 먼저 올라가 베냐민과 싸울지 묻자 하나님은?", "choices": ["베냐민", "유다", "에브라임", "단"], "answer": 1, "explanation": "유다가 먼저니라. 사사기 1장 1절의 질문과 응답이 20장에서 반복되며 수미상관 구조를 이룹니다.", "difficulty": "중", "verse": "사 20:18"}, {"id": 299, "section": "사사기", "question": "이스라엘 백성이 벧엘에서 울며 \"어찌하여 이런 일이 일어나 한 지파가 ( )게 하시나이까\"", "choices": ["많아지게", "없어지게", "강해지게", "부유해지게"], "answer": 1, "explanation": "**없어지게(멸절되게)**입니다. 동족상잔의 참혹함과 공동체의 결손을 슬퍼하는 통곡입니다.", "difficulty": "중", "verse": "사 21:2"}, {"id": 300, "section": "사사기", "question": "사사기 전체에서 반복되는 '죄의 악순환' 4단계가 아닌 것은?", "choices": ["배교", "압제", "부르짖음(회개)", "완전한 성화"], "answer": 3, "explanation": "사사기는 배교-압제-부르짖음-구원의 굴레를 반복하며, 인간 지도자의 한계와 진정한 왕이신 메시아의 필요성을 역설합니다.", "difficulty": "하", "verse": "-"}, {"id": 301, "section": "넌센스", "question": "성경 인물 중 가장 장사를 잘하는 사람은?", "choices": ["형제서점", "야곱", "바다", "아 머리 아파"], "answer": 1, "explanation": "팥죽 한 그릇으로 장자권을 샀으니까요.", "difficulty": "하", "verse": ""}, {"id": 302, "section": "넌센스", "question": "성경 인물 중 가장 싸움을 잘하는 사람은?", "choices": ["여호수아", "8계명", "나사로", "모세"], "answer": 0, "explanation": "여호'하고 '수아(쏴)'하니까요.", "difficulty": "하", "verse": ""}, {"id": 303, "section": "넌센스", "question": "삼손이 죽기 전에 마지막으로 한 말은?", "choices": ["아 머리 아파", "소돔", "눈의 아들 여호수아", "여호수아"], "answer": 0, "explanation": "신전 기둥이 머리 위로 떨어졌을 테니까요.", "difficulty": "하", "verse": ""}, {"id": 304, "section": "넌센스", "question": "성경 인물 중 가장 잠을 안 자는 사람은?", "choices": ["여호와와 함께 해서", "빌라도", "기드온 트럭", "눈의 아들 여호수아"], "answer": 3, "explanation": "항상 '눈'을 뜨고 있어서요.", "difficulty": "하", "verse": ""}, {"id": 305, "section": "넌센스", "question": "여리고 성이 무너질 때 다친 사람이 없었던 이유는?", "choices": ["들어간다!", "소리만 질렀으니까", "야곱", "보아스"], "answer": 1, "explanation": "와~ 하는 소리에 무너졌지요.", "difficulty": "하", "verse": ""}, {"id": 306, "section": "넌센스", "question": "하나님이 가장 싫어하는 비는?", "choices": ["안 보이는 구절", "빌립보", "사이비", "보아스"], "answer": 2, "explanation": "진짜가 아니니까요.", "difficulty": "하", "verse": ""}, {"id": 307, "section": "넌센스", "question": "성경 인물 중 발을 가장 잘 씻는 사람은?", "choices": ["사이비", "소돔", "풍덩!", "나사로"], "answer": 1, "explanation": "발을 '씻으돔(소돔)'", "difficulty": "하", "verse": ""}, {"id": 308, "section": "넌센스", "question": "인류 최초의 거지는?", "choices": ["다 잘 돼", "나사로", "들릴라 미용실", "아 머리 아파"], "answer": 1, "explanation": "\"나 살어(살려줘)~\"라고 해서요.", "difficulty": "하", "verse": ""}, {"id": 309, "section": "넌센스", "question": "기독교인들이 가장 좋아하는 서점은?", "choices": ["가인", "기드온 트럭", "형제서점", "바다"], "answer": 2, "explanation": "\"형제여~ 서점!(서 계시지 마세요)\"", "difficulty": "하", "verse": ""}, {"id": 310, "section": "넌센스", "question": "성경 인물 중 가장 요리를 잘하는 사람은?", "choices": ["아 머리 아파", "들릴라 미용실", "모세", "소리만 질렀으니까"], "answer": 2, "explanation": "홍해를 한 번에 '볶았'으니까요.", "difficulty": "하", "verse": ""}, {"id": 311, "section": "넌센스", "question": "성경에서 가장 읽기 힘든 구절은?", "choices": ["셈",
