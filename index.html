<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>성경 퀴즈</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary:#4A6FA5; --primary-dark:#3A5A8A; --secondary:#F4A261;
  --correct:#2E8B57; --wrong:#C0392B; --bg:#F0F4FF; --text:#1A1A2E;
  --muted:#6B7280; --border:#E2E8F0; --shadow:0 4px 20px rgba(74,111,165,0.15);
}
body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
.screen { display:none; width:100%; max-width:480px; min-height:100vh; flex-direction:column; }
.screen.active { display:flex; }

/* ── HOME ── */
#home { background:linear-gradient(160deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%); align-items:center; padding:28px 24px 36px; gap:0; overflow-y:auto; }
.home-header { text-align:center; margin-bottom:24px; }
.home-cross { font-size:44px; margin-bottom:8px; filter:drop-shadow(0 0 18px rgba(244,162,97,0.8)); }
.home-title { font-size:28px; font-weight:800; color:#fff; }
.home-sub { font-size:12px; color:rgba(255,255,255,0.45); margin-top:5px; letter-spacing:1px; }
.conn-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-top:8px; }
.conn-badge.online { background:rgba(46,139,87,0.25); color:#4ADE80; border:1px solid rgba(46,139,87,0.35); }
.conn-badge.offline { background:rgba(192,57,43,0.2); color:#F87171; border:1px solid rgba(192,57,43,0.3); }
.conn-dot { width:7px; height:7px; border-radius:50%; }
.conn-badge.online .conn-dot { background:#4ADE80; box-shadow:0 0 6px #4ADE80; }
.conn-badge.offline .conn-dot { background:#F87171; }

.slabel { font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:7px; }
.name-wrap { width:100%; margin-bottom:16px; }
.name-input { width:100%; padding:11px 14px; border-radius:11px; border:1.5px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.07); color:#fff; font-size:15px; font-family:inherit; outline:none; transition:border-color 0.2s; }
.name-input::placeholder { color:rgba(255,255,255,0.28); }
.name-input:focus { border-color:var(--secondary); }

.section-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:11px; }
.sec-card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:13px; padding:14px 10px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; }
.sec-card:active { transform:scale(0.97); }
.sec-card.sel { background:rgba(74,111,165,0.32); border-color:var(--secondary); box-shadow:0 0 14px rgba(244,162,97,0.22); }
.sec-card .s-icon { font-size:22px; margin-bottom:5px; }
.sec-card .s-name { font-size:13px; font-weight:700; color:#fff; }
.sec-card .s-cnt { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }
.sec-card .s-chk { position:absolute; top:6px; right:6px; width:15px; height:15px; background:var(--secondary); border-radius:50%; display:none; align-items:center; justify-content:center; font-size:8px; color:#fff; }
.sec-card.sel .s-chk { display:flex; }
.all-btn { width:100%; padding:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:9px; color:rgba(255,255,255,0.55); font-size:12px; cursor:pointer; margin-bottom:14px; font-family:inherit; }

.settings-box { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09); border-radius:13px; padding:13px; margin-bottom:14px; }
.settings-toggle { width:100%; display:flex; align-items:center; justify-content:space-between; background:transparent; border:none; cursor:pointer; padding:0; font-family:inherit; }
.settings-toggle .slabel { margin-bottom:0; pointer-events:none; }
.settings-toggle .s-arrow { font-size:12px; color:rgba(255,255,255,0.35); transition:transform 0.25s ease; }
.settings-toggle.open .s-arrow { transform:rotate(180deg); }
.settings-content { overflow:hidden; max-height:0; transition:max-height 0.3s ease, margin-top 0.3s ease; margin-top:0; }
.settings-content.open { max-height:400px; margin-top:10px; }
.srow { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.srow:last-child { border-bottom:none; }
.srow-label { font-size:12px; color:rgba(255,255,255,0.7); }
.srow-ctrl { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
.cbtn { padding:4px 9px; border-radius:14px; border:1px solid rgba(255,255,255,0.16); background:transparent; color:rgba(255,255,255,0.5); font-size:11px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.cbtn.active { background:var(--secondary); border-color:var(--secondary); color:#fff; font-weight:700; }

.resume-btn { width:100%; padding:12px; background:rgba(46,139,87,0.22); border:1px solid rgba(46,139,87,0.45); border-radius:11px; color:#4ADE80; font-size:13px; font-weight:700; cursor:pointer; margin-bottom:9px; font-family:inherit; display:none; }
.lb-btn { width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:11px; color:rgba(255,255,255,0.7); font-size:13px; font-weight:600; cursor:pointer; margin-bottom:9px; font-family:inherit; }
.start-btn { width:100%; padding:15px; background:linear-gradient(135deg,var(--secondary),#E07B3A); border:none; border-radius:13px; color:#fff; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 7px 24px rgba(244,162,97,0.35); font-family:inherit; }
.start-btn:active { transform:scale(0.97); }
.start-btn:disabled { opacity:0.32; cursor:not-allowed; transform:none; }

/* ── QUIZ ── */
#quiz { background:var(--bg); }
.quiz-topbar { background:#fff; padding:11px 14px; display:flex; align-items:center; gap:9px; box-shadow:0 2px 8px rgba(0,0,0,0.06); position:sticky; top:0; z-index:10; }
.q-back { width:32px; height:32px; background:var(--bg); border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.q-pw { flex:1; }
.q-pl { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px; }
.q-pb { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.q-pf { height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:3px; transition:width 0.4s ease; }
.timer-strip { height:4px; background:var(--border); border-radius:2px; margin-top:3px; overflow:hidden; }
.timer-fill { height:100%; background:var(--secondary); border-radius:2px; transition:width 1s linear; }
.q-score { background:var(--primary); color:#fff; font-size:11px; font-weight:700; padding:4px 8px; border-radius:14px; flex-shrink:0; }
.quiz-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:12px; }
.q-meta { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.mbadge { padding:3px 8px; border-radius:14px; font-size:11px; font-weight:600; }
.mb-section { background:#EEF2FF; color:var(--primary); }
.mb-diff-하 { background:#D1FAE5; color:#065F46; }
.mb-diff-중 { background:#FEF3C7; color:#92400E; }
.mb-diff-상 { background:#FEE2E2; color:#991B1B; }
.mb-num { font-size:11px; color:var(--muted); margin-left:auto; }
.combo-badge { padding:3px 9px; border-radius:14px; font-size:11px; font-weight:800; background:linear-gradient(135deg,#F4A261,#E07B3A); color:#fff; display:none; animation:pop 0.3s ease; }
.combo-badge.show { display:inline-block; }
@keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
.q-card { background:#fff; border-radius:17px; padding:20px 16px; box-shadow:var(--shadow); }
.q-text { font-size:16px; font-weight:700; line-height:1.55; color:var(--text); }
.choices { display:flex; flex-direction:column; gap:8px; }
.choice-btn { display:flex; align-items:center; gap:11px; background:#fff; border:2px solid var(--border); border-radius:12px; padding:12px 13px; cursor:pointer; font-size:14px; color:var(--text); text-align:left; transition:all 0.2s; box-shadow:0 2px 5px rgba(0,0,0,0.04); width:100%; font-family:inherit; }
.choice-btn:active:not([disabled]) { transform:scale(0.98); }
.cbadge { width:28px; height:28px; border-radius:50%; background:var(--bg); color:var(--primary); font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ctext { flex:1; line-height:1.4; }
.choice-btn.correct { border-color:var(--correct); background:#F0FFF4; }
.choice-btn.correct .cbadge { background:var(--correct); color:#fff; }
.choice-btn.wrong { border-color:var(--wrong); background:#FFF5F5; }
.choice-btn.wrong .cbadge { background:var(--wrong); color:#fff; }
.choice-btn[disabled] { cursor:default; }
.expl-card { background:linear-gradient(135deg,#EEF2FF,#F5F3FF); border:1px solid #C7D2FE; border-radius:13px; padding:13px 15px; display:none; }
.expl-card.show { display:block; animation:slideUp 0.3s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.expl-hdr { font-size:11px; font-weight:700; color:var(--primary); margin-bottom:4px; }
.expl-text { font-size:13px; color:#374151; line-height:1.6; }
.expl-verse { font-size:11px; color:var(--primary); margin-top:5px; font-weight:600; }
.next-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border:none; border-radius:12px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; display:none; box-shadow:0 5px 16px rgba(74,111,165,0.3); font-family:inherit; }
.next-btn.show { display:block; animation:slideUp 0.3s ease; }

/* ── RESULT ── */
#result { background:linear-gradient(160deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%); align-items:center; justify-content:center; padding:32px 24px; gap:18px; overflow-y:auto; }
.result-icon { font-size:56px; text-align:center; animation:bounceIn 0.6s ease; }
@keyframes bounceIn { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
.result-title { font-size:22px; font-weight:800; color:#fff; text-align:center; }
.score-ring { position:relative; width:140px; height:140px; }
.score-ring svg { width:140px; height:140px; transform:rotate(-90deg); }
.strack { fill:none; stroke:rgba(255,255,255,0.1); stroke-width:10; }
.sfill { fill:none; stroke:var(--secondary); stroke-width:10; stroke-linecap:round; stroke-dasharray:408; stroke-dashoffset:408; transition:stroke-dashoffset 1.2s ease; }
.score-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-pct { font-size:28px; font-weight:800; color:#fff; line-height:1; }
.score-lbl { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }
.result-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; width:100%; }
.stat-box { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.09); border-radius:11px; padding:11px 6px; text-align:center; }
.stat-num { font-size:19px; font-weight:800; color:#fff; }
.stat-lbl { font-size:10px; color:rgba(255,255,255,0.4); margin-top:2px; }
.result-msg { text-align:center; font-size:13px; color:rgba(255,255,255,0.6); line-height:1.6; }
.result-btns { width:100%; display:flex; flex-direction:column; gap:8px; }
.rbtn { width:100%; padding:13px; border-radius:12px; border:none; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.rbtn:active { transform:scale(0.97); }
.rbtn-primary { background:linear-gradient(135deg,var(--secondary),#E07B3A); color:#fff; box-shadow:0 5px 16px rgba(244,162,97,0.32); }
.rbtn-ghost { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14); color:rgba(255,255,255,0.78); }

/* ── REVIEW ── */
#review { background:var(--bg); }
.review-topbar { background:#fff; padding:13px 16px; display:flex; align-items:center; gap:11px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.review-back { width:32px; height:32px; background:var(--bg); border:none; border-radius:8px; cursor:pointer; font-size:14px; }
.review-title { font-size:15px; font-weight:800; color:var(--text); }
.review-body { padding:14px; flex:1; overflow-y:auto; }
.review-item { background:#fff; border-radius:13px; padding:15px; margin-bottom:11px; box-shadow:var(--shadow); }
.review-q-num { font-size:11px; color:var(--muted); margin-bottom:5px; }
.review-q-text { font-size:14px; font-weight:700; color:var(--text); line-height:1.5; margin-bottom:11px; }
.review-choices { display:flex; flex-direction:column; gap:6px; }
.review-choice { display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:9px; background:var(--bg); border:1.5px solid transparent; font-size:13px; color:var(--text); }
.review-choice.correct { border-color:var(--correct); background:#F0FFF4; color:#065F46; font-weight:700; }
.review-choice.my-wrong { border-color:var(--wrong); background:#FFF5F5; color:#991B1B; }
.review-expl { margin-top:9px; padding:9px 11px; background:#EEF2FF; border-radius:9px; font-size:12px; color:#374151; line-height:1.5; }
.review-verse { font-size:11px; color:var(--primary); margin-top:3px; font-weight:600; }

/* ── LEADERBOARD ── */
#leaderboard { background:linear-gradient(160deg,#1A1A2E 0%,#16213E 60%,#0F3460 100%); }
.lb-topbar { padding:14px 16px 11px; display:flex; align-items:center; gap:9px; border-bottom:1px solid rgba(255,255,255,0.07); }
.lb-back { width:32px; height:32px; background:rgba(255,255,255,0.07); border:none; border-radius:8px; cursor:pointer; color:#fff; font-size:14px; flex-shrink:0; }
.lb-title-wrap { flex:1; }
.lb-title { font-size:16px; font-weight:800; color:#fff; }
.lb-conn { font-size:10px; margin-top:1px; }
.lb-conn.on { color:#4ADE80; } .lb-conn.off { color:#F87171; }
.lb-clear { padding:4px 9px; background:rgba(192,57,43,0.17); border:1px solid rgba(192,57,43,0.32); border-radius:7px; color:#F87171; font-size:11px; cursor:pointer; font-family:inherit; }
.lb-body { padding:13px; flex:1; overflow-y:auto; }
.lb-toggle-row { display:flex; gap:5px; margin-bottom:9px; }
.lb-tog { flex:1; padding:7px; border-radius:9px; border:1px solid rgba(255,255,255,0.13); background:transparent; color:rgba(255,255,255,0.45); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; }
.lb-tog.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.lb-filter-row { display:flex; gap:5px; margin-bottom:13px; overflow-x:auto; padding-bottom:3px; scrollbar-width:none; }
.lb-filter-row::-webkit-scrollbar { display:none; }
.lf-btn { padding:4px 11px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:rgba(255,255,255,0.42); font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap; font-family:inherit; }
.lf-btn.active { background:var(--secondary); border-color:var(--secondary); color:#fff; }
.lb-live-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; color:#4ADE80; margin-bottom:10px; }
.lb-live-dot { width:6px; height:6px; border-radius:50%; background:#4ADE80; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.lb-row { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:12px 13px; margin-bottom:8px; display:flex; align-items:center; gap:11px; animation:slideUp 0.25s ease; }
.lb-rank { font-size:16px; font-weight:900; width:24px; text-align:center; flex-shrink:0; }
.lb-rank-1{color:#FFD700} .lb-rank-2{color:#C0C0C0} .lb-rank-3{color:#CD7F32}
.lb-rank-o { color:rgba(255,255,255,0.25); font-size:12px; }
.lb-info { flex:1; min-width:0; }
.lb-name { font-size:14px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-meta { font-size:10px; color:rgba(255,255,255,0.35); margin-top:2px; }
.lb-score-col { text-align:right; flex-shrink:0; }
.lb-pct { font-size:18px; font-weight:800; color:var(--secondary); }
.lb-frac { font-size:10px; color:rgba(255,255,255,0.35); margin-top:1px; }
.lb-me { font-size:9px; background:var(--primary); color:#fff; padding:1px 5px; border-radius:7px; margin-left:4px; vertical-align:middle; }
.lb-new { font-size:9px; background:#C0392B; color:#fff; padding:1px 5px; border-radius:7px; margin-left:4px; vertical-align:middle; animation:pop 0.4s ease; }
.lb-empty { text-align:center; color:rgba(255,255,255,0.28); font-size:13px; padding:44px 0; }
.lb-empty-icon { font-size:40px; margin-bottom:9px; }
.lb-loading { text-align:center; color:rgba(255,255,255,0.4); font-size:13px; padding:40px 0; }

/* ── TOAST ── */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); background:rgba(20,20,20,0.93); color:#fff; padding:9px 20px; border-radius:18px; font-size:13px; font-weight:600; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; max-width:320px; text-align:center; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
.shake { animation:shake 0.35s ease; }
</style>
</head>
<body>

<!-- ── HOME SCREEN ── -->
<div class="screen" id="home">
  <div class="home-header">
    <div class="home-cross">✝️</div>
    <div class="home-title">성경 퀴즈</div>
    <div class="home-sub">BIBLE QUIZ · 250 QUESTIONS</div>
    <div class="conn-badge offline" id="connBadge">
      <div class="conn-dot"></div><span id="connText">오프라인</span>
    </div>
  </div>

  <div class="name-wrap">
    <div class="slabel">👤 참여자 이름</div>
    <input class="name-input" id="nameInput" type="text" maxlength="12" placeholder="이름을 입력하세요" oninput="onNameInput()">
  </div>

  <div style="width:100%">
    <div class="slabel" style="margin-bottom:7px">📖 성경 범위</div>
    <div class="section-grid">
      <div class="sec-card" data-section="신명기" onclick="toggleSection(this)"><div class="s-chk">✓</div><div class="s-icon">📜</div><div class="s-name">신명기</div><div class="s-cnt">67문제</div></div>
      <div class="sec-card" data-section="여호수아" onclick="toggleSection(this)"><div class="s-chk">✓</div><div class="s-icon">⚔️</div><div class="s-name">여호수아</div><div class="s-cnt">67문제</div></div>
      <div class="sec-card" data-section="사사기" onclick="toggleSection(this)"><div class="s-chk">✓</div><div class="s-icon">🦁</div><div class="s-name">사사기</div><div class="s-cnt">66문제</div></div>
      <div class="sec-card" data-section="넌센스" onclick="toggleSection(this)"><div class="s-chk">✓</div><div class="s-icon">😄</div><div class="s-name">넌센스</div><div class="s-cnt">50문제</div></div>
    </div>
    <button class="all-btn" onclick="selectAll()">전체 선택 / 해제</button>
  </div>

  <div class="settings-box">
    <button class="settings-toggle" onclick="toggleSettings(this)">
      <div class="slabel">⚙️ 퀴즈 설정</div>
      <span class="s-arrow">▼</span>
    </button>
    <div class="settings-content">
      <div class="srow"><span class="srow-label">문제 수</span><div class="srow-ctrl"><button class="cbtn" data-key="count" data-val="10" onclick="setSetting(this)">10</button><button class="cbtn" data-key="count" data-val="20" onclick="setSetting(this)">20</button><button class="cbtn active" data-key="count" data-val="30" onclick="setSetting(this)">30</button><button class="cbtn" data-key="count" data-val="0" onclick="setSetting(this)">전체</button></div></div>
      <div class="srow"><span class="srow-label">난이도</span><div class="srow-ctrl"><button class="cbtn active" data-key="diff" data-val="all" onclick="setSetting(this)">전체</button><button class="cbtn" data-key="diff" data-val="하" onclick="setSetting(this)">하</button><button class="cbtn" data-key="diff" data-val="중" onclick="setSetting(this)">중</button><button class="cbtn" data-key="diff" data-val="상" onclick="setSetting(this)">상</button></div></div>

function initFirebase(cfg) {
  try {
    var existing = firebase.apps.filter(function(a){ return a.name === 'bible-quiz'; });
    fbApp = existing.length > 0 ? existing[0] : firebase.initializeApp(cfg, 'bible-quiz');
    fbDb = firebase.database(fbApp);
    fbMode = true;
    fbDb.ref('.info/connected').on('value', function(snap) {
      updateConnBadge(snap.val() === true);
    });
    return true;
  } catch(e) { fbMode = false; return false; }
}
function updateConnBadge(online) {
  var b = document.getElementById('connBadge');
  var t = document.getElementById('connText');
  var ls = document.getElementById('lbConnStatus');
  var live = document.getElementById('liveBadge');
  if (online) {
    if (b) { b.className = 'conn-badge online'; t.textContent = '공유 리더보드 연결됨'; }
    if (ls) { ls.className = 'lb-conn on'; ls.textContent = '● 실시간 연결됨'; }
    if (live) live.style.display = 'flex';
  } else {
    if (b) { b.className = 'conn-badge offline'; t.textContent = fbMode ? '오프라인 (재연결 중)' : '로컬 저장 모드'; }
    if (ls) { ls.className = 'lb-conn off'; ls.textContent = '● 오프라인'; }
    if (live) live.style.display = 'none';
  }
}

// ── STATE ──
let settings = { count:30, order:'random', diff:'all', explain:'yes', timer:0 };
let selectedSections = new Set(['신명기','여호수아','사사기','넌센스']);
let quizQuestions=[], currentIdx=0, score=0, answered=false;
let wrongQuestions=[], comboCount=0, maxCombo=0;
let currentUserName='', timerInterval=null, timerSec=0;
let lbMode='all', lbFilter='all', lbAllData=[];

// ── TOAST ──
function showToast(msg, dur) {
  dur = dur||2200; var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},dur);
}

// ── HOME ──
function onNameInput() { updateStartBtn(); checkResume(); }
function toggleSection(card) {
  var s=card.dataset.section;
  if(selectedSections.has(s)){selectedSections.delete(s);card.classList.remove('sel');}
  else{selectedSections.add(s);card.classList.add('sel');}
  updateStartBtn();
}
function selectAll() {
  var all=selectedSections.size===4;
  selectedSections=all?new Set():new Set(['신명기','여호수아','사사기','넌센스']);
  document.querySelectorAll('.sec-card').forEach(function(c){all?c.classList.remove('sel'):c.classList.add('sel');});
  updateStartBtn();
}
function updateStartBtn() {
  var n=document.getElementById('nameInput').value.trim();
  document.getElementById('startBtn').disabled=selectedSections.size===0||n.length===0;
}
function toggleSettings(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}
function setSetting(btn) {
  var k=btn.dataset.key, v=btn.dataset.val;
  settings[k]=(k==='count'||k==='timer')?parseInt(v):v;
  document.querySelectorAll('[data-key="'+k+'"]').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

// ── PROGRESS ──
function saveProgress() {
  localStorage.setItem(PROG_KEY,JSON.stringify({name:currentUserName,questions:quizQuestions,idx:currentIdx,score:score,wrong:wrongQuestions,combo:comboCount,maxCombo:maxCombo,settings:settings}));
}
function clearProgress() { localStorage.removeItem(PROG_KEY); }
function checkResume() {
  var raw=localStorage.getItem(PROG_KEY), btn=document.getElementById('resumeBtn');
  if(!raw){btn.style.display='none';return;}
  try {
    var s=JSON.parse(raw), name=document.getElementById('nameInput').value.trim();
    if(name&&s.name!==name){btn.style.display='none';return;}
    btn.style.display='block';
    document.getElementById('resumeInfo').textContent=s.idx+'/'+s.questions.length+'문제';
  } catch(e){btn.style.display='none';}
}
function resumeQuiz() {
  var raw=localStorage.getItem(PROG_KEY); if(!raw)return;
  var s=JSON.parse(raw);
  currentUserName=s.name; quizQuestions=s.questions; currentIdx=s.idx;
  score=s.score; wrongQuestions=s.wrong||[]; comboCount=s.combo||0; maxCombo=s.maxCombo||0;
  settings=s.settings||settings;
  document.getElementById('nameInput').value=currentUserName;
  showScreen('quiz'); renderQuestion();
}

// ── QUIZ ──
function startQuiz() {
  currentUserName=document.getElementById('nameInput').value.trim();
  if(!currentUserName){showToast('이름을 입력해주세요!');return;}
  var pool=QUIZ_DATA.filter(function(q){return selectedSections.has(q.section);});
  if(settings.diff!=='all') pool=pool.filter(function(q){return q.difficulty===settings.diff;});
  if(pool.length===0){showToast('해당 조건의 문제가 없습니다.');return;}
  if(settings.order==='random') pool=pool.sort(function(){return Math.random()-0.5;});
  var cnt=settings.count>0?settings.count:pool.length;
  quizQuestions=pool.slice(0,cnt);
  currentIdx=0;score=0;answered=false;wrongQuestions=[];comboCount=0;maxCombo=0;
  clearProgress(); showScreen('quiz'); renderQuestion();
}
function retryQuiz(){startQuiz();}

function renderQuestion() {
  stopTimer();
  var q=quizQuestions[currentIdx], total=quizQuestions.length;
  document.getElementById('progText').textContent=(currentIdx+1)+' / '+total;
  document.getElementById('progFill').style.width=((currentIdx/total)*100)+'%';
  document.getElementById('qScore').textContent=score+'점';
  document.getElementById('mSection').textContent=q.section;
  var md=document.getElementById('mDiff'); md.textContent=q.difficulty||''; md.className='mbadge mb-diff-'+(q.difficulty||'하');
  document.getElementById('mNum').textContent='#'+q.id;
  document.getElementById('qText').textContent=q.question;
  updateComboBadge();
  var list=document.getElementById('choicesList'), nums=['①','②','③','④'];
  list.innerHTML='';
  q.choices.forEach(function(c,i){
    var btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML='<span class="cbadge">'+nums[i]+'</span><span class="ctext">'+c+'</span>';
    btn.onclick=function(){selectAnswer(i,btn);};
    list.appendChild(btn);
  });
  document.getElementById('explCard').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
  answered=false;
  if(settings.timer>0){
    timerSec=settings.timer;
    document.getElementById('timerLabel').style.display='inline';
    document.getElementById('timerStrip').style.display='block';
    document.getElementById('timerNum').textContent=timerSec;
    document.getElementById('timerFill').style.transition='none';
    document.getElementById('timerFill').style.width='100%';
    setTimeout(startTimer,50);
  } else {
    document.getElementById('timerLabel').style.display='none';
    document.getElementById('timerStrip').style.display='none';
  }
  saveProgress();
}
function startTimer() {
  var total=settings.timer;
  document.getElementById('timerFill').style.transition='width '+total+'s linear';
  document.getElementById('timerFill').style.width='0%';
  timerInterval=setInterval(function(){
    timerSec--; document.getElementById('timerNum').textContent=timerSec;
    if(timerSec<=0){stopTimer();if(!answered)timeOut();}
  },1000);
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
function timeOut(){
  answered=true;
  var q=quizQuestions[currentIdx];
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true;});
  document.querySelectorAll('.choice-btn')[q.answer].classList.add('correct');
  wrongQuestions.push({q:q,myAns:-1}); comboCount=0; updateComboBadge();
  showToast('⏱ 시간 초과!'); showExpl(q); showNextBtn();
}
function selectAnswer(idx,btn) {
  if(answered)return; answered=true; stopTimer();
  var q=quizQuestions[currentIdx], btns=document.querySelectorAll('.choice-btn');
  btns.forEach(function(b){b.disabled=true;});
  if(idx===q.answer){
    btn.classList.add('correct'); comboCount++; if(comboCount>maxCombo)maxCombo=comboCount;
    var bonus=comboCount>=3?2:1; score+=bonus;
    document.getElementById('qScore').textContent=score+'점';
    if(comboCount>=3)showToast('🔥 '+comboCount+'연속 콤보! +'+bonus+'점');
  } else {
    btn.classList.add('wrong'); btn.classList.add('shake');
    btns[q.answer].classList.add('correct');
    wrongQuestions.push({q:q,myAns:idx}); comboCount=0;
  }
  updateComboBadge(); showExpl(q); showNextBtn();
}
function updateComboBadge(){
  var b=document.getElementById('comboBadge');
  if(comboCount>=3){b.textContent='🔥 '+comboCount+'콤보';b.classList.add('show');}
  else{b.classList.remove('show');}
}
function showExpl(q){
  if(settings.explain==='yes'&&q.explanation){
    document.getElementById('explText').textContent=q.explanation;
    document.getElementById('explVerse').textContent=q.verse?'📖 '+q.verse:'';
    document.getElementById('explCard').classList.add('show');
  }
}
function showNextBtn(){
  var nb=document.getElementById('nextBtn'),isLast=currentIdx===quizQuestions.length-1;
  nb.textContent=isLast?'결과 보기 🏆':'다음 문제 →'; nb.classList.add('show');
}
function nextQuestion(){
  currentIdx++;
  if(currentIdx>=quizQuestions.length){clearProgress();showResult();}
  else{renderQuestion();window.scrollTo(0,0);}
}
function confirmBack(){
  if(confirm('퀴즈를 중단할까요? 진행 상황은 저장됩니다.')){saveProgress();goHome();}
}

// ── RESULT ──
function showResult(){
  stopTimer();
  var total=quizQuestions.length, correct=total-wrongQuestions.length, pct=Math.round((correct/total)*100);
  document.getElementById('stTotal').textContent=total;
  document.getElementById('stCorrect').textContent=correct;
  document.getElementById('stWrong').textContent=wrongQuestions.length;
  document.getElementById('stCombo').textContent=maxCombo;
  document.getElementById('scorePct').textContent=pct+'%';
  var circ=2*Math.PI*65;
  setTimeout(function(){document.getElementById('sfill').style.strokeDashoffset=circ*(1-pct/100);},300);
  var icon,title,msg;
  if(pct>=90){icon='🏆';title='완벽합니다!';msg='성경 말씀을 정말 잘 알고 계시네요! 하나님의 말씀이 마음에 가득하십니다.';}
  else if(pct>=70){icon='⭐';title='훌륭해요!';msg='대부분의 말씀을 잘 알고 계세요. 조금만 더 공부하면 완벽할 것 같아요!';}
  else if(pct>=50){icon='📖';title='잘 하셨어요!';msg='절반 이상 맞추셨어요! 말씀을 더 깊이 묵상해 보세요.';}
  else{icon='🌱';title='도전해 보세요!';msg='성경 말씀을 더 읽고 공부해 봐요. 다시 도전하면 더 잘할 수 있어요!';}
  document.getElementById('resultIcon').textContent=icon;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultMsg').textContent=msg;
  if(wrongQuestions.length>0){document.getElementById('reviewBtn').style.display='block';document.getElementById('wrongCnt').textContent=wrongQuestions.length;}
  else{document.getElementById('reviewBtn').style.display='none';}
  var sections=[...new Set(quizQuestions.map(function(q){return q.section;}))].join(', ');
  saveRecord({name:currentUserName,score:score,total:total,correct:correct,pct:pct,sections:sections,maxCombo:maxCombo,date:new Date().toISOString()});
  showScreen('result');
}

// ── LEADERBOARD DATA ──
function saveRecord(r) {
  if(fbMode && fbDb) {
    fbDb.ref('leaderboard').push(r).catch(function(e){ console.warn('FB write error',e); saveLocalRecord(r); });
  } else { saveLocalRecord(r); }
}
function saveLocalRecord(r) {
  var d=[]; try{d=JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch(e){}
  d.push(r); localStorage.setItem(LB_KEY,JSON.stringify(d));
}
function clearLb(){
  if(!confirm('리더보드를 초기화할까요?'))return;
  if(fbMode&&fbDb){
    fbDb.ref('leaderboard').remove().then(function(){showToast('초기화되었습니다.');}).catch(function(){showToast('초기화 실패.');});
  } else { localStorage.removeItem(LB_KEY); renderLbList([]); showToast('초기화되었습니다.'); }
}

// ── LEADERBOARD SCREEN ──
function showLeaderboard(){
  lbMode='all';lbFilter='all';
  document.querySelectorAll('.lb-tog').forEach(function(b){b.classList.toggle('active',b.dataset.mode==='all');});
  document.querySelectorAll('.lf-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter==='all');});
  showScreen('leaderboard');
  if(fbMode&&fbDb){
    document.getElementById('lbList').innerHTML='<div class="lb-loading">실시간 데이터 불러오는 중...</div>';
    if(lbListener) fbDb.ref('leaderboard').off('value',lbListener);
    lbListener=fbDb.ref('leaderboard').on('value',function(snap){
      var raw=snap.val(), arr=[];
      if(raw) Object.values(raw).forEach(function(v){arr.push(v);});
      lbAllData=arr; renderLbList(arr);
    });
  } else {
    var arr=[]; try{arr=JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch(e){}
    lbAllData=arr; renderLbList(arr);
  }
}
function setLbMode(btn){
  lbMode=btn.dataset.mode;
  document.querySelectorAll('.lb-tog').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); renderLbList(lbAllData);
}
function setLbFilter(btn){
  lbFilter=btn.dataset.filter;
  document.querySelectorAll('.lf-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); renderLbList(lbAllData);
}
function renderLbList(rawData){
  var list=document.getElementById('lbList');
  var data=rawData.slice();
  if(lbFilter!=='all') data=data.filter(function(r){return r.sections&&r.sections.includes(lbFilter);});
  var today=new Date().toDateString();
  if(lbMode==='today') data=data.filter(function(r){return new Date(r.date).toDateString()===today;});
  if(lbMode==='best'){
    var best={};
    data.forEach(function(r){if(!best[r.name]||r.pct>best[r.name].pct||(r.pct===best[r.name].pct&&r.score>best[r.name].score))best[r.name]=r;});
    data=Object.values(best);
  }
  data.sort(function(a,b){return b.pct-a.pct||b.score-a.score;});
  if(data.length===0){list.innerHTML='<div class="lb-empty"><div class="lb-empty-icon">📋</div>아직 기록이 없어요!</div>';return;}
  var medals=['🥇','🥈','🥉'];
  var now=Date.now();
  list.innerHTML=data.map(function(r,i){
    var rank=i<3?'<span class="lb-rank lb-rank-'+(i+1)+'">'+medals[i]+'</span>':'<span class="lb-rank lb-rank-o">'+(i+1)+'</span>';
    var me=(r.name===currentUserName)?'<span class="lb-me">나</span>':'';
    var isNew=(now-new Date(r.date).getTime())<60000?'<span class="lb-new">NEW</span>':'';
    var d=new Date(r.date);
    var ds=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    var comboStr=r.maxCombo?'콤보 '+r.maxCombo+' · ':'';
    return '<div class="lb-row">'+rank+'<div class="lb-info"><div class="lb-name">'+r.name+me+isNew+'</div><div class="lb-meta">'+comboStr+r.sections+' · '+ds+'</div></div><div class="lb-score-col"><div class="lb-pct">'+r.pct+'%</div><div class="lb-frac">'+r.score+'pt · '+r.correct+'/'+r.total+'</div></div></div>';
  }).join('');
}

// ── REVIEW ──
function showReview(){
  var body=document.getElementById('reviewBody'), nums=['①','②','③','④'];
  body.innerHTML=wrongQuestions.map(function(item,i){
    var q=item.q,myAns=item.myAns;
    var choices=q.choices.map(function(c,ci){
      var cls=ci===q.answer?'correct':ci===myAns?'my-wrong':'';
      return '<div class="review-choice '+cls+'"><span>'+nums[ci]+'</span><span>'+c+'</span></div>';
    }).join('');
    var expl=q.explanation?'<div class="review-expl">'+q.explanation+(q.verse?'<div class="review-verse">📖 '+q.verse+'</div>':'')+'</div>':'';
    return '<div class="review-item"><div class="review-q-num">'+(i+1)+'번 오답 · #'+q.id+' · '+q.section+'</div><div class="review-q-text">'+q.question+'</div><div class="review-choices">'+choices+'</div>'+expl+'</div>';
  }).join('');
  showScreen('review');
}

// ── SHARE ──
function shareResult(){
  var total=quizQuestions.length, correct=total-wrongQuestions.length, pct=Math.round((correct/total)*100);
  var text='✝️ 성경 퀴즈 결과\n'+currentUserName+' · '+pct+'% ('+correct+'/'+total+'문제)\n최대 콤보: '+maxCombo+'연속\n#성경퀴즈 #BibleQuiz';
  if(navigator.share){navigator.share({title:'성경 퀴즈 결과',text:text}).catch(function(){});}
  else{navigator.clipboard.writeText(text).then(function(){showToast('📋 클립보드에 복사되었습니다!');}).catch(function(){showToast('복사에 실패했습니다.');});}
}

// ── UTILS ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active'); window.scrollTo(0,0);
}
function goHome(){
  stopTimer();
  if(lbListener&&fbDb){fbDb.ref('leaderboard').off('value',lbListener);lbListener=null;}
  showScreen('home'); checkResume();
}

// ── INIT ──
(function(){
  document.querySelectorAll('.sec-card').forEach(function(c){c.classList.add('sel');});
  initFirebase(FIREBASE_CONFIG);
  showScreen('home');
  checkResume();
})();
</script>
